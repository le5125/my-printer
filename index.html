<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GP-2270T Printer</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --border: #2e2e3e;
    --accent: #00d4aa;
    --accent2: #ff6b35;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --radius: 10px;
    --font: 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .printer-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .printer-icon svg { width: 22px; height: 22px; fill: #000; }

  h1 { font-size: 1rem; letter-spacing: 0.08em; color: var(--accent); }
  h1 span { color: var(--muted); font-size: 0.75rem; display: block; margin-top: 2px; }

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Status indicator */
  .ble-status {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .dot.disconnected { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .dot.connecting   { background: var(--warn);   box-shadow: 0 0 6px var(--warn); animation: pulse 1s infinite; }
  .dot.connected    { background: var(--success); box-shadow: 0 0 8px var(--success); }

  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  #ble-status-text { font-size: 0.82rem; color: var(--text); }
  #ble-device-name { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: bold;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 8px;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:not(:disabled):hover { background: #00bfa0; }

  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-secondary:not(:disabled):hover { background: rgba(0,212,170,0.08); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  .btn-warn {
    background: var(--accent2);
    color: #fff;
  }

  /* Queue display */
  .queue-item {
    background: rgba(0,212,170,0.06);
    border: 1px solid rgba(0,212,170,0.2);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 0.78rem;
  }

  .queue-item .qi-label {
    color: var(--accent);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .queue-item pre {
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--muted);
    font-size: 0.72rem;
    max-height: 80px;
    overflow: hidden;
  }

  .empty-queue {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 20px;
  }

  /* Log */
  #log-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    height: 130px;
    overflow-y: auto;
    font-size: 0.7rem;
    line-height: 1.6;
  }

  .log-line { color: var(--muted); }
  .log-line.ok  { color: var(--success); }
  .log-line.err { color: var(--danger); }
  .log-line.info { color: var(--accent); }
  .log-line.warn { color: var(--warn); }

  /* ACK badge */
  .ack-flash {
    position: fixed;
    top: 20px; right: 20px;
    background: var(--success);
    color: #000;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 999;
  }
  .ack-flash.show { opacity: 1; }

  /* Return POS prompt */
  .return-prompt {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 2px solid var(--accent);
    padding: 16px;
    z-index: 100;
  }

  .return-prompt p { font-size: 0.85rem; margin-bottom: 12px; text-align: center; }

  .return-row { display: flex; gap: 8px; }
  .return-row .btn { margin-bottom: 0; flex: 1; }

  /* Settings */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-row label { color: var(--muted); font-size: 0.72rem; }

  input[type="number"] {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.8rem;
    padding: 4px 8px;
    width: 70px;
    text-align: right;
  }
</style>
<!-- 僅 codepage cpexcel（CP950）；避免與 encoding-japanese 雙庫分支 -->
<script src="https://cdn.jsdelivr.net/npm/codepage@1.15.0/dist/cpexcel.full.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="ack-flash" id="ack-flash">Print OK</div>

<header>
  <div class="printer-icon">
    <svg viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
  </div>
  <div>
    <h1>GP-2270T Receiver <span>Bluetooth Print Bridge</span></h1>
  </div>
</header>

<!-- BLE Connection Card -->
<div class="card">
  <div class="card-title">[ 01 ] 藍牙連線</div>

  <div class="ble-status">
    <div class="dot disconnected" id="ble-dot"></div>
    <div>
      <div id="ble-status-text">尚未連線</div>
      <div id="ble-device-name">--</div>
    </div>
  </div>

  <button class="btn btn-primary" id="btn-connect">連線打印機</button>
  <button class="btn btn-danger"  id="btn-disconnect" style="display:none">斷線</button>
</div>

<!-- Print Queue Card -->
<div class="card">
  <div class="card-title">[ 02 ] 待印佇列</div>
  <div id="queue-display">
    <div class="empty-queue">等待 POS 送單...</div>
  </div>
  <button class="btn btn-secondary" id="btn-test-print" disabled>測試打印（固定內容）</button>
  <button class="btn btn-warn" id="btn-manual-print" disabled>手動列印最新資料</button>
</div>

<!-- Settings Card -->
<div class="card">
  <div class="card-title">[ 03 ] 設定</div>
  <div class="setting-row">
    <span>每包延遲 (ms)</span>
    <div><label>chunk delay</label><br><input type="number" id="cfg-chunk-delay" value="30" min="10" max="200"></div>
  </div>
  <div class="setting-row">
    <span>BLE 分段大小</span>
    <div><label>固定 20 bytes（低功耗 MTU 安全值）</label><br><input type="number" id="cfg-chunk-size" value="20" min="20" max="20" readonly title="寫入韌體每包上限 20 bytes，已鎖定"></div>
  </div>
</div>

<!-- Log Card -->
<div class="card">
  <div class="card-title">[ 04 ] 系統紀錄</div>
  <div id="log-box"></div>
  <button class="btn btn-secondary" id="btn-clear-log" style="margin-top:10px;font-size:0.75rem;padding:8px;">清除記錄</button>
</div>

<script>
/* ============================================================
   PRINTER BRIDGE — index.html
   GP-2270T via Web Bluetooth (Bluefy on iOS)
   ============================================================ */

'use strict';

// ── BLE Constants ────────────────────────────────────────────
const BLE_SERVICE_UUID  = 'e7810a71-73ae-499d-8c15-faa9aef0c3f2';
const BLE_CHAR_UUID     = 'bef8d6c9-9c21-4c9e-b632-bd58c1009f9f';
// GP-2270T 也可能用 SPP UUID: 00001101-0000-1000-8000-00805f9b34fb
// 若上面不行可換成 SPP (需 Bluefy 支援)
/** 熱感捲紙寬（mm）；若為 80mm 紙請改 80 */
const TSPL_ROLL_WIDTH_MM = 58;
/** 內建字型：多數 GP/TSC 用 TSS24.BF2；仍亂碼可試 "TST24.BF2" 或 "3" */
const TSPL_FONT_ZH = 'TSS24.BF2';

// ── State ────────────────────────────────────────────────────
let bleDevice    = null;
let bleServer    = null;
let bleChar      = null;
let isConnected  = false;
let pendingData  = null;   // { text: string, backUrl: string, ts: number }
let posOpener    = null;   // reference to POS window (from postMessage source)
let lastPrintTs  = 0;
let printLock    = false;
const LS_BLE_LAST_DEVICE_ID = 'gp2270t_ble_last_device_id';
let _bleAutoReconnectBusy = false;

// ── DOM ──────────────────────────────────────────────────────
const dot         = document.getElementById('ble-dot');
const statusText  = document.getElementById('ble-status-text');
const deviceName  = document.getElementById('ble-device-name');
const btnConnect  = document.getElementById('btn-connect');
const btnDisconn  = document.getElementById('btn-disconnect');
const btnTest     = document.getElementById('btn-test-print');
const btnManual   = document.getElementById('btn-manual-print');
const queueDisp   = document.getElementById('queue-display');
const logBox      = document.getElementById('log-box');
const ackFlash    = document.getElementById('ack-flash');
const cfgDelay    = document.getElementById('cfg-chunk-delay');
const btnClearLog = document.getElementById('btn-clear-log');

// ── Logging ──────────────────────────────────────────────────
function log(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'log-line ' + type;
  const t = new Date().toTimeString().slice(0,8);
  el.textContent = '[' + t + '] ' + msg;
  logBox.appendChild(el);
  logBox.scrollTop = logBox.scrollHeight;
  // keep last 80 lines
  while (logBox.children.length > 80) logBox.removeChild(logBox.firstChild);
}

// ── UI State ─────────────────────────────────────────────────
function setBleState(state) {
  dot.className = 'dot ' + state;
  if (state === 'disconnected') {
    statusText.textContent = '尚未連線';
    deviceName.textContent = '--';
    btnConnect.style.display = '';
    btnDisconn.style.display = 'none';
    btnConnect.disabled = false;
    isConnected = false;
    bleChar = null;
    btnTest.disabled = true;
  } else if (state === 'connecting') {
    statusText.textContent = '連線中...';
    btnConnect.disabled = true;
  } else if (state === 'connected') {
    statusText.textContent = '已連線';
    deviceName.textContent = bleDevice ? bleDevice.name || '(no name)' : '--';
    btnConnect.style.display = 'none';
    btnDisconn.style.display = '';
    isConnected = true;
    btnTest.disabled = false;
  }
}

function showAck() {
  ackFlash.classList.add('show');
  setTimeout(() => ackFlash.classList.remove('show'), 1800);
}

// ── BLE Connect ──────────────────────────────────────────────
async function connectGattFromDevice_(device) {
  bleDevice = device;
  if (!device._gp2270DisconnectBound) {
    device._gp2270DisconnectBound = true;
    device.addEventListener('gattserverdisconnected', onBleDisconnected);
  }

  log('連接 GATT: ' + (bleDevice.name || bleDevice.id || '?'), 'info');
  bleServer = await device.gatt.connect();

  let service;
  try {
    service = await bleServer.getPrimaryService(BLE_SERVICE_UUID);
    log('Service OK: 18f0', 'ok');
  } catch (e) {
    log('18f0 不可用，嘗試取得所有服務...', 'warn');
    const services = await bleServer.getPrimaryServices();
    log('找到 ' + services.length + ' 個服務', 'info');
    service = services[0];
    log('使用服務: ' + service.uuid, 'info');
  }

  let char;
  try {
    char = await service.getCharacteristic(BLE_CHAR_UUID);
    log('Characteristic OK: 2af1', 'ok');
  } catch (e) {
    const chars = await service.getCharacteristics();
    log('找到 ' + chars.length + ' 個 characteristic', 'info');
    char = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
    if (!char) char = chars[0];
    log('使用 char: ' + char.uuid, 'info');
  }

  bleChar = char;
  try {
    localStorage.setItem(LS_BLE_LAST_DEVICE_ID, bleDevice.id);
  } catch (eLs) { /* 略 */ }

  setBleState('connected');
  log('打印機連線成功！已記住裝置 ID（供自動回連）', 'ok');

  if (pendingData && !printLock) {
    updateQueueDisplay(pendingData);
    try {
      log('有待印資料，連線後自動送印', 'info');
      await autoPrint(pendingData);
    } catch (eAuto) {
      log('自動送印: ' + (eAuto && eAuto.message ? eAuto.message : String(eAuto)), 'warn');
    }
  }
}

async function tryAutoReconnectBle_() {
  if (!navigator.bluetooth || isConnected || _bleAutoReconnectBusy) return;
  let id = '';
  try {
    id = localStorage.getItem(LS_BLE_LAST_DEVICE_ID) || '';
  } catch (e) { return; }
  if (!id) return;
  if (!navigator.bluetooth.getDevices) {
    log('此瀏覽器不支援 Bluetooth.getDevices，無法自動回連', 'warn');
    return;
  }
  _bleAutoReconnectBusy = true;
  try {
    const list = await navigator.bluetooth.getDevices();
    const dev = list.find(d => d && d.id === id);
    if (!dev) {
      log('未找到已授權的記憶裝置，請再手動連線一次', 'info');
      return;
    }
    setBleState('connecting');
    log('自動回連：' + (dev.name || id), 'info');
    await connectGattFromDevice_(dev);
  } catch (e) {
    setBleState('disconnected');
    log('自動回連失敗: ' + (e && e.message ? e.message : e), 'warn');
  } finally {
    _bleAutoReconnectBusy = false;
  }
}

btnConnect.addEventListener('click', async () => {
  if (!navigator.bluetooth) {
    log('此瀏覽器不支援 Web Bluetooth', 'err');
    alert('請使用 Bluefy 開啟此頁');
    return;
  }
  setBleState('connecting');
  log('掃描藍牙裝置...', 'info');
  try {
    const dev = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [BLE_SERVICE_UUID, '00001101-0000-1000-8000-00805f9b34fb']
    });
    await connectGattFromDevice_(dev);
  } catch (err) {
    setBleState('disconnected');
    log('連線失敗: ' + err.message, 'err');
  }
});

btnDisconn.addEventListener('click', async () => {
  if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
  }
  setBleState('disconnected');
  log('已手動斷線', 'warn');
});

function onBleDisconnected() {
  setBleState('disconnected');
  log('藍牙連線中斷', 'warn');
}

// ── Print Engine ──────────────────────────────────────────────
/** BLE 寫入特徵值每段最大長度（MTU / ATT 限制，避免單次 write 丟包或斷線） */
const BLE_WRITE_CHUNK_BYTES = 20;

/**
 * BLE 送印位元組：優先 codepage **CP950（繁體 Big5）**；encoding-japanese 的 BIG5 常不可靠勿放最前。
 * 主控台可設 window.GP2270T_FORCE_UTF8 = true 強制 UTF-8（少數新韌體用 UTF-8 內文）。
 * TSPL 工作：僅將 TEXT 指令最後一個引號內文轉 CP950，指令列其餘字元維持 UTF-8（等同 ASCII），避免整段混編造成亂碼。
 */
function u8concat_(arrays) {
  let len = 0;
  for (let i = 0; i < arrays.length; i++) len += arrays[i].length;
  const out = new Uint8Array(len);
  let off = 0;
  for (let i = 0; i < arrays.length; i++) {
    out.set(arrays[i], off);
    off += arrays[i].length;
  }
  return out;
}

function unescapeTsplTextInner_(raw) {
  let out = '';
  for (let i = 0; i < raw.length; i++) {
    if (raw[i] === '\\' && i + 1 < raw.length) {
      const n = raw[++i];
      if (n === '"' || n === '\\') out += n;
      else out += '\\' + n;
    } else out += raw[i];
  }
  return out;
}

/** @returns {Uint8Array|null} */
function encodeTsplBig5TextQuotesOnly_(s) {
  if (typeof cptable === 'undefined' || !cptable.utils || typeof cptable.utils.encode !== 'function') return null;
  const t = String(s == null ? '' : s).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = t.split('\n');
  const lineRe = /^\s*(TEXT\s+\d+,\d+,\s*"(?:\\.|[^"\\])*",\s*\d+,\s*\d+,\s*\d+,\s*")((?:\\.|[^"\\])*)("\s*)$/i;
  const te = new TextEncoder();
  const chunks = [];
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    const sep = li < lines.length - 1 ? '\n' : '';
    if (/^\s*TEXT\b/i.test(line) && !lineRe.test(line)) return null;
    const m = line.match(lineRe);
    if (m) {
      const inner = unescapeTsplTextInner_(m[2]);
      let innerBytes;
      try {
        innerBytes = new Uint8Array(cptable.utils.encode(950, inner.normalize('NFC')));
      } catch (eIn) {
        return null;
      }
      chunks.push(te.encode(m[1]));
      chunks.push(innerBytes);
      chunks.push(te.encode(m[3] + sep));
    } else {
      chunks.push(te.encode(line + sep));
    }
  }
  return u8concat_(chunks);
}

function encodePrinterBytes_(text) {
  const s = String(text == null ? '' : text);
  try {
    if (window.GP2270T_FORCE_UTF8 === true) {
      log('已強制 UTF-8（GP2270T_FORCE_UTF8）', 'info');
      return new TextEncoder().encode(s);
    }
  } catch (eF) { /* 略 */ }
  try {
    if (typeof cptable !== 'undefined' && cptable.utils && typeof cptable.utils.encode === 'function') {
      try {
        if (isProbablyTsplJob_(s)) {
          const splitBytes = encodeTsplBig5TextQuotesOnly_(s);
          if (splitBytes !== null) return splitBytes;
        }
        const out = cptable.utils.encode(950, s);
        if (out != null && (typeof out.length === 'number' || typeof out.byteLength === 'number')) {
          return new Uint8Array(out);
        }
      } catch (e950) {
        try {
          const out2 = cptable.utils.encode(54936, s);
          if (out2 != null && (typeof out2.length === 'number' || typeof out2.byteLength === 'number')) {
            log('CP950 例外，已改用 GB18030', 'warn');
            return new Uint8Array(out2);
          }
        } catch (eGb) { /* 略 */ }
      }
    }
  } catch (e) { /* 略 */ }
  try {
    if (typeof Encoding !== 'undefined' && Encoding.convert) {
      try {
        const utf8bytes = new TextEncoder().encode(s);
        const big5a = Encoding.convert(utf8bytes, 'BIG5', 'UTF8');
        if (big5a && big5a.length) {
          log('已用 encoding-japanese BIG5（codepage 不可用時）', 'warn');
          return new Uint8Array(big5a);
        }
      } catch (eA) { /* 略 */ }
      if (Encoding.stringToCode) {
        try {
          const uni = Encoding.stringToCode(s);
          const big5b = Encoding.convert(uni, { to: 'BIG5', from: 'UNICODE' });
          if (big5b && big5b.length) {
            log('已用 encoding-japanese UNICODE→BIG5', 'warn');
            return new Uint8Array(big5b);
          }
        } catch (eB) { /* 略 */ }
      }
    }
  } catch (e0) { /* 略 */ }
  log('無可用 Big5 表，改用 UTF-8', 'warn');
  return new TextEncoder().encode(s);
}

/** 送原始列印位元組（Big5 優先）；等同舊 sendToprinter */
async function sendRawText(text) {
  if (!bleChar) throw new Error('無 characteristic');
  if (!isConnected) throw new Error('BLE 未連線');

  const bytes = encodePrinterBytes_(text);
  const CHUNK   = BLE_WRITE_CHUNK_BYTES;
  const DELAY   = Math.max(10, parseInt(cfgDelay.value, 10) || 30);

  log('送印 ' + bytes.length + ' bytes（CP950/Big5 優先），每包≤' + CHUNK + ' bytes，共 ' + Math.ceil(bytes.length / CHUNK) + ' 包', 'info');

  for (let i = 0; i < bytes.length; i += CHUNK) {
    const chunk = bytes.slice(i, i + CHUNK);
    try {
      if (bleChar.properties.writeWithoutResponse) {
        await bleChar.writeValueWithoutResponse(chunk);
      } else {
        await bleChar.writeValue(chunk);
      }
    } catch (e) {
      await sleep(50);
      if (bleChar.properties.writeWithoutResponse) {
        await bleChar.writeValueWithoutResponse(chunk);
      } else {
        await bleChar.writeValue(chunk);
      }
    }
    if (i + CHUNK < bytes.length) await sleep(DELAY);
  }
  log('送印完成', 'ok');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/** 已有完整 TSPL（行首 PRINT）則不重包；避免英文句中 print 誤判 */
function isProbablyTsplJob_(raw) {
  const t = String(raw == null ? '' : raw).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  return /(?:^|\n)\s*PRINT\s+\d+/im.test(t);
}

/**
 * 捲紙一張：DIRECTION 0,0 多數為「由上往下」正讀；若仍顛倒可改 TSPL_DIRECTION_MODE 為 1。
 * TEXT 用 TST24.BF2 + 送印端 CP950 位元組，對應繁中內建字型。
 */
const TSPL_DIRECTION_MODE = 0;
function buildRollTsplBlock_(lines, startIdx, count, widthMm) {
  const x0 = 10;
  const y0 = 20;
  const stepY = 40;
  const font = TSPL_FONT_ZH;
  const n = count;
  const tailDots = 100;
  const totalDots = y0 + (n > 0 ? (n - 1) * stepY : 0) + tailDots;
  const hMm = Math.min(3200, Math.max(16, Math.ceil(totalDots / 8)));

  const parts = [];
  parts.push('SET TEAR ON');
  parts.push('SIZE ' + widthMm + ' mm, ' + hMm + ' mm');
  parts.push('GAP 0 mm, 0 mm');
  parts.push('CLS');
  parts.push('DIRECTION ' + TSPL_DIRECTION_MODE + ',0');
  parts.push('REFERENCE 0,0');
  parts.push('OFFSET 0');
  for (let k = 0; k < n; k++) {
    const line = lines[startIdx + k];
    let esc = String(line).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    if (esc.length > 120) esc = esc.slice(0, 120) + '...';
    const y = y0 + k * stepY;
    parts.push('TEXT ' + x0 + ',' + y + ',"' + font + '",0,1,1,"' + esc + '"');
  }
  parts.push('PRINT 1,1');
  return parts.join('\n');
}

function tsplMinimalRoll_() {
  return [
    'SET TEAR ON',
    'SIZE ' + TSPL_ROLL_WIDTH_MM + ' mm, 18 mm',
    'GAP 0 mm, 0 mm',
    'CLS',
    'DIRECTION ' + TSPL_DIRECTION_MODE + ',0',
    'REFERENCE 0,0',
    'OFFSET 0',
    'PRINT 1,1',
    ''
  ].join('\n');
}

/**
 * 熱感捲紙：DIRECTION 0,0（由上往下）；內文 TST24.BF2 + 送印 CP950/Big5。
 * 原稿若已含行首 PRINT n（POS 標籤模板等）則原樣送出。
 */
function ensureTsplForManualPrint_(raw) {
  const s = String(raw == null ? '' : raw).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  if (!s.trim()) return '\n';
  if (isProbablyTsplJob_(s)) {
    return s.endsWith('\n') ? s : s + '\n';
  }

  const lines = s.split('\n').map(function (ln) { return ln.replace(/\r$/, ''); });
  const nonempty = [];
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].trim()) nonempty.push(lines[i]);
  }
  if (!nonempty.length) return tsplMinimalRoll_();

  const maxLinesPerBlock = 48;
  const blocks = [];
  let idx = 0;
  while (idx < nonempty.length) {
    const take = Math.min(maxLinesPerBlock, nonempty.length - idx);
    blocks.push(buildRollTsplBlock_(nonempty, idx, take, TSPL_ROLL_WIDTH_MM));
    idx += take;
  }
  log('純文字已包成捲紙 TSPL（' + blocks.length + ' 段；寬 ' + TSPL_ROLL_WIDTH_MM + ' mm、PRINT 1,1）', 'info');
  return blocks.join('\n') + '\n';
}

// ── Auto Print Flow ───────────────────────────────────────────
async function autoPrint(data) {
  if (printLock) { log('列印鎖定中，略過', 'warn'); return; }
  printLock = true;

  try {
    const payload = ensureTsplForManualPrint_(data.text);
    await sendRawText(payload);
    showAck();
    lastPrintTs = data.ts;
    pendingData = null;
    updateQueueDisplay(null);

    sendAckToPos('PRINT_ACK:success:' + data.ts);

  } catch (err) {
    log('列印失敗: ' + err.message, 'err');
    sendAckToPos('PRINT_ACK:error:' + err.message);
  } finally {
    printLock = false;
  }
}

function sendAckToPos(msg) {
  // Try postMessage to opener
  if (posOpener && !posOpener.closed) {
    try {
      posOpener.postMessage({ type: 'PRINTER_ACK', payload: msg }, '*');
      log('ACK 送回 POS (postMessage)', 'ok');
      return;
    } catch(e) {}
  }
  if (window.opener && !window.opener.closed) {
    try {
      window.opener.postMessage({ type: 'PRINTER_ACK', payload: msg }, '*');
      log('ACK 送回 opener', 'ok');
      return;
    } catch(e) {}
  }
  log('ACK: 無法回傳 (opener 不可用)', 'warn');
}

// ── Data Reception ────────────────────────────────────────────
function parseHashData() {
  const hash = window.location.hash;
  if (!hash || hash.length < 6) return null;

  try {
    // Format: #data=BASE64URL&back=URL&ts=TIMESTAMP
    const params = new URLSearchParams(hash.slice(1)); // remove leading #
    const dataB64 = params.get('data');
    const backUrl = params.get('back') || '';
    const ts      = parseInt(params.get('ts') || '0');

    if (!dataB64) return null;

    // Decode: base64url -> bytes -> text
    const text = decodeBase64ToText(dataB64);
    return { text, backUrl, ts };
  } catch (e) {
    log('Hash 解碼失敗: ' + e.message, 'err');
    return null;
  }
}

function decodeBase64ToText(b64) {
  // 依需求改用 escape 路徑，確保與 POS 端編碼相容
  return decodeURIComponent(escape(atob(String(b64 || ''))));
}

function updateQueueDisplay(data) {
  if (!data) {
    queueDisp.innerHTML = '<div class="empty-queue">等待 POS 送單...</div>';
    btnManual.disabled = true;
    return;
  }
  queueDisp.innerHTML = `
    <div class="queue-item">
      <div class="qi-label">待印資料 (ts: ${data.ts})</div>
      <pre>${data.text.slice(0, 200)}${data.text.length > 200 ? '...' : ''}</pre>
    </div>`;
  // 有待印資料時務必保持可按：未連線時按了會在 log 提示先連線；若先前因「先送單後連線」被灰掉，連上後也不會永遠無法按
  btnManual.disabled = false;
}

async function receivePrintData(data) {
  // Dedup: ignore same timestamp
  if (data.ts && data.ts === lastPrintTs) {
    log('重複資料 (ts=' + data.ts + ')，略過', 'warn');
    return;
  }

  log('收到待印資料 (ts=' + data.ts + ')', 'info');
  pendingData = data;
  updateQueueDisplay(data);

  if (isConnected && bleChar) {
    log('待印資料已更新，請按「手動列印最新資料」。', 'info');
  } else {
    log('BLE 未連線，資料已暫存。請先連線打印機後再手動列印。', 'warn');
    setTimeout(function () {
      tryAutoReconnectBle_().catch(function () { /* 略 */ });
    }, 400);
  }
}

// ── Message Listener (Primary Channel) ───────────────────────
window.addEventListener('message', async (event) => {
  // Accept any origin (POS is on different domain)
  const msg = event.data;
  if (!msg || typeof msg !== 'object') return;

  if (msg.type === 'PRINT_JOB') {
    log('收到 postMessage 列印任務', 'info');
    // Save sender reference for ACK
    posOpener = event.source;

    const data = {
      text   : msg.text    || '',
      backUrl: msg.backUrl || '',
      ts     : msg.ts      || Date.now()
    };

    if (!data.text) { log('postMessage: 空資料', 'err'); return; }
    await receivePrintData(data);
  }

  if (msg.type === 'PRINTER_PING') {
    // POS is checking if this window is alive
    event.source.postMessage({ type: 'PRINTER_PONG', ready: isConnected }, '*');
    log('PING received -> PONG sent (connected=' + isConnected + ')', 'info');
  }
});

// ── Hash Listener (Fallback Channel) ─────────────────────────
function handleIncomingData() {
  console.log('偵測到 Hash 變化，準備打印...');
  const data = parseHashData();
  if (!data || !data.text) return;
  if (data.ts && data.ts === lastPrintTs) return; // already processed
  receivePrintData(data);
  // Clear hash after reading (prevents re-trigger on visibility change)
  // Use replaceState to avoid adding history entry
  history.replaceState(null, '', window.location.pathname + window.location.search);
}

window.addEventListener('hashchange', () => {
  log('hashchange triggered', 'info');
  handleIncomingData();
});

// ── Manual Print Button ───────────────────────────────────────
btnManual.addEventListener('click', async () => {
  if (!pendingData) { log('無待印資料', 'warn'); return; }
  if (!isConnected || !bleChar) {
    log('請先按「連線打印機」完成藍牙連線後再手動列印', 'err');
    return;
  }
  log('手動觸發列印', 'info');
  await autoPrint(pendingData);
});

btnTest.addEventListener('click', async () => {
  if (!isConnected || !bleChar) {
    log('測試打印失敗：請先連線打印機', 'err');
    return;
  }
  const testTspl = [
    'SET TEAR ON',
    'SIZE ' + TSPL_ROLL_WIDTH_MM + ' mm, 30 mm',
    'GAP 0 mm, 0 mm',
    'CLS',
    'DIRECTION ' + TSPL_DIRECTION_MODE + ',0',
    'REFERENCE 0,0',
    'OFFSET 0',
    'TEXT 10,20,"' + TSPL_FONT_ZH + '",0,1,1,"上往下 測試 PRINT"',
    'PRINT 1,1'
  ].join('\n') + '\n';
  try {
    log('送出測試打印...', 'info');
    await sendRawText(testTspl);
    log('測試打印完成', 'ok');
  } catch (e) {
    log('測試打印失敗: ' + e.message, 'err');
  }
});

// ── Clear Log ─────────────────────────────────────────────────
btnClearLog.addEventListener('click', () => { logBox.innerHTML = ''; });

// ── Init ──────────────────────────────────────────────────────
function init() {
  try {
    window.name = 'Gprinter_Handler';
  } catch (e) { /* 略 */ }
  log('Printer Bridge 就緒', 'ok');
  log('收到 POS 資料後請按「手動列印最新資料」送印（不自動列印、不跳回 POS）。', 'info');
  handleIncomingData();
  tryAutoReconnectBle_().catch(function () { /* 略 */ });
}

document.addEventListener('visibilitychange', function () {
  if (document.visibilityState !== 'visible') return;
  if (isConnected || !pendingData) return;
  try {
    if (localStorage.getItem(LS_BLE_LAST_DEVICE_ID)) {
      tryAutoReconnectBle_().catch(function () { /* 略 */ });
    }
  } catch (e) { /* 略 */ }
});

/* 與 POS 同網域時可免彈窗即時收單；跨網域時仍以 postMessage / hash 為主 */
let printBroadcastChannel = null;
function initPrintBroadcastChannel_() {
  try {
    printBroadcastChannel = new BroadcastChannel('pos-ble-print-v1');
    printBroadcastChannel.onmessage = function (ev) {
      const msg = ev.data;
      if (!msg || msg.type !== 'PRINT_JOB') return;
      posOpener = null;
      receivePrintData({
        text: msg.text || '',
        backUrl: msg.backUrl || '',
        ts: msg.ts || Date.now()
      });
    };
  } catch (e) {
    log('BroadcastChannel 不可用（可略過）', 'warn');
  }
}

document.addEventListener('DOMContentLoaded', function () {
  initPrintBroadcastChannel_();
  init();
});
</script>
