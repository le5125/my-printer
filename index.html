<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BLE Printer Test</title>
</head>
<body>

<h2>BLE Printer Test</h2>

<button onclick="connect()">連接印表機</button>
<button onclick="printTest()">測試列印</button>

<script>
let device;
let characteristic;

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [
        '18f0',
        'e7810a71-73ae-499d-8c15-faa9aef0c3f2'
      ]
    });

    const server = await device.gatt.connect();

    const service = await server.getPrimaryService(
      'e7810a71-73ae-499d-8c15-faa9aef0c3f2'
    );

    characteristic = await service.getCharacteristic(
      'bef8d6c9-9c21-4c9e-b632-bd58c1009f9f'
    );

    alert("已連接印表機");
  } catch (error) {
    console.log(error);
    alert("連接失敗");
  }
}

async function printTest() {
  if (!characteristic) {
    alert("請先連接");
    return;
  }

  // ESC/POS 指令（初始化 + 文字 + 換行）
  const encoder = new TextEncoder();

  let data = new Uint8Array([
    0x1B, 0x40, // 初始化
  ]);

  let text = encoder.encode("TEST PRINT\nHello World\n\n\n");

  let finalData = new Uint8Array(data.length + text.length);
  finalData.set(data);
  finalData.set(text, data.length);

  try {
    await characteristic.writeValue(finalData);
    alert("已送出列印");
  } catch (error) {
    console.log(error);
    alert("列印失敗");
  }
}
</script>

</body>
</html>
