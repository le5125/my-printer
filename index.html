<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>POS 列印接收中心 · GP-2270T / TSPL</title>
  <!-- 佳博 GP-2270T 等 2 吋機：熱感連續紙 TSPL；此頁 SIZE 寬度 58mm（僅寬、不設高度）。繁中：CP950→TST24.BF2。 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codepage@1.15.0/dist/cpexcel.full.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e8eef5;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --ok: #22c55e;
      --err: #ef4444;
      --banner: #1e3a5f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      line-height: 1.5;
    }
    h1 { font-size: 1.15rem; margin: 0 0 10px; font-weight: 700; }
    .card {
      max-width: 520px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 14px;
      padding: 16px 14px;
      border: 1px solid rgba(255,255,255,.08);
    }
    .mode-box {
      background: var(--banner);
      border: 1px solid rgba(59, 130, 246, 0.35);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .mode-box .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .mode-box .value { font-size: 1.05rem; font-weight: 700; color: #93c5fd; }
    .preview-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(255,255,255,.1);
      min-height: 120px;
      max-height: 280px;
      overflow-y: auto;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #cbd5e1;
    }
    .hint { font-size: 0.78rem; color: var(--muted); margin: 8px 0 0; }
    .warn-inline {
      font-size: 0.8rem;
      color: #fecaca;
      background: rgba(127, 29, 29, 0.35);
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 8px;
      line-height: 1.45;
    }
    .uuid-row {
      margin: 10px 0 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .uuid-row label { font-size: 0.78rem; color: var(--muted); }
    .uuid-input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(0,0,0,.25);
      color: var(--text);
      font-family: ui-monospace, Consolas, monospace;
      font-size: 12px;
    }
    .row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    button {
      flex: 1;
      min-width: 120px;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.secondary { background: #334155; color: #e2e8f0; }
    #btn-unlock-ui {
      background: #78350f;
      color: #fffbeb;
      border: 2px solid #fbbf24;
    }
    #log {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(0,0,0,.35);
      font-family: ui-monospace, Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 140px;
      overflow-y: auto;
      color: #94a3b8;
    }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
  </style>
</head>
<body>
  <div class="card">
    <h1>POS 列印接收中心</h1>
    <div class="mode-box">
      <div class="label">目前接收模式</div>
      <div class="value" id="rc-mode-display">—</div>
    </div>
    <p class="hint">支援網址參數：<code>mode</code>=detail｜label、<code>data</code>=訂單 JSON（URL 編碼）、<code>auto</code>=1（GATT 就緒後延遲 1.5 秒自動列印）。輸出對齊 <strong>佳博 GP-2270T</strong>：<strong>58mm</strong> 熱感連續紙／票據（無 GAP，TSPL）。</p>

    <div class="uuid-row">
      <label for="custom-service-uuid">BLE Service UUID</label>
      <input type="text" id="custom-service-uuid" class="uuid-input" value="49535343-fe7d-4ae5-8fa9-9fafd205e455" autocomplete="off" spellcheck="false" />
    </div>
    <div class="uuid-row">
      <label for="custom-tx-char-uuid">寫入特徵 TX UUID</label>
      <input type="text" id="custom-tx-char-uuid" class="uuid-input" value="49535343-8841-43f4-a8d4-ecbe34729bb3" autocomplete="off" spellcheck="false" />
    </div>

    <div class="row">
      <button type="button" id="btn-connect">連接印表機</button>
      <button type="button" id="btn-connect-scan" class="secondary">掃描 BLE</button>
    </div>
    <div class="row">
      <button type="button" id="btn-disconnect" class="secondary" disabled>中斷連線</button>
      <button type="button" id="btn-unlock-ui">解鎖</button>
    </div>
    <div class="row">
      <button type="button" id="btn-print" disabled>列印</button>
    </div>

    <div class="label" style="font-size:0.78rem;color:var(--muted);margin-top:4px;">列印預覽（文字）</div>
    <div id="rc-preview" class="preview-box" aria-live="polite">（尚無資料）</div>
    <div id="rc-detail-warn" class="warn-inline" style="display:none;"></div>

    <div id="log" aria-live="polite"></div>
  </div>

  <script>
(function () {
  'use strict';

  let isPrinting = false;
  window.hasPrinted = false;

  var PRINTER_NAME = 'Printer_9AE9';
  var PRINTER_NAME_BLE = 'Printer_9AE9_BLE';
  var OPTIONAL_SERVICE_UUIDS = [
    '49535343-fe7d-4ae5-8fa9-9fafd205e455',
    'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
    '000018f0-0000-1000-8000-00805f9b34fb',
    '6e400001-b5a3-f393-e0a9-e50e24dcca9e',
    '0000fff0-0000-1000-8000-00805f9b34fb'
  ];
  var OPTIONAL_SERVICES_MAX = 16;
  var REQUEST_DEVICE_TIMEOUT_MS = 38000;

  /** 由網址解析；onload 填入 */
  var rcUrlMode_ = '';
  var rcUrlOrder_ = null;
  var rcUrlAuto_ = false;
  var rcDetailLengthWarn_ = '';

  function fmtErr_(e) {
    if (!e) return '';
    return (e.name ? e.name + ' — ' : '') + (e.message || String(e));
  }

  function sleepMs_(ms) {
    return new Promise(function (resolve) { setTimeout(resolve, ms); });
  }

  function normalizeUuid128_(str) {
    var raw = String(str || '').trim().replace(/\s+/g, '').toLowerCase();
    if (!raw) return null;
    raw = raw.replace(/^0x/g, '');
    if (raw.indexOf('-') >= 0) {
      if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/.test(raw)) return raw;
      return null;
    }
    if (raw.length === 32 && /^[0-9a-f]{32}$/.test(raw)) {
      return raw.slice(0, 8) + '-' + raw.slice(8, 12) + '-' + raw.slice(12, 16) + '-' + raw.slice(16, 20) + '-' + raw.slice(20);
    }
    if (raw.length === 4 && /^[0-9a-f]{4}$/.test(raw)) {
      return '0000' + raw + '-0000-1000-8000-00805f9b34fb';
    }
    if (raw.length === 8 && /^[0-9a-f]{8}$/.test(raw)) {
      return raw.slice(0, 4) + raw.slice(4, 8) + '-0000-1000-8000-00805f9b34fb';
    }
    return null;
  }

  function buildOptionalServicesForRequest_() {
    var out = [];
    var seen = {};
    var inp = document.getElementById('custom-service-uuid');
    var customRaw = inp ? String(inp.value || '') : '';
    if (customRaw) {
      customRaw.split(/[,;，]/).forEach(function (piece) {
        var u = normalizeUuid128_(piece);
        if (u && !seen[u]) {
          seen[u] = true;
          out.push(u);
        }
      });
    }
    var i;
    for (i = 0; i < OPTIONAL_SERVICE_UUIDS.length; i++) {
      var v = OPTIONAL_SERVICE_UUIDS[i];
      if (!seen[v]) {
        seen[v] = true;
        out.push(v);
      }
      if (out.length >= OPTIONAL_SERVICES_MAX) break;
    }
    while (out.length > OPTIONAL_SERVICES_MAX) out.pop();
    return out;
  }

  var logEl = document.getElementById('log');
  var btnConnect = document.getElementById('btn-connect');
  var btnConnectScan = document.getElementById('btn-connect-scan');
  var btnDisconnect = document.getElementById('btn-disconnect');
  var btnPrint = document.getElementById('btn-print');
  var btnUnlock = document.getElementById('btn-unlock-ui');
  var elMode = document.getElementById('rc-mode-display');
  var elPreview = document.getElementById('rc-preview');
  var elDetailWarn = document.getElementById('rc-detail-warn');

  function log(msg, cls) {
    var line = '[' + new Date().toLocaleTimeString('zh-TW') + '] ' + msg + '\n';
    var span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = line;
    logEl.appendChild(span);
    logEl.scrollTop = logEl.scrollHeight;
  }

  /**
   * Unicode → Big5（CP950）供 TST24.BF2（與原 index / pos 相同 cpexcel 路徑）。
   */
  function encodeBig5OrThrow(str) {
    if (typeof cptable === 'undefined' || !cptable.utils || typeof cptable.utils.encode !== 'function') {
      throw new Error('codepage（cpexcel）未載入。');
    }
    if (!cptable.utils.hascp(950)) {
      throw new Error('CP950 編碼表未就緒。');
    }
    var bytes = cptable.utils.encode(950, str);
    return new Uint8Array(bytes);
  }

  function concatUint8Arrays(parts) {
    var total = 0;
    for (var i = 0; i < parts.length; i++) total += parts[i].length;
    var out = new Uint8Array(total);
    var o = 0;
    for (var j = 0; j < parts.length; j++) {
      out.set(parts[j], o);
      o += parts[j].length;
    }
    return out;
  }

  function asciiBytes(s) {
    return new TextEncoder().encode(s);
  }

  var TSPL_FONT_BIG5 = 'TST24.BF2';

  function formatDateZhTw_() {
    return new Date().toLocaleString('zh-TW', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    });
  }

  /**
   * 熱感連續紙：僅設寬度、不設高度、無 GAP。
   * 指令順序：CLS → SIZE → DIRECTION 1；結尾僅一組 PRINT 1,1 → END（整份 payload 僅一處 PRINT）。
   */
  var TSPL_PAPER_WIDTH_MM = 58;

  function tsplThermalHeaderBytes_() {
    return asciiBytes('CLS\r\nSIZE ' + TSPL_PAPER_WIDTH_MM + ' mm,\r\nDIRECTION 1\r\n');
  }

  /** 每份明細結尾：單一 PRINT 1,1 與 END（勿在迴圈內重複加入）。 */
  function tsplThermalFooterBytes_() {
    return asciiBytes('PRINT 1,1\r\nEND\r\n');
  }

  /**
   * 58mm 熱感收據：品名、數量、單價、小計；品項用 forEach 只產生 TEXT 行，PRINT 僅在 tsplThermalFooterBytes_ 一次。
   * @param {string} title 標題列（label / detail 區分用）
   */
  function buildTsplThermalReceipt_(order, title) {
    var parts = [];
    parts.push(tsplThermalHeaderBytes_());
    var y = 24;
    var lineGap = 40;
    var maxY = 1380;
    function line(txt) {
      if (y > maxY) return;
      parts.push(asciiBytes('TEXT 12,' + y + ',"' + TSPL_FONT_BIG5 + '",0,1,1,"'));
      parts.push(encodeBig5OrThrow(String(txt).slice(0, 48)));
      parts.push(asciiBytes('"\r\n'));
      y += lineGap;
    }
    line(title || '明細');
    if (order && order.date) {
      line('日期 ' + String(order.date).slice(0, 20));
    }
    var items = (order && order.items) ? order.items : [];
    if (!items.length) {
      line('（無品項）');
    } else {
      items.forEach(function (it) {
        var p = Number(it.price) || 0;
        var q = Number(it.quantity) || 0;
        var sub = p * q;
        line(String(it.name || '').slice(0, 14) + ' 數量' + q + ' 單價' + p + ' 小計' + sub);
      });
    }
    var tot = order && order.total != null ? order.total : items.reduce(function (s, it) {
      return s + (Number(it.price) || 0) * (Number(it.quantity) || 0);
    }, 0);
    line('總計 NT$' + tot);
    parts.push(tsplThermalFooterBytes_());
    return concatUint8Arrays(parts);
  }

  /** mode=label：58mm 熱感收據（品項清單） */
  function buildTsplLabelTemplate(order) {
    return buildTsplThermalReceipt_(order, '品項清單');
  }

  /** mode=detail：58mm 熱感銷售明細 */
  function buildTsplDetailTemplate(order) {
    return buildTsplThermalReceipt_(order, '銷售明細');
  }

  function buildTsplPayloadFromRc_() {
    if (rcUrlMode_ === 'label' && rcUrlOrder_) return buildTsplLabelTemplate(rcUrlOrder_);
    if (rcUrlMode_ === 'detail' && rcUrlOrder_) return buildTsplDetailTemplate(rcUrlOrder_);
    return buildTsplTestPayload_();
  }

  function buildTsplTestPayload_() {
    var parts = [];
    parts.push(tsplThermalHeaderBytes_());
    var y = 24;
    function line(txt) {
      parts.push(asciiBytes('TEXT 12,' + y + ',"' + TSPL_FONT_BIG5 + '",0,1,1,"'));
      parts.push(encodeBig5OrThrow(String(txt).slice(0, 48)));
      parts.push(asciiBytes('"\r\n'));
      y += 40;
    }
    line('58mm 熱感測試 GP-2270T');
    line('測試列印成功');
    line('繁體中文不亂碼');
    line(formatDateZhTw_());
    parts.push(tsplThermalFooterBytes_());
    return concatUint8Arrays(parts);
  }

  function previewTextForOrder_(mode, order) {
    if (!order || !order.items || !order.items.length) {
      if (mode === 'label') return '（無品項）';
      if (mode === 'detail') return '（無品項）';
    }
    var lines = [];
    if (mode === 'label') {
      lines.push('【58mm 熱感 · label】品項清單（連續紙，GP-2270T）');
      order.items.forEach(function (it) {
        var sub = (Number(it.price) || 0) * (Number(it.quantity) || 0);
        lines.push((it.name || '') + '  數量:' + it.quantity + '  單價:' + it.price + '  小計:' + sub);
      });
      lines.push('日期: ' + (order.date || formatDateZhTw_()));
    } else {
      lines.push('【58mm 熱感 · detail】銷售明細（GP-2270T）');
      order.items.forEach(function (it) {
        var sub = (Number(it.price) || 0) * (Number(it.quantity) || 0);
        lines.push((it.name || '') + '  數量:' + it.quantity + '  單價:' + it.price + '  小計:' + sub);
      });
      lines.push('總計 NT$' + (order.total != null ? order.total : ''));
    }
    return lines.join('\n');
  }

  function normalizeOrderFromJson_(obj) {
    if (!obj || typeof obj !== 'object') return null;
    var rawItems = Array.isArray(obj.items) ? obj.items
      : (Array.isArray(obj.品項) ? obj.品項
        : (Array.isArray(obj.商品) ? obj.商品
          : (Array.isArray(obj) ? obj : [])));
    var items = rawItems.map(function (it) {
      if (!it || typeof it !== 'object') return { name: '', price: 0, quantity: 0 };
      var name = it.name != null ? String(it.name)
        : (it.品名 != null ? String(it.品名) : (it.productName != null ? String(it.productName) : ''));
      var priceRaw = it.price != null ? it.price : (it.單價 != null ? it.單價 : it.unitPrice);
      var qtyRaw = it.quantity != null ? it.quantity : (it.數量 != null ? it.數量 : it.qty);
      var price = Number(priceRaw) || 0;
      var quantity = Number(qtyRaw) || 0;
      return { name: name, price: price, quantity: quantity };
    });
    var total = obj.total != null ? obj.total : obj.總計;
    total = total != null ? Number(total) : null;
    if (total === null || isNaN(total)) {
      total = items.reduce(function (s, it) { return s + it.price * it.quantity; }, 0);
    }
    var orderId = obj.orderId != null ? String(obj.orderId) : (obj.訂單編號 != null ? String(obj.訂單編號) : '');
    return {
      orderId: orderId,
      items: items,
      total: total,
      date: obj.date != null ? String(obj.date) : (obj.日期 != null ? String(obj.日期) : '')
    };
  }

  function parseUrlParamsOnLoad_() {
    rcUrlMode_ = '';
    rcUrlOrder_ = null;
    rcUrlAuto_ = false;
    rcDetailLengthWarn_ = '';
    try {
      var urlParams = new URLSearchParams(window.location.search);
      var modeRaw = (urlParams.get('mode') || '').toLowerCase();
      if (modeRaw === 'label' || modeRaw === 'detail') rcUrlMode_ = modeRaw;
      var autoParam = urlParams.get('auto');
      rcUrlAuto_ = String(autoParam == null ? '' : autoParam).trim() === '1';
      if (urlParams.has('auto')) {
        log('網址 auto=' + JSON.stringify(autoParam) + ' → 自動列印' + (rcUrlAuto_ ? '啟用' : '未啟用（須為 1）'), rcUrlAuto_ ? 'ok' : 'err');
      }
      var rawData = urlParams.get('data');
      if (rawData) {
        var decodedStr;
        try {
          decodedStr = decodeURIComponent(rawData);
        } catch (de) {
          log('decodeURIComponent(data) 失敗：' + fmtErr_(de) + '\n── 原始 data 參數 ──\n' + rawData, 'err');
          decodedStr = rawData;
        }
        var parsed;
        try {
          parsed = JSON.parse(decodedStr);
        } catch (je) {
          log('JSON.parse 失敗（流程：先 decodeURIComponent，再 JSON.parse）：' + fmtErr_(je) + '\n── 解碼後字串（供檢查，最長 1200 字）──\n' +
            decodedStr.slice(0, 1200) + (decodedStr.length > 1200 ? '\n…(截斷)' : '') +
            '\n── 原始 data 參數（URL 上未再解碼的取值）──\n' + rawData, 'err');
          throw je;
        }
        rcUrlOrder_ = normalizeOrderFromJson_(parsed);
        if (rcUrlOrder_ && (!rcUrlOrder_.items || !rcUrlOrder_.items.length)) {
          log('data 已解析為 JSON，但找不到品項陣列（支援 items／品項／商品）。\n解碼後摘要：' + decodedStr.slice(0, 400), 'err');
        }
      }
    } catch (e) {
      if (e && e.name !== 'SyntaxError') {
        log('解析網址參數失敗：' + fmtErr_(e), 'err');
      }
      rcUrlOrder_ = null;
    }
  }

  function updateDetailLengthHintOnly_(order) {
    rcDetailLengthWarn_ = '';
    if (!rcUrlMode_ || !order || !order.items) return;
    var n = order.items.length;
    if (n > 28) {
      rcDetailLengthWarn_ = '品項列數較多，熱感連續紙單次版面可能不足，請留意印出是否截斷。';
    }
  }

  function refreshRcUi_() {
    if (!elMode || !elPreview) return;
    if (!rcUrlMode_) {
      elMode.textContent = '（未指定 mode，列印為內建 58mm 熱感測試）';
    } else if (rcUrlMode_ === 'label') {
      elMode.textContent = 'label — 58mm 熱感收據（品項清單 · GP-2270T）';
    } else {
      elMode.textContent = 'detail — 58mm 熱感銷售明細（GP-2270T）';
    }
    if (rcUrlOrder_) updateDetailLengthHintOnly_(rcUrlOrder_);
    if (rcUrlMode_ && rcUrlOrder_) {
      elPreview.textContent = previewTextForOrder_(rcUrlMode_, rcUrlOrder_);
    } else if (rcUrlOrder_ && !rcUrlMode_) {
      elPreview.textContent = '已解析 data，但未指定 mode=detail|label。\n' + previewTextForOrder_('detail', rcUrlOrder_);
    } else {
      elPreview.textContent = '（無 URL 訂單資料；「列印」將送出內建 58mm 熱感測試）';
    }
    if (elDetailWarn) {
      if (rcDetailLengthWarn_) {
        elDetailWarn.style.display = 'block';
        elDetailWarn.textContent = rcDetailLengthWarn_;
      } else {
        elDetailWarn.style.display = 'none';
        elDetailWarn.textContent = '';
      }
    }
  }

  function uuidCmpStrip_(uuid) {
    return String(uuid || '').toLowerCase().replace(/-/g, '');
  }

  function getPreferredTxCharUuid_() {
    var el = document.getElementById('custom-tx-char-uuid');
    return el ? normalizeUuid128_(String(el.value || '').trim()) : null;
  }

  function pickWritableCharacteristic(chars, preferredTxUuid) {
    var i;
    var c;
    var want = preferredTxUuid ? uuidCmpStrip_(preferredTxUuid) : '';
    if (want) {
      for (i = 0; i < chars.length; i++) {
        c = chars[i];
        if (uuidCmpStrip_(c.uuid) === want && (c.properties.writeWithoutResponse || c.properties.write)) {
          return c;
        }
      }
    }
    for (i = 0; i < chars.length; i++) {
      c = chars[i];
      if (c.properties.writeWithoutResponse) return c;
    }
    for (i = 0; i < chars.length; i++) {
      c = chars[i];
      if (c.properties.write) return c;
    }
    return null;
  }

  async function logGattServiceTree_(server) {
    try {
      var svcs = await server.getPrimaryServices();
      log('── GATT 主服務 ' + svcs.length + ' 個 ──', 'ok');
      if (svcs.length === 0) {
        log('optionalServices 可能未包含實際服務 UUID。', 'err');
        return;
      }
      var i;
      var j;
      for (i = 0; i < svcs.length; i++) {
        log('服務 ' + svcs[i].uuid, 'ok');
        try {
          var chs = await svcs[i].getCharacteristics();
          for (j = 0; j < chs.length; j++) {
            var ch = chs[j];
            log('  特徵 ' + ch.uuid +
              '  write=' + !!ch.properties.write +
              ' writeNoResp=' + !!ch.properties.writeWithoutResponse, 'ok');
          }
        } catch (e1) {
          log('  （無法讀取特徵）' + fmtErr_(e1), 'err');
        }
      }
    } catch (e0) {
      log('列舉服務失敗：' + fmtErr_(e0), 'err');
    }
  }

  async function findWritableOnServer_(server) {
    var u;
    var svc;
    var chars;
    var chosen;
    var lastErr = '';
    var tryList = buildOptionalServicesForRequest_();
    var prefTx = getPreferredTxCharUuid_();

    for (u = 0; u < tryList.length; u++) {
      try {
        svc = await server.getPrimaryService(tryList[u]);
        chars = await svc.getCharacteristics();
        chosen = pickWritableCharacteristic(chars, prefTx);
        if (chosen) {
          log('已找到可寫入特徵（服務 ' + tryList[u] + '）', 'ok');
          return chosen;
        }
      } catch (e) {
        lastErr = (e && e.message) ? e.message : String(e);
      }
    }

    var allSvcs;
    try {
      allSvcs = await server.getPrimaryServices();
    } catch (e2) {
      await logGattServiceTree_(server);
      throw new Error('無法列舉服務：' + fmtErr_(e2));
    }

    var s;
    for (s = 0; s < allSvcs.length; s++) {
      try {
        chars = await allSvcs[s].getCharacteristics();
        chosen = pickWritableCharacteristic(chars, prefTx);
        if (chosen) {
          log('已找到可寫入特徵（掃描服務 ' + allSvcs[s].uuid + '）', 'ok');
          return chosen;
        }
      } catch (e3) { /* 略過 */ }
    }

    await logGattServiceTree_(server);
    throw new Error('找不到可寫入的 GATT 特徵。' + (lastErr ? '（' + lastErr + '）' : ''));
  }

  async function connectGattWithRetries_(device) {
    if (device.gatt.connected) {
      try {
        device.gatt.disconnect();
        await sleepMs_(500);
      } catch (e0) { /* 略過 */ }
    }
    var attempt;
    var lastErr;
    for (attempt = 1; attempt <= 3; attempt++) {
      try {
        log('GATT 連線（' + attempt + '/3）…');
        var server = await device.gatt.connect();
        log('GATT 已連線。', 'ok');
        await sleepMs_(400);
        return server;
      } catch (e) {
        lastErr = e;
        log('GATT 連線失敗：' + fmtErr_(e), 'err');
        if (attempt < 3) await sleepMs_(600);
      }
    }
    throw lastErr;
  }

  var bluetoothDevice = null;
  var writeCharacteristic = null;
  var connectInProgress_ = false;
  var connectWatchdogTimer_ = null;

  function setBusy(loading) {
    btnConnect.disabled = loading;
    btnConnectScan.disabled = loading;
  }

  function clearConnectWatchdog_() {
    if (connectWatchdogTimer_) {
      clearTimeout(connectWatchdogTimer_);
      connectWatchdogTimer_ = null;
    }
  }

  function armConnectWatchdog_(ms) {
    clearConnectWatchdog_();
    connectWatchdogTimer_ = setTimeout(function () {
      connectWatchdogTimer_ = null;
      if (!connectInProgress_) return;
      log('連線逾時，已解鎖。', 'err');
      connectInProgress_ = false;
      try {
        if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
          bluetoothDevice.gatt.disconnect();
        }
      } catch (e) {}
      bluetoothDevice = null;
      writeCharacteristic = null;
      btnPrint.disabled = true;
      btnDisconnect.disabled = true;
      setBusy(false);
    }, ms);
  }

  function unlockUiFromStuck_() {
    clearAutoPrintSchedule_();
    clearConnectWatchdog_();
    connectInProgress_ = false;
    try {
      if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
        bluetoothDevice.gatt.disconnect();
      }
    } catch (e) {}
    bluetoothDevice = null;
    writeCharacteristic = null;
    btnPrint.disabled = true;
    btnDisconnect.disabled = true;
    setBusy(false);
    log('已解鎖。', 'ok');
  }

  function requestDeviceWithTimeout_(opts) {
    return Promise.race([
      navigator.bluetooth.requestDevice(opts),
      new Promise(function (_, reject) {
        setTimeout(function () {
          reject(new Error('requestDevice 逾時（約 ' + Math.round(REQUEST_DEVICE_TIMEOUT_MS / 1000) + ' 秒）'));
        }, REQUEST_DEVICE_TIMEOUT_MS);
      })
    ]);
  }

  async function requestBleDevice_(mode) {
    var services = buildOptionalServicesForRequest_();
    log('optionalServices：' + services.length + ' 個', 'ok');
    var opts = { optionalServices: services };
    if (mode === 'scan') {
      opts.acceptAllDevices = true;
    } else {
      opts.filters = [
        { name: PRINTER_NAME_BLE },
        { name: PRINTER_NAME },
        { namePrefix: 'Printer_' }
      ];
    }
    var dev = await requestDeviceWithTimeout_(opts);
    log('已取得裝置物件。', 'ok');
    return dev;
  }

  function isGattReadyForWrite_() {
    return !!(writeCharacteristic && bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected);
  }

  function getCurrentOrderIdForDedup_() {
    if (!rcUrlOrder_) return '';
    var oid = rcUrlOrder_.orderId != null ? String(rcUrlOrder_.orderId).trim() : '';
    return oid;
  }

  var _autoPrintScheduleTimer_ = null;

  function clearAutoPrintSchedule_() {
    if (_autoPrintScheduleTimer_) {
      clearTimeout(_autoPrintScheduleTimer_);
      _autoPrintScheduleTimer_ = null;
    }
  }

  /**
   * 自動列印控制中心：全頁僅此一處 setTimeout 觸發 print(false)。
   * 每次呼叫先 clear 再排程，避免 onConnect／onload／重連各建一個 timer。
   */
  function requestAutoPrintFromCentral_() {
    clearAutoPrintSchedule_();
    if (!rcUrlAuto_) return;
    if (!writeCharacteristic) {
      log('auto=1：尚未取得寫入特徵，略過排程。', 'err');
      return;
    }
    if (!rcUrlMode_ || !rcUrlOrder_ || !rcUrlOrder_.items || !rcUrlOrder_.items.length) {
      log('auto=1：需有效 mode 與 data（含 items）才會自動列印。', 'err');
      return;
    }
    var curId = getCurrentOrderIdForDedup_();
    if (!curId) {
      log('auto=1：需有 orderId 才會自動列印（與 sessionStorage lastPrintedId 比對）。', 'err');
      return;
    }
    try {
      if (sessionStorage.getItem('lastPrintedId') === curId) {
        log('lastPrintedId 與本筆 orderId 相同，不排程自動列印。', 'ok');
        return;
      }
    } catch (e0) { /* 略 */ }
    _autoPrintScheduleTimer_ = setTimeout(function () {
      _autoPrintScheduleTimer_ = null;
      print(false);
    }, 1500);
    log('控制中心：已排程 1.5 秒後自動列印。', 'ok');
  }

  /** 若已授權過裝置，嘗試不經選單恢復 GATT（iframe 重載時可能成功）；自動列印僅經 requestAutoPrintFromCentral_ 排程。 */
  async function tryReconnectBleThenAutoPrint_() {
    if (!rcUrlAuto_) return;
    if (isGattReadyForWrite_()) {
      requestAutoPrintFromCentral_();
      return;
    }
    if (!navigator.bluetooth || typeof navigator.bluetooth.getDevices !== 'function') return;
    if (connectInProgress_) return;
    try {
      var list = await navigator.bluetooth.getDevices();
      if (connectInProgress_) return;
      if (isGattReadyForWrite_()) {
        requestAutoPrintFromCentral_();
        return;
      }
      if (!list || !list.length) return;
      var dev = list[0];
      bluetoothDevice = dev;
      if (!bluetoothDevice._bluefyGattDiscListener) {
        bluetoothDevice._bluefyGattDiscListener = true;
        bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
      }
      var server = await connectGattWithRetries_(bluetoothDevice);
      writeCharacteristic = await findWritableOnServer_(server);
      log('寫入特徵（自動恢復）：' + writeCharacteristic.uuid, 'ok');
      btnDisconnect.disabled = false;
      btnPrint.disabled = false;
      requestAutoPrintFromCentral_();
    } catch (e) {
      log('自動恢復藍牙失敗，請手動連接：' + fmtErr_(e), 'err');
    }
  }

  /**
   * 送出目前 TSPL（手動按鈕與自動列印共用）。
   * @param {boolean} forceBypassDedup 為 true 時略過 orderId／lastPrintedId／window.hasPrinted（手動「列印」可重複出單）。
   * 自動路徑（auto=1）：函式開頭即鎖 window.hasPrinted，同頁僅進入一次；另配合 lastPrintedId 與 isPrinting。
   */
  async function print(forceBypassDedup) {
    if (!forceBypassDedup && rcUrlAuto_) {
      if (window.hasPrinted) {
        log('本頁 auto=1 僅執行一次列印流程，已略過。', 'ok');
        return;
      }
      window.hasPrinted = true;
    }
    if (isPrinting) {
      log('列印鎖：前一筆尚在緩衝中，略過重入。', 'ok');
      return;
    }
    if (!writeCharacteristic) {
      log('請先連接印表機。', 'err');
      return;
    }
    if (!isGattReadyForWrite_()) {
      log('藍牙尚未連線，無法列印。', 'err');
      return;
    }
    if (!forceBypassDedup && rcUrlAuto_) {
      var curIdForAuto = getCurrentOrderIdForDedup_();
      if (!curIdForAuto) {
        log('自動列印：無 orderId，略過。', 'err');
        return;
      }
      try {
        if (sessionStorage.getItem('lastPrintedId') === curIdForAuto) {
          log('已列印過相同 orderId（lastPrintedId），略過。', 'ok');
          return;
        }
      } catch (eSkip) { /* 略 */ }
    }
    isPrinting = true;
    btnPrint.disabled = true;
    try {
      rcDetailLengthWarn_ = '';
      var payload = buildTsplPayloadFromRc_();
      log('送出 TSPL ' + payload.length + ' bytes', 'ok');
      await writeChunks(writeCharacteristic, payload);
      log('列印指令已送出。', 'ok');
      if (!forceBypassDedup && rcUrlAuto_) {
        var okId = getCurrentOrderIdForDedup_();
        if (okId) {
          try {
            sessionStorage.setItem('lastPrintedId', okId);
          } catch (eMark) { /* 略 */ }
        }
      }
      refreshRcUi_();
      var closeAfterAuto_ = !forceBypassDedup && rcUrlAuto_;
      setTimeout(function () {
        isPrinting = false;
        if (closeAfterAuto_) {
          try {
            window.close();
          } catch (eClose) { /* 略 */ }
        }
      }, 3000);
    } catch (err) {
      isPrinting = false;
      log('列印失敗：' + (err && err.message ? err.message : String(err)), 'err');
    } finally {
      btnPrint.disabled = false;
    }
  }

  async function connectWithMode_(mode) {
    if (!navigator.bluetooth) {
      log('不支援 Web Bluetooth。請用 Bluefy 等並 HTTPS。', 'err');
      return;
    }
    if (connectInProgress_) {
      log('連線進行中；必要時按「解鎖」。', 'err');
      return;
    }

    connectInProgress_ = true;
    armConnectWatchdog_(75000);
    setBusy(true);
    writeCharacteristic = null;

    try {
      bluetoothDevice = await requestBleDevice_(mode);
      log('裝置：' + (bluetoothDevice.name || '(無名稱)'));

      if (!bluetoothDevice._bluefyGattDiscListener) {
        bluetoothDevice._bluefyGattDiscListener = true;
        bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
      }

      var server = await connectGattWithRetries_(bluetoothDevice);
      writeCharacteristic = await findWritableOnServer_(server);
      log('寫入特徵：' + writeCharacteristic.uuid, 'ok');

      btnDisconnect.disabled = false;
      btnPrint.disabled = false;
      requestAutoPrintFromCentral_();
    } catch (err) {
      if (err && err.name === 'NotFoundError') {
        log('未選擇裝置或清單為空。', 'err');
      } else {
        log('連線失敗：' + fmtErr_(err), 'err');
      }
      try {
        if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
          bluetoothDevice.gatt.disconnect();
        }
      } catch (e4) { /* 略過 */ }
      bluetoothDevice = null;
      writeCharacteristic = null;
    } finally {
      clearConnectWatchdog_();
      connectInProgress_ = false;
      setBusy(false);
    }
  }

  function onDisconnected() {
    clearAutoPrintSchedule_();
    log('GATT 已斷線', 'err');
    writeCharacteristic = null;
    btnPrint.disabled = true;
    btnDisconnect.disabled = true;
    connectInProgress_ = false;
    clearConnectWatchdog_();
    setBusy(false);
  }

  async function disconnectPrinter() {
    clearAutoPrintSchedule_();
    clearConnectWatchdog_();
    connectInProgress_ = false;
    try {
      if (bluetoothDevice && bluetoothDevice.gatt.connected) {
        await bluetoothDevice.gatt.disconnect();
      }
    } catch (e) {
      log('斷線錯誤：' + (e && e.message ? e.message : String(e)), 'err');
    }
    bluetoothDevice = null;
    writeCharacteristic = null;
    btnPrint.disabled = true;
    btnDisconnect.disabled = true;
    setBusy(false);
    log('已中斷', 'ok');
  }

  /**
   * 與原頁相同：每塊 20 bytes、chunk 間隔 15ms，繁中位元組經 encodeBig5OrThrow 再送出。
   */
  async function writeChunks(characteristic, bytes) {
    var chunkSize = 20;
    var preferWo = characteristic.properties.writeWithoutResponse;
    var hasWrite = characteristic.properties.write;
    for (var offset = 0; offset < bytes.length; offset += chunkSize) {
      var slice = bytes.subarray(offset, Math.min(offset + chunkSize, bytes.length));
      if (preferWo && hasWrite) {
        try {
          await characteristic.writeValueWithoutResponse(slice);
        } catch (e0) {
          await characteristic.writeValue(slice);
        }
      } else if (preferWo) {
        await characteristic.writeValueWithoutResponse(slice);
      } else {
        await characteristic.writeValue(slice);
      }
      await sleepMs_(30);
    }
  }

  btnConnect.addEventListener('click', function () { connectWithMode_('named'); });
  btnConnectScan.addEventListener('click', function () { connectWithMode_('scan'); });
  btnDisconnect.addEventListener('click', disconnectPrinter);
  btnPrint.addEventListener('click', function () { print(true); });
  if (btnUnlock) btnUnlock.addEventListener('click', unlockUiFromStuck_);

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState !== 'visible') return;
    if (connectInProgress_) return;
    if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) return;
    if (!btnConnect.disabled || !btnConnectScan.disabled) return;
    setBusy(false);
    log('回到前景：已恢復按鈕。', 'ok');
  });

  window.onload = function () {
    // data：URLSearchParams → decodeURIComponent → JSON.parse（邏輯在 parseUrlParamsOnLoad_）；失敗時日誌會附原始 data
    parseUrlParamsOnLoad_();
    refreshRcUi_();
    log('POS 列印接收中心就緒。');
    if (!rcUrlAuto_) return;
    tryReconnectBleThenAutoPrint_();
  };

  log('腳本已載入；auto=1 每頁僅自動列印一次；chunk 間隔 30ms；58mm 熱感 CLS→SIZE→DIRECTION；單一 PRINT+END；成功後 3 秒可關閉分頁。');
})();
  </script>
</body>
</html>
