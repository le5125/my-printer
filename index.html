<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GP-2270T Printer</title>
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --surface-2: #1c2230;
    --border: #2a3140;
    --accent: #34d399;
    --accent-strong: #10b981;
    --accent2: #fb7185;
    --text: #e6edf3;
    --text-soft: #c9d1d9;
    --muted: #7d8590;
    --success: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --radius: 12px;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', system-ui, sans-serif;
    --font-mono: 'SFMono-Regular', 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 18px 20px 20px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 4px 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .printer-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .printer-icon svg { width: 26px; height: 26px; fill: #0b1220; }

  h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.02em; color: var(--text); }
  h1 span { color: var(--muted); font-size: 0.85rem; font-weight: 400; display: block; margin-top: 2px; }

  /* 自動 / 手動 切換 */
  .auto-toggle {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    cursor: pointer;
    user-select: none;
  }
  .auto-toggle-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; }
  .auto-toggle-pill {
    display: inline-block;
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 700;
    border: 1px solid var(--border);
    transition: all 0.18s;
  }
  .auto-toggle[data-mode="manual"] .auto-toggle-pill {
    background: rgba(245,158,11,0.12);
    color: #fbbf24;
    border-color: rgba(245,158,11,0.5);
  }
  .auto-toggle[data-mode="auto"] .auto-toggle-pill {
    background: rgba(52,211,153,0.12);
    color: var(--accent);
    border-color: rgba(52,211,153,0.55);
  }
  .auto-toggle:active .auto-toggle-pill { transform: scale(0.97); }

  /* ── 主版型：桌機左 380px / 右 1fr；手機改單欄並把歷史置頂 ─────────── */
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 18px;
    align-items: start;
  }
  .col-left {
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: sticky;
    top: 8px;
  }
  /* 右側歷史欄滿版高度 */
  .col-right {
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 100px);
  }

  /* 手機（含 iPad 直立）：單欄、歷史排第一、功能排後面、不再 sticky 否則會把歷史擠下去 */
  @media (max-width: 1000px) {
    .layout {
      grid-template-columns: 1fr;
      gap: 14px;
    }
    /* 用 order 讓歷史在前、功能在後 */
    .col-right { order: 1; min-height: 0; }
    .col-left  { order: 2; position: static; top: auto; }
    /* 縮小字體與內距，提升手機可讀 */
    .col-right .card.full { padding: 14px 12px; }
    #history-display { max-height: 65vh; overflow-y: auto; }
    .history-item { padding: 12px 10px; }
    .hi-content { font-size: 12px; }
    .history-reprint-btn { padding: 10px 14px; font-size: 14px; }
    /* 手機標頭縮小 */
    header { padding: 10px 14px; }
    h1 { font-size: 1.05rem; }
    h1 span { font-size: 0.72rem; }
    .auto-toggle-pill { font-size: 0.78rem; padding: 5px 12px; }
  }

  /* ── 卡片 ───────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .card.compact { padding: 12px 14px; }
  .card.full { display: flex; flex-direction: column; flex: 1; min-height: 0; }

  .card-title {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    text-transform: uppercase;
  }
  .card-title .badge {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }

  /* ── 連線狀態列 ────────────────────────────────────── */
  .ble-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.disconnected { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .dot.connecting   { background: var(--warn);   box-shadow: 0 0 6px var(--warn); animation: pulse 1s infinite; }
  .dot.connected    { background: var(--success);box-shadow: 0 0 8px var(--success); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  #ble-status-text { font-size: 0.95rem; font-weight: 600; color: var(--text); }
  #ble-device-name { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

  /* ── 按鈕 ───────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 100%;
    padding: 11px 14px;
    border: none;
    border-radius: 8px;
    font-family: var(--font-ui);
    font-size: 0.92rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 6px;
  }
  .btn.small { padding: 8px 12px; font-size: 0.82rem; }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: #0b1220; }
  .btn-primary:not(:disabled):hover { background: var(--accent-strong); }

  .btn-secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-secondary:not(:disabled):hover { background: rgba(52,211,153,0.08); }

  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-warn { background: var(--accent2); color: #fff; }

  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { margin-bottom: 0; }

  /* ── 待印佇列 ─────────────────────────────────────── */
  .queue-item {
    background: rgba(52,211,153,0.06);
    border: 1px solid rgba(52,211,153,0.25);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 0.85rem;
  }
  .queue-item .qi-label {
    color: var(--accent);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .queue-item pre {
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-soft);
    font-family: var(--font-mono);
    font-size: 0.78rem;
    max-height: 80px;
    overflow: hidden;
  }
  .empty-queue {
    text-align: center;
    color: var(--muted);
    font-size: 0.92rem;
    padding: 28px 12px;
  }

  /* ── 打印歷史（右側主角）────────────────────────── */
  #history-display {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 14px;
    align-content: start;
    padding-right: 4px;
  }
  #history-display:empty + .empty-history { display: block; }

  .history-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px 12px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item.printing { border-color: var(--warn); box-shadow: 0 0 0 1px var(--warn) inset; }
  .history-item.unprinted {
    border-color: rgba(245,158,11,0.55);
    box-shadow: 0 0 0 1px rgba(245,158,11,0.25) inset;
    background: linear-gradient(180deg, rgba(245,158,11,0.05), var(--surface-2));
  }

  .hi-tag.state-printed { color: var(--success); border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.1); }
  .hi-tag.state-pending { color: #fbbf24; border-color: rgba(245,158,11,0.5); background: rgba(245,158,11,0.12); }

  .history-reprint-btn.is-pending {
    background: var(--warn);
    color: #1a1a22;
  }

  .hi-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .hi-id {
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .hi-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .hi-tag {
    display: inline-block;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: rgba(0,0,0,0.2);
    font-weight: 600;
  }
  .hi-tag.mode-detail { color: var(--accent); border-color: rgba(52,211,153,0.35); background: rgba(52,211,153,0.08); }
  .hi-tag.mode-label  { color: var(--accent2); border-color: rgba(251,113,133,0.4); background: rgba(251,113,133,0.08); }

  .hi-time {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .hi-content {
    background: rgba(0,0,0,0.45);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: var(--font-mono);
    font-size: 0.84rem;
    line-height: 1.55;
    color: var(--text-soft);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 260px;
    overflow-y: auto;
  }

  .hi-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .hi-summary {
    font-size: 0.82rem;
    color: var(--muted);
  }
  .history-reprint-btn {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 0.92rem;
    font-weight: 700;
    font-family: var(--font-ui);
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .history-reprint-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .history-reprint-btn:not(:disabled):active { transform: scale(0.97); }

  .empty-history {
    display: none;
    text-align: center;
    color: var(--muted);
    font-size: 1rem;
    padding: 60px 20px;
  }

  /* ── Log ─────────────────────────────────────────── */
  #log-box {
    background: rgba(0,0,0,0.45);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    height: 110px;
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: 0.76rem;
    line-height: 1.55;
  }
  .log-line { color: var(--muted); }
  .log-line.ok  { color: var(--success); }
  .log-line.err { color: var(--danger); }
  .log-line.info { color: var(--accent); }
  .log-line.warn { color: var(--warn); }

  /* ── ACK / 返回提示 ─────────────────────────────── */
  .ack-flash {
    position: fixed;
    top: 18px; right: 18px;
    background: var(--success);
    color: #052e1a;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 999;
  }
  .ack-flash.show { opacity: 1; }

  .return-prompt {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 2px solid var(--accent);
    padding: 14px 16px;
    z-index: 100;
  }
  .return-prompt p { font-size: 0.92rem; margin-bottom: 10px; text-align: center; }
  .return-row { display: flex; gap: 8px; }
  .return-row .btn { margin-bottom: 0; flex: 1; }

  /* ── 表單欄位 ───────────────────────────────────── */
  input[type="number"], input[type="text"].url-input {
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.82rem;
    padding: 7px 10px;
  }
  input[type="text"].url-input { width: 100%; }
  input[type="number"] { width: 84px; text-align: right; }

  .poll-status {
    margin-top: 8px;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .poll-status.ok { color: var(--success); }
  .poll-status.err { color: var(--danger); }
</style>
<!-- 僅 codepage cpexcel（CP950）；避免與 encoding-japanese 雙庫分支 -->
<script src="https://cdn.jsdelivr.net/npm/codepage@1.15.0/dist/cpexcel.full.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="ack-flash" id="ack-flash">列印完成</div>

<header>
  <div class="printer-icon">
    <svg viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
  </div>
  <div style="flex:1;">
    <h1>GP-2270T 列印橋接 <span>Web Bluetooth · POS 自動列印</span></h1>
  </div>

  <!-- 自動 / 手動 列印切換 -->
  <div class="auto-toggle" id="auto-print-toggle" data-mode="manual" title="切換自動/手動列印模式">
    <span class="auto-toggle-label">收單模式</span>
    <span class="auto-toggle-pill" id="auto-print-pill">手動列印</span>
  </div>
</header>

<div class="layout">

  <!-- ════════════ 左欄：功能區 ════════════ -->
  <div class="col-left">

    <!-- [01] 藍牙連線（精簡版） -->
    <div class="card compact">
      <div class="card-title">藍牙連線
        <span class="badge" id="ble-device-name">未連線</span>
      </div>
      <div class="ble-row">
        <div class="dot disconnected" id="ble-dot"></div>
        <div style="flex:1;min-width:0;">
          <div id="ble-status-text">尚未連線</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary small" id="btn-connect">連線打印機</button>
        <button class="btn btn-danger small"  id="btn-disconnect" style="display:none">斷線</button>
      </div>
    </div>

    <!-- [02] 待印佇列（簡） -->
    <div class="card compact">
      <div class="card-title">待列印
        <span class="badge" id="history-pending-count" style="display:none;"></span>
      </div>
      <div style="font-size:0.78rem; color:var(--muted); line-height:1.45; margin-bottom:8px;">
        手動模式下，所有 POS 訂單會進右側「打印歷史」並標 <b style="color:#fbbf24;">⏳ 待列印</b>，請在卡片上點 <b>列印</b> 按鈕。
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary small" id="btn-test-print" disabled>測試列印</button>
        <button class="btn btn-warn small" id="btn-manual-print" disabled>印所有待列印</button>
      </div>
      <!-- 隱藏：保留舊版 queue-display 容器供其他程式 fallback -->
      <div id="queue-display" style="display:none;"></div>
    </div>

    <!-- 隱藏：BLE chunk 設定 -->
    <div id="settings-card" style="display:none;">
      <input type="number" id="cfg-chunk-delay" value="30">
      <input type="number" id="cfg-chunk-size" value="20" readonly>
    </div>

    <!-- [04] 後端備援（簡） -->
    <div class="card compact">
      <div class="card-title">後端備援
        <span class="badge">每 1 秒輪詢</span>
      </div>
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px;line-height:1.45;">
        填入 GAS Web App URL（POS 後台「認證碼」B2），啟用後若即時推送漏單可自動補印。
      </div>
      <input type="text" class="url-input" id="cfg-backend-url"
             placeholder="https://script.google.com/macros/s/.../exec">
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn btn-primary small" id="btn-poll-start">啟用備援</button>
        <button class="btn btn-danger small"  id="btn-poll-stop"  style="display:none;">停止</button>
      </div>
      <div id="poll-status" class="poll-status">尚未啟動備援</div>
    </div>

    <!-- [05] 系統紀錄（簡） -->
    <div class="card compact">
      <div class="card-title">系統紀錄</div>
      <div id="log-box"></div>
      <button class="btn btn-secondary small" id="btn-clear-log" style="margin-top:8px;">清除記錄</button>
    </div>

  </div><!-- /col-left -->

  <!-- ════════════ 右欄：打印歷史（主角） ════════════ -->
  <div class="col-right">
    <div class="card full">
      <div class="card-title" style="font-size:0.95rem;letter-spacing:0.04em;">
        打印歷史
        <span class="badge">最近 <span id="history-count">0</span> 筆 · 點下方按鈕可再次列印</span>
      </div>
      <div id="history-display"></div>
      <div class="empty-history">尚無打印記錄<br><span style="font-size:0.85rem;">送出第一筆訂單後會在這裡顯示完整內容</span></div>
      <button class="btn btn-secondary small" id="btn-clear-history" style="margin-top:10px;align-self:flex-start;width:auto;padding:8px 16px;">清空打印歷史</button>
    </div>
  </div>

</div><!-- /layout -->

<script>
/* ============================================================
   PRINTER BRIDGE — index.html
   GP-2270T via Web Bluetooth (Bluefy on iOS)
   ============================================================ */

'use strict';

// ── BLE Constants ────────────────────────────────────────────
const BLE_SERVICE_UUID  = 'e7810a71-73ae-499d-8c15-faa9aef0c3f2';
const BLE_CHAR_UUID     = 'bef8d6c9-9c21-4c9e-b632-bd58c1009f9f';
// GP-2270T 也可能用 SPP UUID: 00001101-0000-1000-8000-00805f9b34fb
// 若上面不行可換成 SPP (需 Bluefy 支援)
/** 熱感捲紙寬（mm）；若為 80mm 紙請改 80 */
const TSPL_ROLL_WIDTH_MM = 58;
/** 內建字型：GP/TSC 繁中多數用 TST24.BF2；仍異常可試字型索引 "3" */
const TSPL_FONT_ZH = 'TST24.BF2';

// ── State ────────────────────────────────────────────────────
let bleDevice    = null;
let bleServer    = null;
let bleChar      = null;
let isConnected  = false;
let pendingData  = null;   // { text: string, backUrl: string, ts: number }
let posOpener    = null;   // reference to POS window (from postMessage source)
let lastPrintTs  = 0;
let printLock    = false;
const LS_BLE_LAST_DEVICE_ID = 'gp2270t_ble_last_device_id';
let _bleAutoReconnectBusy = false;

// ── DOM ──────────────────────────────────────────────────────
const dot         = document.getElementById('ble-dot');
const statusText  = document.getElementById('ble-status-text');
const deviceName  = document.getElementById('ble-device-name');
const btnConnect  = document.getElementById('btn-connect');
const btnDisconn  = document.getElementById('btn-disconnect');
const btnTest     = document.getElementById('btn-test-print');
const btnManual   = document.getElementById('btn-manual-print');
const queueDisp   = document.getElementById('queue-display');
const logBox      = document.getElementById('log-box');
const ackFlash    = document.getElementById('ack-flash');
const cfgDelay    = document.getElementById('cfg-chunk-delay');
const btnClearLog = document.getElementById('btn-clear-log');
const cfgBackendUrl    = document.getElementById('cfg-backend-url');
const btnPollStart     = document.getElementById('btn-poll-start');
const btnPollStop      = document.getElementById('btn-poll-stop');
const pollStatusEl     = document.getElementById('poll-status');
const btnPollClearHist = null; // 已移除「清除已列印紀錄」按鈕
const historyDisp      = document.getElementById('history-display');
const btnClearHistory  = document.getElementById('btn-clear-history');

// ── Logging ──────────────────────────────────────────────────
function log(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'log-line ' + type;
  const t = new Date().toTimeString().slice(0,8);
  el.textContent = '[' + t + '] ' + msg;
  logBox.appendChild(el);
  logBox.scrollTop = logBox.scrollHeight;
  // keep last 80 lines
  while (logBox.children.length > 80) logBox.removeChild(logBox.firstChild);
}

// ── UI State ─────────────────────────────────────────────────
function setBleState(state) {
  dot.className = 'dot ' + state;
  if (state === 'disconnected') {
    statusText.textContent = '尚未連線';
    deviceName.textContent = '--';
    btnConnect.style.display = '';
    btnDisconn.style.display = 'none';
    btnConnect.disabled = false;
    isConnected = false;
    bleChar = null;
    btnTest.disabled = true;
  } else if (state === 'connecting') {
    statusText.textContent = '連線中...';
    btnConnect.disabled = true;
  } else if (state === 'connected') {
    statusText.textContent = '已連線';
    deviceName.textContent = bleDevice ? bleDevice.name || '(no name)' : '--';
    btnConnect.style.display = 'none';
    btnDisconn.style.display = '';
    isConnected = true;
    btnTest.disabled = false;
  }
  // 重繪歷史 → 同步「印所有待列印」按鈕的 disabled 狀態
  try { renderPrintHistory_(); } catch (e) { /* 略 */ }
}

function showAck() {
  ackFlash.classList.add('show');
  setTimeout(() => ackFlash.classList.remove('show'), 1800);
}

// ── BLE Connect ──────────────────────────────────────────────
async function connectGattFromDevice_(device) {
  bleDevice = device;
  if (!device._gp2270DisconnectBound) {
    device._gp2270DisconnectBound = true;
    device.addEventListener('gattserverdisconnected', onBleDisconnected);
  }

  log('連接 GATT: ' + (bleDevice.name || bleDevice.id || '?'), 'info');
  bleServer = await device.gatt.connect();

  let service;
  try {
    service = await bleServer.getPrimaryService(BLE_SERVICE_UUID);
    log('Service OK: 18f0', 'ok');
  } catch (e) {
    log('18f0 不可用，嘗試取得所有服務...', 'warn');
    const services = await bleServer.getPrimaryServices();
    log('找到 ' + services.length + ' 個服務', 'info');
    service = services[0];
    log('使用服務: ' + service.uuid, 'info');
  }

  let char;
  try {
    char = await service.getCharacteristic(BLE_CHAR_UUID);
    log('Characteristic OK: 2af1', 'ok');
  } catch (e) {
    const chars = await service.getCharacteristics();
    log('找到 ' + chars.length + ' 個 characteristic', 'info');
    char = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
    if (!char) char = chars[0];
    log('使用 char: ' + char.uuid, 'info');
  }

  bleChar = char;
  try {
    localStorage.setItem(LS_BLE_LAST_DEVICE_ID, bleDevice.id);
  } catch (eLs) { /* 略 */ }

  setBleState('connected');
  log('打印機連線成功！已記住裝置 ID（供自動回連）', 'ok');

  if (pendingData && !printLock) {
    updateQueueDisplay(pendingData);
    try {
      log('有待印資料，連線後自動送印', 'info');
      await autoPrint(pendingData);
    } catch (eAuto) {
      log('自動送印: ' + (eAuto && eAuto.message ? eAuto.message : String(eAuto)), 'warn');
    }
  }

  if (typeof pollTimer !== 'undefined' && pollTimer) {
    setTimeout(function () {
      pollPendingOrdersOnce_().catch(function () { /* 略 */ });
    }, 300);
  }
}

async function tryAutoReconnectBle_() {
  if (!navigator.bluetooth || isConnected || _bleAutoReconnectBusy) return;
  let id = '';
  try {
    id = localStorage.getItem(LS_BLE_LAST_DEVICE_ID) || '';
  } catch (e) { return; }
  if (!id) return;
  if (!navigator.bluetooth.getDevices) {
    log('此瀏覽器不支援 Bluetooth.getDevices，無法自動回連', 'warn');
    return;
  }
  _bleAutoReconnectBusy = true;
  try {
    const list = await navigator.bluetooth.getDevices();
    const dev = list.find(d => d && d.id === id);
    if (!dev) {
      log('未找到已授權的記憶裝置，請再手動連線一次', 'info');
      return;
    }
    setBleState('connecting');
    log('自動回連：' + (dev.name || id), 'info');
    await connectGattFromDevice_(dev);
  } catch (e) {
    setBleState('disconnected');
    log('自動回連失敗: ' + (e && e.message ? e.message : e), 'warn');
  } finally {
    _bleAutoReconnectBusy = false;
  }
}

btnConnect.addEventListener('click', async () => {
  if (!navigator.bluetooth) {
    log('此瀏覽器不支援 Web Bluetooth', 'err');
    alert('請使用 Bluefy 開啟此頁');
    return;
  }
  setBleState('connecting');
  log('掃描藍牙裝置...', 'info');
  try {
    const dev = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [BLE_SERVICE_UUID, '00001101-0000-1000-8000-00805f9b34fb']
    });
    await connectGattFromDevice_(dev);
  } catch (err) {
    setBleState('disconnected');
    log('連線失敗: ' + err.message, 'err');
  }
});

btnDisconn.addEventListener('click', async () => {
  if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
  }
  setBleState('disconnected');
  log('已手動斷線', 'warn');
});

function onBleDisconnected() {
  setBleState('disconnected');
  log('藍牙連線中斷', 'warn');
}

// ── Print Engine ──────────────────────────────────────────────
/** BLE 寫入特徵值每段最大長度（MTU / ATT 限制，避免單次 write 丟包或斷線） */
const BLE_WRITE_CHUNK_BYTES = 20;

/**
 * BLE 送印位元組：優先 codepage **CP950（繁體 Big5）**；encoding-japanese 的 BIG5 常不可靠勿放最前。
 * 主控台可設 window.GP2270T_FORCE_UTF8 = true 強制 UTF-8（少數新韌體用 UTF-8 內文）。
 * TSPL 工作：僅將 TEXT 指令最後一個引號內文轉 CP950，指令列其餘字元維持 UTF-8（等同 ASCII），避免整段混編造成亂碼。
 */
function u8concat_(arrays) {
  let len = 0;
  for (let i = 0; i < arrays.length; i++) len += arrays[i].length;
  const out = new Uint8Array(len);
  let off = 0;
  for (let i = 0; i < arrays.length; i++) {
    out.set(arrays[i], off);
    off += arrays[i].length;
  }
  return out;
}

function unescapeTsplTextInner_(raw) {
  let out = '';
  for (let i = 0; i < raw.length; i++) {
    if (raw[i] === '\\' && i + 1 < raw.length) {
      const n = raw[++i];
      if (n === '"' || n === '\\') out += n;
      else out += '\\' + n;
    } else out += raw[i];
  }
  return out;
}

/**
 * 寬鬆比對 TEXT x,y,"字型",r,xm,ym,"內文"（逗號周圍可有空白；TEXT 與座標間可有空白）。
 * 無法拆出內文時，該行改為整行 CP950（ASCII 指令段與 UTF-8 同位元組，不致破壞指令）。
 * @returns {Uint8Array|null}
 */
function encodeTsplBig5TextQuotesOnly_(s) {
  if (typeof cptable === 'undefined' || !cptable.utils || typeof cptable.utils.encode !== 'function') return null;
  const t = String(s == null ? '' : s).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = t.split('\n');
  const lineRe = /^\s*(TEXT\s*\d+\s*,\s*\d+\s*,\s*"(?:\\.|[^"\\])*"\s*,\s*\d+\s*,\s*\d+\s*,\s*\d+\s*,\s*")((?:\\.|[^"\\])*)("\s*)$/i;
  const te = new TextEncoder();
  const chunks = [];
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    const sep = li < lines.length - 1 ? '\n' : '';
    const m = line.match(lineRe);
    if (m) {
      const inner = unescapeTsplTextInner_(m[2]);
      let innerBytes;
      try {
        innerBytes = new Uint8Array(cptable.utils.encode(950, inner.normalize('NFC')));
      } catch (eIn) {
        return null;
      }
      chunks.push(te.encode(m[1]));
      chunks.push(innerBytes);
      chunks.push(te.encode(m[3] + sep));
    } else if (/^\s*TEXT\b/i.test(line)) {
      try {
        chunks.push(new Uint8Array(cptable.utils.encode(950, (line + sep).normalize('NFC'))));
      } catch (eLine) {
        return null;
      }
    } else {
      chunks.push(te.encode(line + sep));
    }
  }
  return u8concat_(chunks);
}

function encodePrinterBytes_(text) {
  const s = String(text == null ? '' : text);
  try {
    if (window.GP2270T_FORCE_UTF8 === true) {
      log('已強制 UTF-8（GP2270T_FORCE_UTF8）', 'info');
      return new TextEncoder().encode(s);
    }
  } catch (eF) { /* 略 */ }
  try {
    if (typeof cptable !== 'undefined' && cptable.utils && typeof cptable.utils.encode === 'function') {
      try {
        if (isProbablyTsplJob_(s)) {
          const splitBytes = encodeTsplBig5TextQuotesOnly_(s);
          if (splitBytes !== null) return splitBytes;
        }
        const out = cptable.utils.encode(950, s);
        if (out != null && (typeof out.length === 'number' || typeof out.byteLength === 'number')) {
          return new Uint8Array(out);
        }
      } catch (e950) {
        try {
          const out2 = cptable.utils.encode(54936, s);
          if (out2 != null && (typeof out2.length === 'number' || typeof out2.byteLength === 'number')) {
            log('CP950 例外，已改用 GB18030', 'warn');
            return new Uint8Array(out2);
          }
        } catch (eGb) { /* 略 */ }
      }
    }
  } catch (e) { /* 略 */ }
  try {
    if (typeof Encoding !== 'undefined' && Encoding.convert) {
      try {
        const utf8bytes = new TextEncoder().encode(s);
        const big5a = Encoding.convert(utf8bytes, 'BIG5', 'UTF8');
        if (big5a && big5a.length) {
          log('已用 encoding-japanese BIG5（codepage 不可用時）', 'warn');
          return new Uint8Array(big5a);
        }
      } catch (eA) { /* 略 */ }
      if (Encoding.stringToCode) {
        try {
          const uni = Encoding.stringToCode(s);
          const big5b = Encoding.convert(uni, { to: 'BIG5', from: 'UNICODE' });
          if (big5b && big5b.length) {
            log('已用 encoding-japanese UNICODE→BIG5', 'warn');
            return new Uint8Array(big5b);
          }
        } catch (eB) { /* 略 */ }
      }
    }
  } catch (e0) { /* 略 */ }
  log('無可用 Big5 表，改用 UTF-8', 'warn');
  return new TextEncoder().encode(s);
}

/** 送原始列印位元組（Big5 優先）；等同舊 sendToprinter */
async function sendRawText(text) {
  if (!bleChar) throw new Error('無 characteristic');
  if (!isConnected) throw new Error('BLE 未連線');

  const bytes = encodePrinterBytes_(text);
  const CHUNK   = BLE_WRITE_CHUNK_BYTES;
  const DELAY   = Math.max(10, parseInt(cfgDelay.value, 10) || 30);

  log('送印 ' + bytes.length + ' bytes（CP950/Big5 優先），每包≤' + CHUNK + ' bytes，共 ' + Math.ceil(bytes.length / CHUNK) + ' 包', 'info');

  for (let i = 0; i < bytes.length; i += CHUNK) {
    const chunk = bytes.slice(i, i + CHUNK);
    try {
      if (bleChar.properties.writeWithoutResponse) {
        await bleChar.writeValueWithoutResponse(chunk);
      } else {
        await bleChar.writeValue(chunk);
      }
    } catch (e) {
      await sleep(50);
      if (bleChar.properties.writeWithoutResponse) {
        await bleChar.writeValueWithoutResponse(chunk);
      } else {
        await bleChar.writeValue(chunk);
      }
    }
    if (i + CHUNK < bytes.length) await sleep(DELAY);
  }
  log('送印完成', 'ok');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/** 已有完整 TSPL（行首 PRINT）則不重包；避免英文句中 print 誤判 */
function isProbablyTsplJob_(raw) {
  const t = String(raw == null ? '' : raw).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  return /(?:^|\n)\s*PRINT\s+\d+/im.test(t);
}

/** 若尚無 CODEPAGE，在首個獨行 CLS 後插入 CODEPAGE 950（告訴韌體 TEXT 內文以 Big5/CP950 解讀） */
function ensureTsplCodepage950_(tspl) {
  const s = String(tspl == null ? '' : tspl).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  if (!isProbablyTsplJob_(s)) return s;
  if (/(?:^|\n)\s*CODEPAGE\s+/i.test(s)) return s;
  const re = /(^|\n)(\s*CLS\s*)(?=\n|$)/i;
  if (re.test(s)) return s.replace(re, function (_, pre, cls) { return pre + cls + '\nCODEPAGE 950'; });
  return 'CODEPAGE 950\n' + s;
}

/**
 * 捲紙一張：DIRECTION 0,0 多數為「由上往下」正讀；若仍顛倒可改 TSPL_DIRECTION_MODE 為 1。
 * TEXT 用 TST24.BF2 + 送印端 CP950 位元組，對應繁中內建字型。
 */
const TSPL_DIRECTION_MODE = 0;
// 目前列印作業要套用哪一份字體設定（'detail' / 'label'）。
// 由呼叫 ensureTsplForManualPrint_ 之前的入口設定（例如 manual reprint、auto print、polling）。
let _activeTsplFontProfile_ = 'detail';

function setActiveTsplFontProfile_(p) {
  _activeTsplFontProfile_ = (p === 'label') ? 'label' : 'detail';
}

function getActiveFontCfg_() {
  const all = getFontConfig_();
  return _activeTsplFontProfile_ === 'label'
    ? (all.label  || { size: 'normal', bold: false })
    : (all.detail || { size: 'normal', bold: false });
}

/**
 * 用 styled lines（每行 segments）建出 TSPL 區塊：
 * - 每段 segment 用自己的放大倍數 + 粗體
 * - 一行的「行高」取該行所有段落 yMul 最大值
 * - 各段水平 x 累加（用 estimateSegmentDots_ 推進）
 */
function buildRollTsplBlockFromStyled_(styledLines, startIdx, count, widthMm) {
  const x0 = 10;
  const y0 = 20;
  const tailDots = 100;
  const font = TSPL_FONT_ZH;
  const n = count;

  // 計算每行高度（取該行最大 yMul；空行給最低值 1）
  const lineHeights = [];
  for (let k = 0; k < n; k++) {
    const segs = styledLines[startIdx + k] || [];
    let maxMul = 1;
    for (let i = 0; i < segs.length; i++) {
      const mul = fontSizeToTsplMul_(segs[i].size);
      if (mul > maxMul) maxMul = mul;
    }
    lineHeights.push(24 * maxMul + 8); // 24 dot 字 + 8 dot 行距
  }
  let totalDots = y0;
  for (let k = 0; k < n; k++) totalDots += lineHeights[k];
  totalDots += tailDots;
  const hMm = Math.min(3200, Math.max(16, Math.ceil(totalDots / 8)));

  const parts = [];
  parts.push('SET TEAR ON');
  parts.push('SIZE ' + widthMm + ' mm, ' + hMm + ' mm');
  parts.push('GAP 0 mm, 0 mm');
  parts.push('CLS');
  parts.push('CODEPAGE 950');
  parts.push('DIRECTION ' + TSPL_DIRECTION_MODE + ',0');
  parts.push('REFERENCE 0,0');
  parts.push('OFFSET 0');

  let y = y0;
  for (let k = 0; k < n; k++) {
    const segs = styledLines[startIdx + k] || [];
    let xCur = x0;
    for (let i = 0; i < segs.length; i++) {
      const s = segs[i];
      let txt = String(s.text || '');
      if (!txt) continue;
      let esc = txt.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
      if (esc.length > 120) esc = esc.slice(0, 120) + '...';
      const mul = fontSizeToTsplMul_(s.size);
      parts.push('TEXT ' + xCur + ',' + y + ',"' + font + '",0,' + mul + ',' + mul + ',"' + esc + '"');
      if (s.bold) {
        // GP-2270T 內建中文字型沒粗體屬性 → 同位置 +1px 重印一次模擬粗體
        parts.push('TEXT ' + (xCur + 1) + ',' + y + ',"' + font + '",0,' + mul + ',' + mul + ',"' + esc + '"');
      }
      xCur += estimateSegmentDots_(txt, mul);
    }
    y += lineHeights[k];
  }
  parts.push('PRINT 1,1');
  return parts.join('\n');
}

/** 舊介面相容：純文字行（無樣式 token） */
function buildRollTsplBlock_(lines, startIdx, count, widthMm) {
  const fc = getActiveFontCfg_();
  const styled = [];
  for (let k = 0; k < count; k++) {
    const line = String(lines[startIdx + k] || '');
    styled.push([{ text: line, size: fc.size, bold: fc.bold }]);
  }
  return buildRollTsplBlockFromStyled_(styled, 0, count, widthMm);
}

function tsplMinimalRoll_() {
  return [
    'SET TEAR ON',
    'SIZE ' + TSPL_ROLL_WIDTH_MM + ' mm, 18 mm',
    'GAP 0 mm, 0 mm',
    'CLS',
    'CODEPAGE 950',
    'DIRECTION ' + TSPL_DIRECTION_MODE + ',0',
    'REFERENCE 0,0',
    'OFFSET 0',
    'PRINT 1,1',
    ''
  ].join('\n');
}

/**
 * 熱感捲紙：DIRECTION 0,0（由上往下）；內文 TST24.BF2 + 送印 CP950/Big5。
 * 原稿若已含行首 PRINT n（POS 標籤模板等）則原樣送出。
 */
function ensureTsplForManualPrint_(raw) {
  const s = String(raw == null ? '' : raw).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  if (!s.trim()) return '\n';
  if (isProbablyTsplJob_(s)) {
    const withCp = ensureTsplCodepage950_(s);
    return withCp.endsWith('\n') ? withCp : withCp + '\n';
  }

  // 依目前作業 profile 決定寬度與「base 字體」
  let widthMm = TSPL_ROLL_WIDTH_MM;
  if (_activeTsplFontProfile_ === 'label') {
    const sz = getLabelSize_();
    widthMm = Number(sz.width) > 0 ? Number(sz.width) : TSPL_ROLL_WIDTH_MM;
  }
  const baseFc = getActiveFontCfg_();

  // ⬇ 解析樣式 token：把 raw text 變成 [[{text,size,bold}, ...], ...]（每行）
  const styledAll = parseStyledLines_(s, baseFc);
  // 過濾完全沒有實際文字的空行（避免印一堆空白）
  const styledLines = styledAll.filter(function (segs) {
    if (!segs || !segs.length) return false;
    for (let i = 0; i < segs.length; i++) {
      if (String(segs[i].text || '').trim()) return true;
    }
    return false;
  });

  if (!styledLines.length) return tsplMinimalRoll_();

  const maxLinesPerBlock = 48;
  const blocks = [];
  let idx = 0;
  while (idx < styledLines.length) {
    const take = Math.min(maxLinesPerBlock, styledLines.length - idx);
    blocks.push(buildRollTsplBlockFromStyled_(styledLines, idx, take, widthMm));
    idx += take;
  }
  log('已包成 TSPL（profile=' + _activeTsplFontProfile_ + '；' + blocks.length + ' 段；寬 ' + widthMm + ' mm；行內樣式生效）', 'info');
  return blocks.join('\n') + '\n';
}

/** POS PRINT_ORDER：將 JSON 訂單轉成收據純文字（再經 ensureTsplForManualPrint_ → sendRawText 分段送 BLE） */
function buildPrintText(order) {
  if (!order) return '\n';
  const oid = order.id != null ? order.id : (order.orderId != null ? order.orderId : '');
  const t = order.time != null ? order.time : Date.now();
  let txt = '';

  txt += '訂單 #' + oid + '\n';
  txt += '時間: ' + new Date(t).toLocaleString() + '\n';
  txt += '----------------\n';

  const items = Array.isArray(order.items) ? order.items : [];
  items.forEach(function (i) {
    const q = i.qty != null ? i.qty : (i.quantity != null ? i.quantity : 0);
    txt += String(i.name || '') + ' x' + q;

    const opts = i.options && i.options.length > 0 ? i.options : [];
    opts.forEach(function (opt) {
      const line = typeof opt === 'string' ? opt : (opt && opt.name != null ? String(opt.name) : String(opt));
      txt += '\n  + ' + line;
    });

    if (i.note) {
      txt += '\n  * ' + i.note;
    }

    txt += '\n';
  });

  txt += '----------------\n';
  txt += '總計: $' + (order.total != null ? order.total : '') + '\n\n\n';

  return txt;
}

// ── Print History（最近 50 筆，可再次列印）──────────────────
const LS_PRINT_HISTORY = 'gp2270t_print_history_v1';
const PRINT_HISTORY_LIMIT = 50;

// ── 列印模式（auto = 收單即印；manual = 收單入歷史不印，由使用者手動點列印）
const LS_AUTO_PRINT_MODE = 'gp2270t_auto_print_mode_v1';
function getAutoPrintMode_() {
  try {
    var v = localStorage.getItem(LS_AUTO_PRINT_MODE);
    return v === 'auto' ? 'auto' : 'manual';   // ★ 預設 manual
  } catch (e) { return 'manual'; }
}
function setAutoPrintMode_(v) {
  try { localStorage.setItem(LS_AUTO_PRINT_MODE, v === 'auto' ? 'auto' : 'manual'); } catch (e) { /* 略 */ }
}

function _loadPrintHistory_() {
  try {
    const raw = localStorage.getItem(LS_PRINT_HISTORY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function _savePrintHistory_(arr) {
  try {
    while (arr.length > PRINT_HISTORY_LIMIT) arr.pop();
    localStorage.setItem(LS_PRINT_HISTORY, JSON.stringify(arr));
  } catch (e) { /* 略 */ }
}
function _historyEntryFingerprint_(entry) {
  return [entry.timestamp || 0, entry.total || 0, (entry.itemsCount || 0), entry.phone || ''].join('|');
}

/**
 * 加入打印歷史（手動 or 自動模式都會呼叫）。
 * @param {object} meta - { orderId, shortId, timestamp, phone, remark, total, itemsCount, summary, mode, printed }
 * @param {string} text - 實際送印的純文字（重印時可直接重送）
 */
function addToPrintHistory_(meta, text) {
  const arr = _loadPrintHistory_();
  const printed = meta.printed !== false; // 預設 true（已列印），手動模式呼叫時須傳 false
  const entry = {
    id        : 'H' + Date.now() + '-' + Math.floor(Math.random() * 1e6),
    orderId   : meta.orderId || '',
    shortId   : meta.shortId || '',
    timestamp : meta.timestamp || Date.now(),
    phone     : meta.phone || '',
    remark    : meta.remark || '',
    total     : meta.total != null ? meta.total : 0,
    itemsCount: meta.itemsCount || 0,
    summary   : meta.summary || '',
    mode      : meta.mode || 'detail',
    text      : text || '',
    receivedAt: meta.receivedAt || Date.now(),
    printedAt : printed ? Date.now() : 0,
    printed   : !!printed,
    source    : meta.source || 'unknown' // 'postMessage' | 'polling' | 'reprint' | 'manual' | 'queued'
  };
  arr.unshift(entry);
  _savePrintHistory_(arr);
  renderPrintHistory_();
  return entry;
}

/** 把某筆歷史標為已列印（手動模式按下列印鍵後呼叫） */
function markHistoryAsPrinted_(historyId, sourceLabel) {
  const arr = _loadPrintHistory_();
  for (let i = 0; i < arr.length; i++) {
    if (arr[i].id === historyId) {
      arr[i].printed = true;
      arr[i].printedAt = Date.now();
      if (sourceLabel) arr[i].source = sourceLabel;
      _savePrintHistory_(arr);
      renderPrintHistory_();
      return arr[i];
    }
  }
  return null;
}

function clearAllPrintHistory_() {
  try { localStorage.removeItem(LS_PRINT_HISTORY); } catch (e) { /* 略 */ }
  renderPrintHistory_();
  log('已清空打印歷史', 'warn');
}

function _hasFingerprintInHistory_(fp, withinMs) {
  if (!fp) return false;
  const cutoff = Date.now() - (withinMs || 5 * 60 * 1000);
  const arr = _loadPrintHistory_();
  for (let i = 0; i < arr.length; i++) {
    const t = arr[i].receivedAt || arr[i].printedAt || arr[i].timestamp || 0;
    if (t < cutoff) continue;
    if (_historyEntryFingerprint_(arr[i]) === fp) return true;
  }
  return false;
}

/** 以 orderId 找尚未列印的歷史條目（用於 polling 把同一單寫成「未列印」狀態的避免重覆寫） */
function _findUnprintedHistoryByOrderId_(oid) {
  if (!oid) return null;
  const arr = _loadPrintHistory_();
  for (let i = 0; i < arr.length; i++) {
    if (!arr[i].printed && arr[i].orderId && String(arr[i].orderId) === String(oid)) return arr[i];
  }
  return null;
}

function _escapeHtml_(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderPrintHistory_() {
  if (!historyDisp) return;
  const arr = _loadPrintHistory_();
  const cntEl = document.getElementById('history-count');
  if (cntEl) cntEl.textContent = String(arr.length);
  // 待印筆數徽章
  const pendingCnt = arr.filter(function (e) { return !e.printed; }).length;
  const pendCntEl = document.getElementById('history-pending-count');
  if (pendCntEl) {
    pendCntEl.textContent = pendingCnt > 0 ? ('待列印 ' + pendingCnt + ' 筆') : '';
    pendCntEl.style.display = pendingCnt > 0 ? '' : 'none';
  }
  // 「印所有待列印」按鈕僅在有待印 + 已連線 BLE 時可按
  try {
    if (typeof btnManual !== 'undefined' && btnManual) {
      btnManual.disabled = !(pendingCnt > 0 && isConnected && bleChar);
      btnManual.textContent = pendingCnt > 0 ? ('印所有待列印（' + pendingCnt + '）') : '無待列印';
    }
  } catch (e) { /* 略 */ }

  if (!arr.length) {
    historyDisp.innerHTML = '';
    return;
  }
  const html = arr.map(function (e) {
    const ts = e.printed ? (e.printedAt || e.timestamp) : (e.receivedAt || e.timestamp);
    const t = new Date(ts || Date.now());
    const pad = function (n) { return n < 10 ? '0' + n : '' + n; };
    const tStr = pad(t.getMonth() + 1) + '/' + pad(t.getDate())
      + ' ' + pad(t.getHours()) + ':' + pad(t.getMinutes()) + ':' + pad(t.getSeconds());
    const idTxt = e.shortId ? '#' + e.shortId
                : (e.orderId ? '#' + String(e.orderId).slice(-4) : '—');
    const modeIsLabel = e.mode === 'label';
    const modeTxt = modeIsLabel ? '商品標籤' : '訂單明細';
    const modeCls = modeIsLabel ? 'mode-label' : 'mode-detail';
    const srcTxt = e.source === 'postMessage' ? '即時' :
                   e.source === 'polling'     ? '備援' :
                   e.source === 'reprint'     ? '重印' :
                   e.source === 'manual'      ? '手動' :
                   e.source === 'queued'      ? '待印' : '';
    const itemsTxt = e.itemsCount ? (e.itemsCount + ' 項') : '';
    const totalTxt = e.total ? '$' + e.total : '';
    const summaryTxt = [itemsTxt, totalTxt].filter(Boolean).join(' · ');
    const fullText = e.text || (e.summary || '（無內容）');
    const printed = !!e.printed;
    const stateTag = printed
      ? '<span class="hi-tag state-printed">✓ 已列印</span>'
      : '<span class="hi-tag state-pending">⏳ 待列印</span>';
    const btnLabel = printed ? '🖨 再次列印' : '🖨 列印';
    const btnExtraClass = printed ? '' : ' is-pending';

    return ''
      + '<div class="history-item' + (printed ? '' : ' unprinted') + '" data-hid="' + _escapeHtml_(e.id) + '">'
      +   '<div class="hi-head">'
      +     '<div class="hi-id">' + _escapeHtml_(idTxt) + '</div>'
      +     '<div class="hi-meta">'
      +       stateTag
      +       '<span class="hi-tag ' + modeCls + '">' + modeTxt + '</span>'
      +       (srcTxt ? '<span class="hi-tag">' + _escapeHtml_(srcTxt) + '</span>' : '')
      +       '<span class="hi-time">' + _escapeHtml_(tStr) + '</span>'
      +     '</div>'
      +   '</div>'
      +   '<div class="hi-content">' + _escapeHtml_(fullText) + '</div>'
      +   '<div class="hi-foot">'
      +     '<div class="hi-summary">' + _escapeHtml_(summaryTxt) + '</div>'
      +     '<button type="button" class="history-reprint-btn' + btnExtraClass + '" data-hid="' + _escapeHtml_(e.id) + '">' + btnLabel + '</button>'
      +   '</div>'
      + '</div>';
  }).join('');
  historyDisp.innerHTML = html;
}

async function reprintHistoryEntry_(historyId) {
  const arr = _loadPrintHistory_();
  const entry = arr.find(function (e) { return e.id === historyId; });
  if (!entry) { log('找不到歷史紀錄', 'err'); return; }
  if (!isConnected || !bleChar) {
    log('請先連線打印機再列印', 'err');
    try {
      // 友善提示
      const flash = document.getElementById('ack-flash');
      if (flash) {
        flash.textContent = '請先連線打印機';
        flash.style.background = 'var(--warn)';
        flash.style.color = '#1a1a22';
        flash.classList.add('show');
        setTimeout(function () {
          flash.classList.remove('show');
          flash.textContent = '列印完成';
          flash.style.background = '';
          flash.style.color = '';
        }, 2000);
      }
    } catch (e) { /* 略 */ }
    return;
  }
  if (printLock) { log('列印中，請稍候再試', 'warn'); return; }
  const wasUnprinted = !entry.printed;
  log((wasUnprinted ? '列印 ' : '重印 ') + (entry.shortId ? '#' + entry.shortId : entry.orderId), 'info');
  try {
    await autoPrint({
      text: entry.text || '',
      backUrl: '',
      ts: Date.now(),
      _isReprint: true,
      // 用「目前的 print mode」決定字體 profile（與目前設定一致）
      _fontProfile: getPrintMode_() === 'label' ? 'label' : 'detail'
    });
    // 把該筆標為已列印
    markHistoryAsPrinted_(historyId, wasUnprinted ? 'manual' : 'reprint');
  } catch (e) {
    log('列印失敗: ' + (e && e.message ? e.message : e), 'err');
  }
}

if (historyDisp) {
  historyDisp.addEventListener('click', function (ev) {
    const btn = ev.target && ev.target.closest && ev.target.closest('.history-reprint-btn');
    if (!btn) return;
    const hid = btn.getAttribute('data-hid');
    if (hid) reprintHistoryEntry_(hid);

}
if (btnClearHistory) {

  });
}

renderPrintHistory_();

// ── Auto Print Flow ───────────────────────────────────────────
async function autoPrint(data) {
  if (printLock) { log('列印鎖定中，略過', 'warn'); return; }
  if (!bleChar) {
    log('沒有藍牙特徵值', 'err');
    return;
  }
  printLock = true;

  try {
    // 設定 TSPL 字體 profile：data._fontProfile 由呼叫端帶入；沒帶就以目前 print mode 決定
    if (data && data._fontProfile === 'label') setActiveTsplFontProfile_('label');
    else if (data && data._fontProfile === 'detail') setActiveTsplFontProfile_('detail');
    else setActiveTsplFontProfile_(getPrintMode_() === 'label' ? 'label' : 'detail');
    const payload = ensureTsplForManualPrint_(data.text);
    await sendRawText(payload);
    log('列印完成', 'ok');
    showAck();
    lastPrintTs = data.ts;
    pendingData = null;
    updateQueueDisplay(null);

    sendAckToPos('PRINT_ACK:success:' + data.ts);

    // 印完嘗試把焦點切回 POS（如此 iOS Bluefy 才會自動回 POS 分頁）
    // 重印是「使用者在列印頁手動操作」，就不要再切走打擾使用者
    if (!data._isReprint) _focusBackToPos_();

  } catch (err) {
    log('列印失敗: ' + err.message, 'err');
    sendAckToPos('PRINT_ACK:error:' + err.message);
  } finally {
    printLock = false;
  }
}

/** 嘗試把焦點切回 POS 分頁（cross-origin focus 在 iOS Bluefy 通常允許） */
function _focusBackToPos_() {
  try {
    if (posOpener && !posOpener.closed && typeof posOpener.focus === 'function') {
      posOpener.focus();
      return;
    }
  } catch (e) { /* 略 */ }
  try {
    if (window.opener && !window.opener.closed && typeof window.opener.focus === 'function') {
      window.opener.focus();
    }
  } catch (e) { /* 略 */ }
}

function sendAckToPos(msg) {
  // Try postMessage to opener
  if (posOpener && !posOpener.closed) {
    try {
      posOpener.postMessage({ type: 'PRINTER_ACK', payload: msg }, '*');
      log('ACK 送回 POS (postMessage)', 'ok');
      return;
    } catch(e) {}
  }
  if (window.opener && !window.opener.closed) {
    try {
      window.opener.postMessage({ type: 'PRINTER_ACK', payload: msg }, '*');
      log('ACK 送回 opener', 'ok');
      return;
    } catch(e) {}
  }
  log('ACK: 無法回傳 (opener 不可用)', 'warn');
}

// ── Data Reception ────────────────────────────────────────────
function parseHashData() {
  const hash = window.location.hash;
  if (!hash || hash.length < 6) return null;

  try {
    // Format: #data=BASE64URL&back=URL&ts=TIMESTAMP
    const params = new URLSearchParams(hash.slice(1)); // remove leading #
    const dataB64 = params.get('data');
    const backUrl = params.get('back') || '';
    const ts      = parseInt(params.get('ts') || '0');

    if (!dataB64) return null;

    // Decode: base64url -> bytes -> text
    const text = decodeBase64ToText(dataB64);
    return { text, backUrl, ts };
  } catch (e) {
    log('Hash 解碼失敗: ' + e.message, 'err');
    return null;
  }
}

function decodeBase64ToText(b64) {
  let norm = String(b64 || '').trim().replace(/-/g, '+').replace(/_/g, '/');
  if (!norm) return '';
  while (norm.length % 4) norm += '=';
  const bin = atob(norm);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i) & 255;
  return new TextDecoder('utf-8', { fatal: false }).decode(u8);
}

function updateQueueDisplay(data) {
  if (!data) {
    queueDisp.innerHTML = '<div class="empty-queue" style="padding:14px 8px;font-size:0.86rem;">等待 POS 送單…</div>';
    btnManual.disabled = true;
    return;
  }
  queueDisp.innerHTML = `
    <div class="queue-item">
      <div class="qi-label">待印資料 (ts: ${data.ts})</div>
      <pre>${data.text.slice(0, 200)}${data.text.length > 200 ? '...' : ''}</pre>
    </div>`;
  // 有待印資料時務必保持可按：未連線時按了會在 log 提示先連線；若先前因「先送單後連線」被灰掉，連上後也不會永遠無法按
  btnManual.disabled = false;
}

async function receivePrintData(data) {
  // Dedup: ignore same timestamp
  if (data.ts && data.ts === lastPrintTs) {
    log('重複資料 (ts=' + data.ts + ')，略過', 'warn');
    return;
  }

  log('收到待印資料 (ts=' + data.ts + ')', 'info');
  pendingData = data;
  updateQueueDisplay(data);

  if (isConnected && bleChar) {
    log('待印資料已更新，請按「手動列印最新資料」。', 'info');
  } else {
    log('BLE 未連線，資料已暫存。請先連線打印機後再手動列印。', 'warn');
    setTimeout(function () {
      tryAutoReconnectBle_().catch(function () { /* 略 */ });
    }, 400);
  }
}

// ── Message Listener (Primary Channel) ───────────────────────
window.addEventListener('message', async (event) => {
  // Accept any origin (POS is on different domain)
  const msg = event.data;
  if (!msg || typeof msg !== 'object') return;

  if (msg.type === 'PRINT_JOB') {
    log('收到 postMessage 列印任務', 'info');
    // 更新 POS 視窗引用（每次都更新，避免 POS 重整後引用過期）
    if (event.source && !event.source.closed) {
      posOpener = event.source;
    }

    const data = {
      text   : msg.text    || '',
      backUrl: msg.backUrl || '',
      ts     : msg.ts      || Date.now()
    };

    if (!data.text) { log('postMessage: 空資料', 'err'); return; }
    await receivePrintData(data);
    return;
  }

  if (msg.type === 'PRINT_ORDER') {
    try {
      if (event.source && !event.source.closed) {
        posOpener = event.source;
      }
      const payload = msg.payload;
      if (!payload) {
        log('PRINT_ORDER: 無 payload', 'err');
        return;
      }

      // 標準化欄位（POS 端送來的 payload 已盡量對齊 backend order shape）
      const ord = {
        orderId   : payload.orderId || payload.id || ('LOCAL-' + Date.now()),
        shortId   : payload.shortId || (payload.orderId ? String(payload.orderId).slice(-3) : ''),
        timestamp : payload.timestamp || payload.time || Date.now(),
        pickupTime: payload.pickupTime || '',
        phone     : payload.phone || '',
        remark    : payload.remark || payload.notes || '',
        total     : payload.total != null ? payload.total : 0,
        items     : Array.isArray(payload.items) ? payload.items : []
      };

      // 防重：相同指紋（時間+電話+總額+品項數）若 5 分鐘內已印過 → 跳過
      const fp = [ord.timestamp, ord.total, ord.items.length, ord.phone].join('|');
      if (_hasFingerprintInHistory_(fp, 5 * 60 * 1000)) {
        log('PRINT_ORDER 已在 5 分鐘內列印過（指紋重複），跳過', 'warn');
        return;
      }

      const text = buildPrintTextFromBackendOrder_(ord);
      const ts = Number(ord.timestamp) || Date.now();
      pendingData = { text: text, backUrl: '', ts: ts };
      updateQueueDisplay(pendingData);

      const mode = getAutoPrintMode_();
      const idLog = ord.shortId ? '#' + ord.shortId : ord.orderId;

      // ★ 手動模式：訂單只進歷史標「待列印」，使用者按按鈕才印
      if (mode === 'manual') {
        log('收到 POS 訂單 ' + idLog + '（手動模式：請於右側點「列印」）', 'info');
        addToPrintHistory_({
          orderId   : ord.orderId,
          shortId   : ord.shortId,
          timestamp : ord.timestamp,
          phone     : ord.phone,
          remark    : ord.remark,
          total     : ord.total,
          itemsCount: ord.items.length,
          summary   : (ord.items[0] ? ord.items[0].name + (ord.items.length > 1 ? ' 等 ' + ord.items.length + ' 項' : ' x' + (ord.items[0].quantity || 1)) : ''),
          mode      : getPrintMode_(),
          source    : 'queued',
          printed   : false
        }, text);
        // 即使是手動模式，也標 orderId 為已處理 → 避免後端輪詢一直把同一單塞進歷史
        if (ord.orderId) addPrintedOrderId_(String(ord.orderId));
        return;
      }

      // 自動模式（與舊行為一致）
      log('收到 POS 即時訂單 ' + idLog + '，自動列印', 'info');
      if (isConnected && bleChar && !printLock) {
        try {
          await autoPrint(pendingData);
          addToPrintHistory_({
            orderId   : ord.orderId,
            shortId   : ord.shortId,
            timestamp : ord.timestamp,
            phone     : ord.phone,
            remark    : ord.remark,
            total     : ord.total,
            itemsCount: ord.items.length,
            summary   : (ord.items[0] ? ord.items[0].name + (ord.items.length > 1 ? ' 等 ' + ord.items.length + ' 項' : ' x' + (ord.items[0].quantity || 1)) : ''),
            mode      : getPrintMode_(),
            source    : 'postMessage',
            printed   : true
          }, text);
          if (ord.orderId) addPrintedOrderId_(String(ord.orderId));
        } catch (ePrint) {
          log('PRINT_ORDER 列印失敗: ' + (ePrint && ePrint.message ? ePrint.message : ePrint), 'err');
        }
      } else {
        // 連線斷／鎖定中：先寫成「待列印」，使用者連線後可手動點
        log('尚未連線或忙碌，已存入「待列印」（請連線打印機後手動點列印）', 'warn');
        addToPrintHistory_({
          orderId   : ord.orderId,
          shortId   : ord.shortId,
          timestamp : ord.timestamp,
          phone     : ord.phone,
          remark    : ord.remark,
          total     : ord.total,
          itemsCount: ord.items.length,
          summary   : (ord.items[0] ? ord.items[0].name + (ord.items.length > 1 ? ' 等 ' + ord.items.length + ' 項' : ' x' + (ord.items[0].quantity || 1)) : ''),
          mode      : getPrintMode_(),
          source    : 'queued',
          printed   : false
        }, text);
        if (ord.orderId) addPrintedOrderId_(String(ord.orderId));
        setTimeout(function () {
          tryAutoReconnectBle_().catch(function () { /* 略 */ });
        }, 400);
      }
    } catch (e) {
      log('接收訂單資料錯誤: ' + (e && e.message ? e.message : String(e)), 'err');
    }
    return;
  }

  if (msg.type === 'PRINTER_PING') {
    // POS 以 PONG 判斷頁面已就緒可接收 PRINT_JOB；BLE 連線狀態附帶回傳。
    // 同時更新 posOpener 引用（POS 重整後再送 PING，我們藉此拿到新引用）
    if (event.source && !event.source.closed) {
      posOpener = event.source;
    }
    const pongMsg = { type: 'PRINTER_PONG', ready: true, connected: isConnected };
    try {
      event.source.postMessage(pongMsg, '*');
      log('PING received → PONG sent (connected=' + isConnected + ')', 'info');
    } catch (e) {
      log('PONG 回傳失敗: ' + e.message, 'warn');
    }
    return;
  }
});

// ── Hash Listener (Fallback Channel) ─────────────────────────
function handleIncomingData() {
  console.log('偵測到 Hash 變化，準備打印...');
  const data = parseHashData();
  if (!data || !data.text) return;
  if (data.ts && data.ts === lastPrintTs) return; // already processed
  receivePrintData(data);
  // Clear hash after reading (prevents re-trigger on visibility change)
  // Use replaceState to avoid adding history entry
  history.replaceState(null, '', window.location.pathname + window.location.search);
}

window.addEventListener('hashchange', () => {
  log('hashchange triggered', 'info');
  handleIncomingData();
});

// ── Manual Print Button：印所有 history 中 printed=false 的訂單 ────────
btnManual.addEventListener('click', async () => {
  if (!isConnected || !bleChar) {
    log('請先按「連線打印機」完成藍牙連線後再列印', 'err');
    return;
  }
  const all = _loadPrintHistory_();
  const pending = all.filter(function (e) { return !e.printed; }).reverse(); // 從最舊的待印開始印
  if (!pending.length) { log('沒有待列印的訂單', 'warn'); return; }
  log('開始批次列印 ' + pending.length + ' 筆待列印訂單', 'info');
  for (let i = 0; i < pending.length; i++) {
    if (printLock) { await new Promise(function (r) { setTimeout(r, 300); }); }
    try {
      await autoPrint({ text: pending[i].text || '', backUrl: '', ts: Date.now(), _isReprint: true });
      markHistoryAsPrinted_(pending[i].id, 'manual');
    } catch (e) {
      log('批次列印中斷: ' + (e && e.message ? e.message : e), 'err');
      break;
    }
  }
  log('批次列印結束', 'ok');
});

// ── 自動 / 手動 切換 ─────────────────────────────────────────
(function bindAutoToggle_() {
  const t = document.getElementById('auto-print-toggle');
  const pill = document.getElementById('auto-print-pill');
  if (!t || !pill) return;
  function refresh() {
    const m = getAutoPrintMode_();
    t.dataset.mode = m;
    pill.textContent = m === 'auto' ? '自動列印' : '手動列印';
  }
  refresh();
  t.addEventListener('click', function () {
    const next = getAutoPrintMode_() === 'auto' ? 'manual' : 'auto';
    setAutoPrintMode_(next);
    refresh();
    log('已切換為「' + (next === 'auto' ? '自動' : '手動') + '列印」模式', 'info');
  });
})();

function setPollStatus_(text, type) {
  if (!pollStatusEl) return;
  pollStatusEl.textContent = text || '';
  pollStatusEl.className = 'poll-status' + (type ? ' ' + type : '');
}

function getPrintedOrderIds_() {
  try {
    const raw = localStorage.getItem(LS_PRINTED_ORDER_IDS);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function savePrintedOrderIds_(ids) {
  try {
    while (ids.length > 500) ids.shift();
    localStorage.setItem(LS_PRINTED_ORDER_IDS, JSON.stringify(ids));
  } catch (e) { /* 略 */ }
}
function isOrderPrinted_(id) {
  return id && getPrintedOrderIds_().indexOf(String(id)) !== -1;
}
function addPrintedOrderId_(id) {
  if (!id) return;
  const ids = getPrintedOrderIds_();
  if (ids.indexOf(String(id)) !== -1) return;
  ids.push(String(id));
  savePrintedOrderIds_(ids);
}

/** 字體設定：明細 / 標籤 各自的 size + bold */
function getFontConfig_() {
  const def = {
    detail: { size: 'normal', bold: false },
    label : { size: 'normal', bold: false }
  };
  try {
    const v = localStorage.getItem(LS_FONT_CONFIG);
    if (v) {
      const o = JSON.parse(v);
      if (o && typeof o === 'object') {
        if (o.detail) def.detail = {
          size: /^(small|normal|large|xlarge)$/.test(String(o.detail.size)) ? String(o.detail.size) : 'normal',
          bold: !!o.detail.bold
        };
        if (o.label) def.label = {
          size: /^(small|normal|large|xlarge)$/.test(String(o.label.size)) ? String(o.label.size) : 'normal',
          bold: !!o.label.bold
        };
      }
    }
  } catch (e) { /* 略 */ }
  return def;
}

/** size token → TSPL TEXT 放大倍數（x_mul, y_mul） */
function fontSizeToTsplMul_(size) {
  const t = (size || 'normal').toLowerCase();
  if (t === 'small')  return 1;
  if (t === 'large')  return 2;
  if (t === 'xlarge') return 3;
  return 1; // normal
}

function _formatOrderTime_(timestamp) {
  let d;
  if (timestamp instanceof Date) d = timestamp;
  else if (timestamp) { d = new Date(timestamp); }
  if (!d || isNaN(d.getTime())) d = new Date();
  const pad = function (n) { return n < 10 ? '0' + n : '' + n; };
  return {
    date: d.getFullYear() + '/' + pad(d.getMonth() + 1) + '/' + pad(d.getDate()),
    time: pad(d.getHours()) + ':' + pad(d.getMinutes())
  };
}

function _itemsBlock_(items) {
  if (!Array.isArray(items)) return '';
  return items.map(function (it) {
    const q = it.quantity != null ? it.quantity : (it.qty || 0);
    const subtotal = (Number(it.price) || 0) * (Number(q) || 0);
    let s = (it.name || '') + ' x' + q + '   $' + subtotal;
    const opts = it.options || it.addons || [];
    if (Array.isArray(opts) && opts.length) {
      opts.forEach(function (o) {
        const n = typeof o === 'string' ? o : (o && o.name ? o.name : '');
        if (n) s += '\n  + ' + n;
      });
    }
    if (it.note) s += '\n  * ' + it.note;
    return s;
  }).join('\n');
}

/**
 * 行內樣式 token：可在同一行任何地方切換字體大小／粗細。
 * 例如：{大}{粗}{店名}{細}{中}訂單 #{訂單編號}
 *   {大}{中}{小}{特大}{粗}{細}{重置}
 *   英文 alias：{big}{normal}{small}{xlarge}{bold}{thin}{reset}
 */
const PRINT_STYLE_TOKENS = {
  '大'    : { size: 'large'  },
  '中'    : { size: 'normal' },
  '小'    : { size: 'small'  },
  '特大'  : { size: 'xlarge' },
  '粗'    : { bold: true  },
  '細'    : { bold: false },
  '重置'  : { size: 'normal', bold: false },
  'big'   : { size: 'large'  },
  'normal': { size: 'normal' },
  'small' : { size: 'small'  },
  'xlarge': { size: 'xlarge' },
  'bold'  : { bold: true  },
  'thin'  : { bold: false },
  'reset' : { size: 'normal', bold: false }
};

function _isStyleToken_(key) {
  return Object.prototype.hasOwnProperty.call(PRINT_STYLE_TOKENS, key);
}

function _renderTemplate_(tpl, map) {
  return String(tpl == null ? '' : tpl).replace(/\{([^}]+)\}/g, function (m, k) {
    const key = String(k).trim();
    if (map[key] != null) return String(map[key]);
    if (_isStyleToken_(key)) return m; // 樣式 token 保留原樣，留給 TSPL 端處理
    return '';
  });
}

/**
 * 把純文字（含 {大}{粗}…）解析成「行陣列」，每行 [{ text, size, bold }]。
 */
function parseStyledLines_(rawText, baseFc) {
  const baseSize = (baseFc && baseFc.size) || 'normal';
  const baseBold = !!(baseFc && baseFc.bold);
  const lines = String(rawText == null ? '' : rawText)
    .replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const out = [];
  let curSize = baseSize;
  let curBold = baseBold;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const segs = [];
    const re = /\{([^}]+)\}/g;
    let lastIdx = 0;
    let m;
    function pushText(t) {
      if (!t) return;
      segs.push({ text: t, size: curSize, bold: curBold });
    }
    while ((m = re.exec(line)) !== null) {
      pushText(line.substring(lastIdx, m.index));
      const tag = String(m[1]).trim();
      if (_isStyleToken_(tag)) {
        const t = PRINT_STYLE_TOKENS[tag];
        if (t.size != null) curSize = t.size;
        if (t.bold != null) curBold = t.bold;
      } else {
        pushText('{' + tag + '}');
      }
      lastIdx = re.lastIndex;
    }
    pushText(line.substring(lastIdx));
    out.push(segs);
  }
  return out;
}

/** 估算單一段落的水平像素寬（24-dot 字體：中文 24*xMul，ASCII 12*xMul） */
function estimateSegmentDots_(text, xMul) {
  let w = 0;
  for (let i = 0; i < text.length; i++) {
    const code = text.charCodeAt(i);
    w += (code < 0x80) ? 12 : 24;
  }
  return w * xMul;
}

function renderDetailFromOrder_(ord) {
  const ft = _formatOrderTime_(ord.timestamp);
  const map = {
    '店名'    : getStoreName_(),
    '訂單編號': ord.shortId || ord.orderId || '',
    '訂單短碼': ord.shortId || '',
    '時間'    : ft.date + ' ' + ft.time,
    '日期'    : ft.date,
    '取餐時間': ord.pickupTime || '',
    '電話'    : ord.phone || '',
    '備註'    : ord.remark || ord.notes || '',
    '總計'    : ord.total != null ? ord.total : '',
    '品項'    : _itemsBlock_(ord.items)
  };
  return _renderTemplate_(getDetailTemplate_(), map);
}

function renderLabelsFromOrder_(ord) {
  const tpl = getLabelTemplate_();
  const ft = _formatOrderTime_(ord.timestamp);
  const sn = getStoreName_();
  const items = Array.isArray(ord.items) ? ord.items : [];
  const out = [];
  for (let k = 0; k < items.length; k++) {
    const it = items[k];
    const q = it.quantity != null ? it.quantity : (it.qty || 0);
    const opts = it.options || it.addons || [];
    const optStr = (Array.isArray(opts) ? opts : []).map(function (o) {
      return typeof o === 'string' ? o : (o && o.name ? o.name : '');
    }).filter(Boolean).join(' / ');

    const map = {
      '店名'    : sn,
      '訂單編號': ord.shortId || ord.orderId || '',
      '訂單短碼': ord.shortId || '',
      '時間'    : ft.date + ' ' + ft.time,
      '日期'    : ft.date,
      '取餐時間': ord.pickupTime || '',
      '品名'    : it.name || '',
      '數量'    : q,
      '單價'    : it.price != null ? it.price : '',
      '選項'    : optStr,
      '備註'    : it.note || ''
    };
    // 一份一張（依數量重複）
    const repeat = Math.max(1, parseInt(q, 10) || 1);
    for (let r = 0; r < repeat; r++) out.push(_renderTemplate_(tpl, map));
  }
  return out.join('\n');
}

function buildPrintTextFromBackendOrder_(ord) {
  const mode = getPrintMode_();
  // 同步 TSPL 字體 profile（明細／標籤各自的字體設定）
  setActiveTsplFontProfile_(mode === 'label' ? 'label' : 'detail');
  if (mode === 'label') return renderLabelsFromOrder_(ord);
  return renderDetailFromOrder_(ord);
}

/**
 * 從後端拉「打印設定」（樣版＋店名）寫進 localStorage，
 * 確保不同裝置（電腦／iPad／橋接頁）拿到同一份。
 */
async function syncPrintSettingsFromBackend_() {
  const url = (cfgBackendUrl && cfgBackendUrl.value || '').trim();
  if (!url) return false;
  try {
    const sep = url.indexOf('?') >= 0 ? '&' : '?';
    const res = await fetch(url + sep + 'action=getPrintSettings&_=' + Date.now(),
      { method: 'GET', cache: 'no-store' });
    if (!res.ok) return false;
    const data = await res.json();
    if (!data || data.result !== 'success') return false;
    if (typeof data.detailTemplate === 'string' && data.detailTemplate.length) {
      localStorage.setItem(LS_DETAIL_TEMPLATE, data.detailTemplate);
    }
    if (typeof data.labelTemplate === 'string' && data.labelTemplate.length) {
      localStorage.setItem(LS_LABEL_TEMPLATE, data.labelTemplate);
    }
    if (data.printMode === 'detail' || data.printMode === 'label') {
      localStorage.setItem(LS_PRINT_MODE, data.printMode);
    }
    if (typeof data.storeName === 'string') {
      localStorage.setItem(LS_STORE_NAME, data.storeName);
    }
    if (data.labelSize && typeof data.labelSize === 'object') {
      localStorage.setItem(LS_LABEL_SIZE, JSON.stringify({
        width:  Number(data.labelSize.width)  > 0 ? Number(data.labelSize.width)  : 40,
        height: Number(data.labelSize.height) > 0 ? Number(data.labelSize.height) : 30
      }));
    }
    if (data.fontConfig && typeof data.fontConfig === 'object') {
      localStorage.setItem(LS_FONT_CONFIG, JSON.stringify(data.fontConfig));
    }
    return true;
  } catch (e) {
    return false;
  }
}

let _pollTickCount_ = 0;
async function pollPendingOrdersOnce_() {
  if (pollInFlight || pollProcessing) return;
  const url = (cfgBackendUrl && cfgBackendUrl.value || '').trim();
  if (!url) {
    setPollStatus_('未設定 Web App URL', 'err');
    return;
  }
  // 週期同步樣版（首次 + 每 N 次輪詢）
  if (_pollTickCount_ === 0 || (_pollTickCount_ % SETTINGS_SYNC_EVERY_N_POLLS) === 0) {
    syncPrintSettingsFromBackend_().catch(function () { /* 略 */ });
  }
  _pollTickCount_++;
  pollInFlight = true;
  try {
    const sep = url.indexOf('?') >= 0 ? '&' : '?';
    const fullUrl = url + sep + 'action=getPendingOrders&_=' + Date.now();
    const res = await fetch(fullUrl, { method: 'GET', cache: 'no-store' });
    if (!res.ok) {
      setPollStatus_('輪詢 HTTP ' + res.status, 'err');
      return;
    }
    const data = await res.json();
    if (!data || data.result !== 'success' || !Array.isArray(data.orders)) {
      setPollStatus_('回應格式異常', 'err');
      return;
    }
    setPollStatus_('輪詢中（最後 ' + new Date().toTimeString().slice(0,8)
      + '）／待出餐 ' + data.orders.length + ' 筆', 'ok');
    await processBackendOrders_(data.orders);
  } catch (e) {
    setPollStatus_('輪詢例外：' + (e && e.message ? e.message : e), 'err');
  } finally {
    pollInFlight = false;
  }
}

async function processBackendOrders_(orders) {
  if (pollProcessing) return;
  pollProcessing = true;
  try {
    for (let i = 0; i < orders.length; i++) {
      const ord = orders[i];
      const oid = (ord.orderId || '').toString();
      if (!oid) continue;
      if (isOrderPrinted_(oid)) continue;

      // 防雙印：若這筆訂單在 5 分鐘內已被 POS postMessage 列印過 → 跳過、且把 orderId 標為已印
      const fp = [
        ord.timestamp ? new Date(ord.timestamp).getTime() : 0,
        ord.total || 0,
        Array.isArray(ord.items) ? ord.items.length : 0,
        ord.phone || ''
      ].join('|');
      if (_hasFingerprintInHistory_(fp, 5 * 60 * 1000)) {
        log('備援略過（已由即時通道列印過）：' + oid, 'info');
        addPrintedOrderId_(oid);
        continue;
      }

      const items = Array.isArray(ord.items) ? ord.items : [];
      const text = buildPrintTextFromBackendOrder_(ord);
      const baseMeta = {
        orderId   : ord.orderId,
        shortId   : ord.shortId || (ord.orderId ? String(ord.orderId).slice(-3) : ''),
        timestamp : ord.timestamp ? new Date(ord.timestamp).getTime() : Date.now(),
        phone     : ord.phone,
        remark    : ord.remark || ord.notes,
        total     : ord.total,
        itemsCount: items.length,
        summary   : items[0] ? items[0].name + (items.length > 1 ? ' 等 ' + items.length + ' 項' : ' x' + (items[0].quantity || 1)) : '',
        mode      : getPrintMode_()
      };

      const mode = getAutoPrintMode_();

      // ★ 手動模式：寫成「待列印」，使用者按按鈕才印；不再自動 autoPrint
      if (mode === 'manual') {
        log('備援收到訂單 ' + oid + '（手動模式：列入待列印）', 'info');
        addToPrintHistory_(Object.assign({}, baseMeta, { source: 'queued', printed: false }), text);
        addPrintedOrderId_(oid);
        continue;
      }

      // 自動模式
      if (!isConnected || !bleChar) {
        log('未連線 BLE，' + oid + ' 寫入待列印（請連線後手動列印）', 'warn');
        addToPrintHistory_(Object.assign({}, baseMeta, { source: 'queued', printed: false }), text);
        addPrintedOrderId_(oid);
        return;
      }
      if (printLock) {
        log('列印鎖定中，' + oid + ' 稍後再試', 'warn');
        return;
      }

      pendingData = { text: text, backUrl: '', ts: Date.now() };
      updateQueueDisplay(pendingData);
      log('備援補印新訂單 ' + oid, 'info');

      try {
        await autoPrint(pendingData);
        addPrintedOrderId_(oid);
        addToPrintHistory_(Object.assign({}, baseMeta, { source: 'polling', printed: true }), text);
      } catch (e) {
        log('列印 ' + oid + ' 失敗: ' + (e && e.message ? e.message : e), 'err');
        return;
      }
    }
  } finally {
    pollProcessing = false;
  }
}

function startPolling_() {
  const url = (cfgBackendUrl && cfgBackendUrl.value || '').trim();
  if (!url) {
    setPollStatus_('請先填入 Web App URL', 'err');
    return;
  }
  try { localStorage.setItem(LS_BACKEND_URL, url); } catch (e) { /* 略 */ }
  try { localStorage.setItem(LS_POLL_ENABLED, '1'); } catch (e) { /* 略 */ }

  if (pollTimer) clearInterval(pollTimer);
  pollPendingOrdersOnce_();
  pollTimer = setInterval(pollPendingOrdersOnce_, POLL_INTERVAL_MS);

  if (btnPollStart) btnPollStart.style.display = 'none';
  if (btnPollStop)  btnPollStop.style.display  = '';
  log('已啟用後端備援（每 ' + POLL_INTERVAL_MS + ' ms 補抓一次）', 'ok');
}

function stopPolling_() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
  try { localStorage.setItem(LS_POLL_ENABLED, '0'); } catch (e) { /* 略 */ }
  if (btnPollStart) btnPollStart.style.display = '';
  if (btnPollStop)  btnPollStop.style.display  = 'none';
  setPollStatus_('已停止', '');
  log('後端備援已停止', 'info');
}

if (btnPollStart) btnPollStart.addEventListener('click', startPolling_);
if (btnPollStop)  btnPollStop.addEventListener('click', stopPolling_);

function loadBackendUrlFromStorage_() {
  try {
    const saved = localStorage.getItem(LS_BACKEND_URL);
    if (saved && cfgBackendUrl) cfgBackendUrl.value = saved;
  } catch (e) { /* 略 */ }
}

function maybeAutoStartPolling_() {
  try {
    const enabled = localStorage.getItem(LS_POLL_ENABLED) === '1';
    const url = cfgBackendUrl && cfgBackendUrl.value;
    if (enabled && url) startPolling_();
  } catch (e) { /* 略 */ }
}

/**
 * 解析 URL 上的設定參數（POS 開啟列印頁時可帶入），自動寫入 localStorage。
 * 支援參數：
 *   webapp         — GAS Web App URL（自動填入並儲存）
 *   autoStart      — 1 / true：載入後自動啟用輪詢
 *   detailTpl      — base64url 編碼的「打印明細」樣版
 *   labelTpl       — base64url 編碼的「商品標籤」樣版
 *   printMode      — 'detail' | 'label'
 */
function consumeUrlParams_() {
  let auto = false;
  try {
    const url = new URL(window.location.href);
    const sp  = url.searchParams;

    const webapp = sp.get('webapp');
    if (webapp && cfgBackendUrl) {
      cfgBackendUrl.value = webapp;
      try { localStorage.setItem(LS_BACKEND_URL, webapp); } catch (e) { /* 略 */ }
      log('已自 URL 帶入 GAS Web App URL', 'ok');
    }

    const detailTpl = sp.get('detailTpl');
    if (detailTpl) {
      try {
        const dec = decodeBase64ToText(detailTpl);
        if (dec) localStorage.setItem(LS_DETAIL_TEMPLATE, dec);
      } catch (e) { /* 略 */ }
    }

    const labelTpl = sp.get('labelTpl');
    if (labelTpl) {
      try {
        const dec = decodeBase64ToText(labelTpl);
        if (dec) localStorage.setItem(LS_LABEL_TEMPLATE, dec);
      } catch (e) { /* 略 */ }
    }

    const mode = sp.get('printMode');
    if (mode === 'detail' || mode === 'label') {
      try { localStorage.setItem(LS_PRINT_MODE, mode); } catch (e) { /* 略 */ }
    }

    const autoStart = sp.get('autoStart');
    if (autoStart === '1' || autoStart === 'true') auto = true;

    if (sp.has('webapp') || sp.has('autoStart') ||
        sp.has('detailTpl') || sp.has('labelTpl') || sp.has('printMode')) {
      try {
        // 用過即清，避免重整時重設
        ['webapp', 'autoStart', 'detailTpl', 'labelTpl', 'printMode']
          .forEach(function (k) { sp.delete(k); });
        const cleanQs = sp.toString();
        const newUrl = url.origin + url.pathname + (cleanQs ? '?' + cleanQs : '') + url.hash;
        history.replaceState(null, '', newUrl);
      } catch (e) { /* 略 */ }
    }
  } catch (e) { /* 略 */ }
  return auto;
}

/**
 * 即時觸發：POS 端可用 `window.open(printerUrl + '#trigger=' + Date.now(), 'printer_window')`
 * 或同名視窗 postMessage({ type: 'TRIGGER_FETCH' }) 來促使打印頁立即抓單，不必等 1.5s。
 */
function setupInstantTrigger_() {
  function tryFetch_() {
    if (!pollTimer) return;            // 未啟用輪詢就不觸發
    pollPendingOrdersOnce_().catch(function () { /* 略 */ });
  }

  window.addEventListener('hashchange', function () {
    if (/^#trigger=/.test(window.location.hash || '')) {
      log('收到 hash 即時觸發', 'info');
      try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch (e) { /* 略 */ }
      tryFetch_();
    }
  });

  window.addEventListener('message', function (ev) {
    const m = ev && ev.data;
    if (!m || typeof m !== 'object') return;
    if (m.type === 'TRIGGER_FETCH') {
      log('收到 TRIGGER_FETCH 即時觸發', 'info');
      tryFetch_();
    }
  });
}

// ── Init ──────────────────────────────────────────────────────
function init() {
  try {
    window.name = 'Gprinter_Handler';
  } catch (e) { /* 略 */ }
  log('打印橋接頁就緒', 'ok');
  log('使用方式：1) 連線藍牙 2) 填入 Web App URL 啟用備援 3) POS 送單會即時列印；網路掉包則由備援補印。', 'info');

  // 主動通知所有可能的 POS 視窗：橋接頁已就緒
  // 這樣即使 POS 重整後 printerWin 引用失效，一旦 POS 再送 PING 就能立即拿到引用
  _broadcastReadyToOpener_();

  handleIncomingData();
  tryAutoReconnectBle_().catch(function () { /* 略 */ });

  loadBackendUrlFromStorage_();
  const forceAuto = consumeUrlParams_();
  setupInstantTrigger_();
  if (forceAuto) {
    try { localStorage.setItem(LS_POLL_ENABLED, '1'); } catch (e) { /* 略 */ }
  }
  maybeAutoStartPolling_();
}

/**
 * 在橋接頁載入完成時，主動向 opener（POS 主頁）回傳 PRINTER_READY 訊號。
 * POS 的 message listener 收到後會自動更新 printerWin 引用。
 * 同時也透過 BroadcastChannel 廣播，以應對 opener 不可用的情況。
 */
function _broadcastReadyToOpener_() {
  const readyMsg = { type: 'PRINTER_READY', ready: true, connected: isConnected };

  // 嘗試通知 opener
  if (window.opener && !window.opener.closed) {
    try {
      window.opener.postMessage(readyMsg, '*');
      log('已向 POS opener 廣播 PRINTER_READY', 'ok');
    } catch (e) {
      log('向 opener 廣播 READY 失敗（跨網域限制）', 'warn');
    }
  }

  // 也透過 BroadcastChannel（同網域備用）
  if (printBroadcastChannel) {
    try { printBroadcastChannel.postMessage(readyMsg); } catch (e) { /* 略 */ }
  }
}

window.onload = function () {
  _broadcastReadyToOpener_();
};

document.addEventListener('visibilitychange', function () {
  if (document.visibilityState !== 'visible') return;
  if (isConnected || !pendingData) return;
  try {
    if (localStorage.getItem(LS_BLE_LAST_DEVICE_ID)) {
      tryAutoReconnectBle_().catch(function () { /* 略 */ });
    }
  } catch (e) { /* 略 */ }
});

/* 與 POS 同網域時可免彈窗即時收單；跨網域時仍以 postMessage / hash 為主 */
let printBroadcastChannel = null;
function initPrintBroadcastChannel_() {
  try {
    printBroadcastChannel = new BroadcastChannel('pos-ble-print-v1');
    printBroadcastChannel.onmessage = function (ev) {
      const msg = ev.data;
      if (!msg) return;

      if (msg.type === 'PRINT_JOB') {
        posOpener = null; // BroadcastChannel 無 source 引用
        receivePrintData({
          text: msg.text || '',
          backUrl: msg.backUrl || '',
          ts: msg.ts || Date.now()
        });
        return;
      }

      // 同網域：POS 廣播 PING 時也回 PONG（透過 BroadcastChannel）
      if (msg.type === 'PRINTER_PING') {
        try {
          printBroadcastChannel.postMessage({
            type: 'PRINTER_PONG', ready: true, connected: isConnected
          });
        } catch (e) { /* 略 */ }
        return;
      }
    };
  } catch (e) {
    log('BroadcastChannel 不可用（可略過）', 'warn');
  }
}

document.addEventListener('DOMContentLoaded', function () {
  initPrintBroadcastChannel_();
  init();
});
</script>
