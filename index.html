<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Gprinter Handler</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --ok: #22c55e;
      --err: #ef4444;
      --warn: #f59e0b;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
    .wrap { max-width: 760px; margin: 16px auto; padding: 12px; }
    .card { background: var(--card); border: 1px solid #1f2937; border-radius: 14px; padding: 14px; }
    .hint { color: var(--muted); font-size: 13px; margin: 6px 0; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    button { border: none; border-radius: 10px; padding: 10px 14px; font-weight: 700; color: #fff; background: var(--accent); cursor: pointer; }
    button.secondary { background: #374151; }
    button.warn { background: #d97706; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #status { margin-top: 10px; max-height: 280px; overflow: auto; white-space: pre-wrap; background: #020617; border: 1px solid #1f2937; border-radius: 10px; padding: 10px; font-size: 12px; }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
    .warn { color: var(--warn); }
    #decoded { margin-top: 10px; white-space: pre-wrap; background: #020617; border: 1px solid #1f2937; border-radius: 10px; padding: 10px; font-size: 12px; max-height: 180px; overflow: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin:0 0 8px;">Gprinter Handler</h2>
      <p class="hint">請保持此分頁開啟；POS 會把列印資料送到此頁。</p>
      <p class="hint" id="meta">視窗名稱：-</p>
      <div class="row">
        <button id="connectBtn">連接打印機</button>
        <button id="testBtn" class="secondary" disabled>測試列印</button>
        <button id="manualBtn" class="warn" style="display:none;">立即列印目前資料</button>
      </div>
      <div id="status"></div>
      <div id="decoded"></div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const DEVICE_NAME = 'Printer_9AE9_BLE';
    const SERVICE_UUID = 'e7810a71-73ae-499d-8c15-faa9aef0c3f2';
    const WRITE_CHAR_UUID = 'bef8d6c9-9c21-4c9e-b632-bd58c1009f9f';

    const connectBtn = document.getElementById('connectBtn');
    const testBtn = document.getElementById('testBtn');
    const manualBtn = document.getElementById('manualBtn');
    const statusEl = document.getElementById('status');
    const decodedEl = document.getElementById('decoded');
    const metaEl = document.getElementById('meta');

    let bleDevice = null;
    let gattServer = null;
    let writeCharacteristic = null;
    let pendingPayload = null; // { text, backUrl, ts }
    let latestHashToken = '';
    let latestDataToken = '';
    let isAutoPrinting = false;

    function setStatus(msg, cls) {
      const t = '[' + new Date().toLocaleTimeString('zh-TW') + '] ' + msg + '\n';
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = t;
      statusEl.appendChild(span);
      statusEl.scrollTop = statusEl.scrollHeight;
      console.log('[Printer]', msg);
    }

    function refreshMeta() {
      const winName = window.name || '(未命名)';
      const devName = bleDevice && bleDevice.name ? bleDevice.name : '未連線';
      metaEl.innerHTML = '視窗名稱：' + winName + '<br>裝置：' + devName;
    }

    function isConnected() {
      return !!(gattServer && gattServer.connected && writeCharacteristic);
    }

    function handleDisconnected() {
      setStatus('藍牙已斷線', 'warn');
      gattServer = null;
      writeCharacteristic = null;
      testBtn.disabled = true;
      refreshMeta();
    }

    async function connectPrinter() {
      if (!navigator.bluetooth) {
        setStatus('瀏覽器不支援 Web Bluetooth', 'err');
        return;
      }
      connectBtn.disabled = true;
      try {
        if (!bleDevice) {
          setStatus('搜尋打印機中...');
          bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ name: DEVICE_NAME }, { services: [SERVICE_UUID] }],
            optionalServices: [SERVICE_UUID]
          });
          bleDevice.addEventListener('gattserverdisconnected', handleDisconnected);
        }
        setStatus('連線 GATT...');
        gattServer = await bleDevice.gatt.connect();
        const service = await gattServer.getPrimaryService(SERVICE_UUID);
        writeCharacteristic = await service.getCharacteristic(WRITE_CHAR_UUID);
        testBtn.disabled = false;
        setStatus('連線成功，可列印', 'ok');
        refreshMeta();
        tryAutoPrintFromPending();
      } catch (e) {
        setStatus('連線失敗：' + (e && e.message ? e.message : String(e)), 'err');
      } finally {
        connectBtn.disabled = false;
      }
    }

    async function sendRawText(txt) {
      if (!writeCharacteristic) throw new Error('尚未連線');
      const payload = new TextEncoder().encode(String(txt || ''));
      if (typeof writeCharacteristic.writeValueWithoutResponse === 'function') {
        await writeCharacteristic.writeValueWithoutResponse(payload);
      } else {
        await writeCharacteristic.writeValue(payload);
      }
    }

    function decodeBase64Utf8(base64Text) {
      return decodeURIComponent(escape(atob(String(base64Text || ''))));
    }

    function parseHashPayload() {
      const rawHash = (window.location.hash || '').replace(/^#/, '');
      const params = new URLSearchParams(rawHash);
      const encodedData = params.get('data');
      if (!encodedData) return null;
      const backUrl = params.get('back') || '';
      const ts = Number(params.get('ts') || 0) || Date.now();
      try {
        const text = decodeBase64Utf8(decodeURIComponent(encodedData));
        decodedEl.textContent = text;
        return { text: text, backUrl: backUrl, ts: ts };
      } catch (e) {
        setStatus('資料解碼失敗：' + (e && e.message ? e.message : String(e)), 'err');
        return null;
      }
    }

    function acceptPayload(payload, sourceTag) {
      if (!payload || !payload.text) return;
      pendingPayload = payload;
      manualBtn.style.display = 'inline-block';
      setStatus('收到新列印資料（來源：' + sourceTag + '）', 'ok');
      if (isConnected()) tryAutoPrintFromPending();
      else setStatus('尚未連線藍牙，請先按「連接打印機」', 'warn');
    }

    async function printPayload(payload) {
      if (!payload || !payload.text) return;
      await sendRawText(payload.text + '\n');
    }

    async function tryAutoPrintFromPending() {
      if (!pendingPayload || !writeCharacteristic || isAutoPrinting) return;
      isAutoPrinting = true;
      try {
        setStatus('開始自動列印...', 'ok');
        await printPayload(pendingPayload);
        setStatus('列印完成', 'ok');
        const backToPos = String(pendingPayload.backUrl || '');
        pendingPayload = null;
        manualBtn.style.display = 'none';
        if (backToPos) {
          const shouldBack = window.confirm('列印完成，是否返回 POS 頁面？');
          if (shouldBack) window.location.href = backToPos;
        }
      } catch (e) {
        setStatus('自動列印失敗：' + (e && e.message ? e.message : String(e)), 'err');
      } finally {
        isAutoPrinting = false;
      }
    }

    function handleIncomingHash() {
      // 固定命名視窗，讓 POS target 命中同一分頁
      if (window.name !== 'Gprinter_Handler') window.name = 'Gprinter_Handler';
      refreshMeta();

      const currentHash = window.location.hash || '';
      if (currentHash === latestHashToken) return;
      latestHashToken = currentHash;

      const params = new URLSearchParams(currentHash.replace(/^#/, ''));
      const dataToken = params.get('data') || '';
      if (!dataToken || dataToken === latestDataToken) return;
      latestDataToken = dataToken;

      const payload = parseHashPayload();
      if (!payload) return;
      acceptPayload(payload, 'hash');
    }

    async function sendTest() {
      try {
        if (!isConnected()) throw new Error('尚未連線藍牙');
        const tspl = [
          'RT',
          'CLS',
          'SIZE 40 mm, 30 mm',
          'GAP 2 mm, 0 mm',
          'TEXT 40,40,"TSS24.BF2",0,1,1,"TEST PRINT"',
          'PRINT 1'
        ].join('\n') + '\n';
        await sendRawText(tspl);
        setStatus('測試列印已送出', 'ok');
      } catch (e) {
        setStatus('測試失敗：' + (e && e.message ? e.message : String(e)), 'err');
      }
    }

    connectBtn.addEventListener('click', connectPrinter);
    testBtn.addEventListener('click', sendTest);
    manualBtn.addEventListener('click', function () { tryAutoPrintFromPending(); });
    window.addEventListener('hashchange', handleIncomingHash);
    window.addEventListener('message', function (event) {
      const data = event && event.data;
      if (!data || data.type !== 'PRINT_JOB' || !data.text) return;
      acceptPayload({
        text: String(data.text || ''),
        backUrl: String(data.backUrl || ''),
        ts: Number(data.ts || Date.now())
      }, 'postMessage');
    });

    handleIncomingHash();
    refreshMeta();
  })();
  </script>
</body>
</html>
