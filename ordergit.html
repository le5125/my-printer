function renderStoreInfo() {
  var s = storeData || {};
  var html = '';

  if (orderStoreInfoPromoBtnVisible_()) {
    html += '<button type="button" class="si-store-promo-btn" onclick="orderOpenMerchantPromoAdFromStore_()">🎁 商家活動</button>';
  }

  // ── 商家簡介 ──
  if (s.description) {
    html += siRow('📝', '商家簡介', escHtml(s.description));
  }

  // ── 營業時間 ──
  if (s.businessHours) {
    html += siRow('🕐', '營業時間', escHtml(s.businessHours));
  }

  // ── 公休日（每週固定）──
  if (s.fixedClosedDays) {
    var dayParts = String(s.fixedClosedDays).split(',');
    var dayLabels = [];
    for (var di = 0; di < dayParts.length; di++) {
      var t = dayParts[di].trim();
      var mapped = DAY_MAP[t];
      if (mapped) { dayLabels.push('每週' + mapped); }
      else if (t) { dayLabels.push(t); }
    }
    if (dayLabels.length) {
      html += siRow('🚫', '公休日', dayLabels.join('、'));
    }
  }

  // ── 休假日（特定日期假期）──
  if (s.holidays && s.holidays.length) {
    var hdates = [];
    for (var hi = 0; hi < s.holidays.length; hi++) {
      var hd = String(s.holidays[hi]).trim();
      if (hd) hdates.push(hd);
    }
    if (hdates.length) {
      // 超過 5 筆只顯示前 5 筆 + 省略
      var display = hdates.slice(0, 5);
      var extra   = hdates.length - display.length;
      var hdStr   = display.join('、');
      if (extra > 0) { hdStr += '&nbsp;<span style="color:#aaa;font-size: 1.64568rem;">+ 另 ' + extra + ' 天</span>'; }
      html += siRow('📅', '休假日', hdStr);
    }
  }

  // ── 電話 ──
  if (s.phone) {
    html += siRow('📞', '電話',
      '<a href="tel:' + escHtml(s.phone) + '">' + escHtml(s.phone) + '</a>');
  }

  // ── 地址 + 導航 + 地圖（全寬 Foodpanda 風格）──
  if (s.address) {
    var mapUrl   = s.mapUrl || ('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.address));

    // MapPin SVG（線稿圖釘，與文字同色）
    var pinSVG = '<svg class="si-addr-pin" width="52" height="52" viewBox="0 0 24 24"'
      + ' fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
      + '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>'
      + '<circle cx="12" cy="10" r="3"/></svg>';

function doOrderSearch() {
  if (!currentWebAppUrl) {
    showToast('❗ 部署網址未載入，請確認「認證碼」B2');
    return;
  }
  var phone = document.getElementById('ol-phone').value.trim();
  if (!phone) { showToast('❗ 請輸入手機號碼'); return; }

  var btn       = document.getElementById('ol-search-btn');
  var resultsEl = document.getElementById('ol-results');

  btn.textContent = '查詢中…';
  btn.disabled    = true;
  resultsEl.innerHTML = '<div style="text-align:center;padding:48px 20px;color:#aaa;font-size: 2.37712rem;">⏳ 查詢中，請稍候…</div>';

  var uS = orderWebAppGetActionUrl_('searchOrder', 'phone=' + encodeURIComponent(phone) + '&_=' + Date.now());
  if (!uS) {
    resultsEl.innerHTML = '<div style="text-align:center;padding:48px 20px;color:#ef4444;font-size: 1.92rem;">❌ 查詢失敗，請稍後再試</div>';

    return;

  fetch(uS, { cache: 'no-store', credentials: 'omit' })
    .then(function(res) { return res.text(); })
    .then(function(txt) {
      var data = null;
      try { data = txt ? JSON.parse(txt) : null; } catch (eJ) { data = null; }
      if (data.result !== 'success') throw new Error(data.message || '查詢失敗');
      renderOrderResults(data.orders);

      setTimeout(function() {
        resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 120);
    })
    .catch(function(err) {
      resultsEl.innerHTML = '<div style="text-align:center;padding:48px 20px;color:#ef4444;font-size: 1.92rem;">❌ 查詢失敗，請稍後再試</div>';
      console.error('searchOrder error:', err);

      btn.textContent = '查詢';

function renderOrderResults(orders) {
  var el = document.getElementById('ol-results');

  if (!orders || orders.length === 0) {
    el.innerHTML = '<div class="ol-empty">查無訂單<br><span style="font-size: 1.92rem;font-weight:700;color:#aaa;">找不到該電話號碼的訂單記錄</span></div>';
    return;
  }

  // 依日期新→舊排序
  orders.sort(function(a, b) {
    return (b.date || '').localeCompare(a.date || '');
  });

  var html = '<div class="ol-count">共找到 ' + orders.length + ' 筆訂單</div>';

  for (var oi = 0; oi < orders.length; oi++) {
    var order = orders[oi];
    var itemsHtml  = '';
    var calcTotal  = 0;
    var itemList   = sortOrderItemsByMainNameClient_(order.items || []);

    for (var ii = 0; ii < itemList.length; ii++) {
      var item      = itemList[ii];
      var addonSum  = 0;
      var addonParts = [];
      var opts = item.options || [];
      for (var oi2 = 0; oi2 < opts.length; oi2++) {
        addonSum += (opts[oi2].price || 0);
        addonParts.push(escHtml(opts[oi2].name));
      }
      var unitPrice = (item.price || 0);
      var qty       = (item.quantity || 1);
      var lineTotal = unitPrice * qty;
      calcTotal    += lineTotal;

      itemsHtml += '<div class="ol-item-row">'
        + '<div class="ol-item-name">'
        + escHtml(item.name)
        + ' <span style="color:#aaa;">× ' + qty + '</span>';
      if (addonParts.length) {
        itemsHtml += '<span class="ol-item-addon">+ ' + addonParts.join('、') + '</span>';
      }
      if (item.note && item.note.toString().trim()) {
        itemsHtml += '<span class="ol-item-note">備註：' + escHtml(item.note) + '</span>';
      }
      itemsHtml += '</div>'
        + '<div class="ol-item-price">NT$' + lineTotal + '</div>'
        + '</div>';
    }

    var displayTotal = order.total || calcTotal;
    var shortId      = order.orderId ? order.orderId.toString().slice(-6) : '------';

    html += '<div class="ol-card">'
      + '<div class="ol-card-header">'
      + '<div>'
      + '<div class="ol-card-date">' + escHtml(order.date || '') + '</div>'
      + (order.pickupTime
          ? '<div class="ol-card-time"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + escHtml(order.pickupTime) + ' 取餐</div>'
          : '')
      + '</div>'
      + '<div class="ol-card-id">#' + escHtml(shortId) + '</div>'
      + '</div>'
      + itemsHtml
      + '<div class="ol-total">'
      + '<span class="ol-total-label">總金額</span>'
      + '<span class="ol-total-amount">NT$ ' + displayTotal + '</span>'
      + '</div>'
      + (order.notes && order.notes.toString().trim()
          ? '<div class="ol-order-notes">備註：' + escHtml(order.notes) + '</div>'
          : '')
      + '</div>';
  }

  el.innerHTML = html;
}

    _orderPhoneEl.addEventListener('input', function () {
      orderCartPointDiscountNtd = 0;
      orderRefreshMemberPointsForDiscountCart_();
    });
  }


  // ── Cart-bar 防誤觸：三重保護 ──
  // 條件1：touch 必須從 cart-bar 本身開始（頁面滑動的 touch 是從內容區開始的）
  // 條件2：手指位移 < 5px（排除滑動手勢）
  // 條件3：頁面不在捲動中
  // e.preventDefault() 阻止瀏覽器合成假 click 事件
  const cartBar = document.getElementById('cart-bar');
  let _cbOnBar = false, _cbStartY = 0, _cbMoved = false;

  cartBar.addEventListener('touchstart', e => {
    _cbOnBar  = true;
    _cbStartY = e.touches[0].clientY;
    _cbMoved  = false;
  }, { passive: true });

  cartBar.addEventListener('touchmove', e => {
    if (Math.abs(e.touches[0].clientY - _cbStartY) > 5) _cbMoved = true;
  }, { passive: true });

  cartBar.addEventListener('touchend', e => {
    const ok = _cbOnBar && !_cbMoved && !_pageScrolling && !_programScroll;
    _cbOnBar = false;
    _cbMoved = false;
    if (!ok) return;
    e.preventDefault(); // 阻止合成 click，確保只執行一次
    openCartDrawer();
  }, { passive: false });

  // 桌機滑鼠（mouseup）：若 500ms 內有過 touch 事件，視為合成事件忽略
  let _lastTouchMs = 0;
  document.addEventListener('touchstart', () => { _lastTouchMs = Date.now(); }, { passive: true, capture: true });
  cartBar.addEventListener('mouseup', e => {
    if (e.button !== 0) return;
    if (Date.now() - _lastTouchMs < 500) return; // 手機 touch 合成的 mouseup，略過
    if (!_pageScrolling && !_programScroll) openCartDrawer();
  });

  orderRefreshMemberCornerVisibility_();
  /* 預約圖示：依後端「是否開放預約」決定是否顯示 */
  try { if (typeof refreshReservationCornerVisibility_ === 'function') refreshReservationCornerVisibility_(); } catch (eRC0) {}
  try { orderRefreshDineInCartChrome_(); } catch (eDc) {}
  orderInitialReadyState_.homeReady = true;
  orderTryCloseInitialLoading_();
}

var ORDER_DINEIN_SESS_KEY = 'order_dinein_sess_v1';
function orderParseDineInUrlParams_() {
  try {
    var ds = window.__ORDER_DINEIN_SERVER__;
    if (ds && typeof ds === 'object') {
      var t0 = String(ds.table != null ? ds.table : '').trim();
      var k0 = String(ds.key != null ? ds.key : '').trim();
      if (t0) return { table: t0, key: k0 };
    }
  } catch (eSrv) {}
  var sp = null;
  try {
    sp = new URLSearchParams(window.location.search || '');
    var hasT = sp.get('table') || sp.get('Table');
    var hasK = sp.get('key') || sp.get('Key');
    if (!hasT && !hasK && window.top && window.top !== window) {
      try {
        sp = new URLSearchParams(window.top.location.search || '');
      } catch (eTop) {}
    }
  } catch (e1) {
    sp = null;
  }
  try {
    if (!sp) sp = new URLSearchParams(window.location.search || '');
  } catch (e2) {
    return null;
  }
  var tb = String(sp.get('table') || sp.get('Table') || '').trim();
  var ky = String(sp.get('key') || sp.get('Key') || '').trim();
  if (!tb) return null;
  return { table: tb, key: ky };
}

    /* 鎖背景捲動，避免畫面跑動感受到延遲 */
    document.body.style.overflow = 'hidden';
    var dInp = document.getElementById('resv-drawer-date');
    /* 預設日期＝明天，保持與 POS／GitHub 同步 */
    if (dInp && !dInp.value) dInp.value = _resvDrawerTomorrow_();
    if (dInp) dInp.onchange = refreshDrawerTimeGrid_;
    /* 立即 render（用 cache 中的明天容量；若無則 refreshDrawerTimeGrid_ 會自動拉一次） */
    refreshDrawerTimeGrid_();
    /* 同步背景再抓一次今天，方便切換日期不卡 */
    try {
      var todayStr = (function () {
        var d = new Date(); var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
      })();
      _resvDrawerFetch_('getReservationCapacity', { date: todayStr }).then(function (c) {
        if (c && c.result === 'success') {
          window.__resvDrawerCapByDate = window.__resvDrawerCapByDate || {};
          window.__resvDrawerCapByDate[todayStr] = c;
        }
      });
    } catch (e2) { /* 略 */ }
    /* 開啟瞬間捲到頂端 */
    var sc = document.getElementById('resv-drawer-scroll');
    if (sc) sc.scrollTop = 0;
    /* 第一次開啟時掛上下滑關閉手勢 */
    _initResvDrawerSwipe_();
  }
  function closeReservationDrawer() {
    var ov = document.getElementById('resv-drawer-overlay');
    var dr = document.getElementById('resv-drawer');
    if (!ov || !dr) return;
    /* 重置可能殘留的拖曳 transform */
    dr.style.transform = '';
    dr.style.transition = '';
    dr.classList.remove('show');
    ov.classList.remove('show');
    document.body.style.overflow = '';
    setTimeout(function () { ov.style.display = 'none'; dr.style.display = 'none'; dr.setAttribute('aria-hidden', 'true'); }, 360);
  }
  /** 預約抽屜下滑關閉手勢：同商品抽屜 (initSheetSwipe) 邏輯 — scrollTop 為 0 時下滑＞120px 才關閉，否則彈回 */
  function _initResvDrawerSwipe_() {
    if (window.__resvDrawerSwipeInit) return;
    window.__resvDrawerSwipeInit = true;
    var dr = document.getElementById('resv-drawer');
    var sc = document.getElementById('resv-drawer-scroll');
    var grip = document.getElementById('resv-drawer-grip');
    if (!dr || !sc) return;
    var startY = 0, startScrollTop = 0, dragging = false, fromGrip = false;
    function onStart(e) {
      var t = (e.touches && e.touches[0]) || e;
      startY = t.clientY;
      startScrollTop = sc.scrollTop;
      dragging = false;
      fromGrip = !!(e.target && (e.target === grip || (e.target.classList && e.target.classList.contains('resv-d-grip-bar'))));
    }
    function onMove(e) {
      var t = (e.touches && e.touches[0]) || e;
      var dy = t.clientY - startY;
      /* 從拖曳條開始：可直接拖；從 body 開始：需在頂端且向下滑才接管 */
      var canDrag = fromGrip || (startScrollTop <= 0 && dy > 8);
      if (canDrag && dy > 0) {
        dragging = true;
        dr.style.transition = 'none';
        dr.style.transform = 'translateY(' + Math.min(dy * 0.9, 480) + 'px)';
        if (e.preventDefault) e.preventDefault();
      }
    }
    function onEnd(e) {
      if (!dragging) return;
      dragging = false;
      var t = (e.changedTouches && e.changedTouches[0]) || e;
      var dy = t.clientY - startY;
      dr.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';
      if (dy > 120) {
        dr.style.transform = 'translateY(100%)';
        setTimeout(closeReservationDrawer, 220);
      } else {
        dr.style.transform = 'translateY(0)';
      }
    }
    dr.addEventListener('touchstart', onStart, { passive: true });
    dr.addEventListener('touchmove', onMove, { passive: false });
    dr.addEventListener('touchend', onEnd);
  }
  /** 分段營業時間解析（支援半形／全形逗號）；與 POS 取餐時段規則一致 */
  function orderParseOpenCloseRangesForResv_(openingHours) {
    var cleaned = String(openingHours || '')
      .replace(/[０-９]/g, function (d) {
        return String.fromCharCode(d.charCodeAt(0) - 0xFF10 + 0x30);
      })
      .replace(/[：﹕]/g, ':')
      .replace(/[～~－–—‒−﹣]/g, '-')
      .trim();
    var ranges = cleaned.split(/[,，、]/).map(function (seg) {
      seg = String(seg || '').trim();
      var mx = seg.match(/^(\d{1,2}):(\d{2})\s*[-~]\s*(\d{1,2}):(\d{2})$/);
      if (!mx) return null;
      var openMin = parseInt(mx[1], 10) * 60 + parseInt(mx[2], 10);
      var closeMin = parseInt(mx[3], 10) * 60 + parseInt(mx[4], 10);
      if (closeMin <= openMin) closeMin = openMin + 12 * 60;
      return { openMin: openMin, closeMin: closeMin };
    }).filter(Boolean);
    if (!ranges.length) return [{ openMin: 10 * 60, closeMin: 22 * 60 }];
    return ranges;
  }
  function orderBuildReservationSlotStarts_(openingHoursStr, stepMin) {
    var step = stepMin || 30;
    var ranges = orderParseOpenCloseRangesForResv_(openingHoursStr);
    var seen = {}, arr = [];
    ranges.forEach(function (rng) {
      for (var tt = rng.openMin; tt < rng.closeMin; tt += step) {
        if (!seen[tt]) { seen[tt] = true; arr.push(tt); }
      }
    });
    arr.sort(function (a, b) { return a - b; });
    if (!arr.length) {
      for (var t2 = 10 * 60; t2 < 22 * 60; t2 += step) arr.push(t2);
    }
    return arr;
  }
  /** 把容量資訊渲染到時段 grid。可單獨呼叫（cache 即時 render 與 fetch 後刷新都重用此函式） */
  function _resvDrawerRenderGridImpl_(settings, cap) {
    var grid = document.getElementById('resv-drawer-time-grid');
    if (!grid) return;
    settings = settings || window.__resvDrawerSettings || {};
    cap = cap || { totalSeats: settings.totalSeats || 0, bookedByMin: {}, blockedTimes: [], slotMin: 30, bookingHoldMin: settings.bookingHoldMin || 90 };
    var totalSeats = cap.totalSeats || settings.totalSeats || 0;
    var slotMin = cap.slotMin || 30;
    var hoursForSlots = '';
    try {
      var info2 = (typeof merchantInfo !== 'undefined' && merchantInfo) ? merchantInfo : null;
      hoursForSlots = info2 && info2.businessHours ? String(info2.businessHours) : '';
    } catch (eHr) { /* 略 */ }
    var slotStarts = orderBuildReservationSlotStarts_(hoursForSlots, slotMin);
    var holdMin = cap.bookingHoldMin || settings.bookingHoldMin || 90;
    var blockedSet = {}; (cap.blockedTimes || []).forEach(function (t) { blockedSet[t] = true; });
    var capInfo = document.getElementById('resv-drawer-cap-info');
    if (capInfo) capInfo.textContent = totalSeats > 0 ? ('總座位 ' + totalSeats + ' 人') : '';
    var people = parseInt((document.getElementById('resv-drawer-people') || {}).value, 10) || 1;
    var overEl = document.getElementById('resv-drawer-overcap');
    if (overEl) {
      if (totalSeats > 0 && people > totalSeats) {
        overEl.style.display = 'block';
        overEl.textContent = '人數過多，超過餐廳總座位數（最多 ' + totalSeats + ' 位）';
      } else {
        overEl.style.display = 'none';
        overEl.textContent = '';
      }
    }
    var prevSelected = window.__resvDrawerSelectedTime || '';
    var anyAvail = false;
    var html = [];
    for (var si = 0; si < slotStarts.length; si++) {
      var t = slotStarts[si];
      var hh = String(Math.floor(t / 60)).padStart(2, '0');
      var mm = String(t % 60).padStart(2, '0');
      var hhmm = hh + ':' + mm;
      var maxBooked = 0;
      for (var mi = t - (t % slotMin); mi < t + holdMin; mi += slotMin) {
        var b = (cap.bookedByMin || {})[mi] || 0;
        if (b > maxBooked) maxBooked = b;
      }
      var available = totalSeats - maxBooked;
      var isBlocked = !!blockedSet[hhmm];
      var isFull = isBlocked || (totalSeats > 0 && available < Math.max(1, people));
      var isWarn = !isFull && totalSeats > 0 && (available <= Math.max(2, totalSeats * 0.25));
      if (!isFull) anyAvail = true;
      var cls = isFull ? 'resv-slot-full' : (isWarn ? 'resv-slot-warn' : 'resv-slot-ok');
      if (!isFull && hhmm === prevSelected) cls += ' resv-slot-selected';
      var label = isBlocked ? '客滿' :
                  (totalSeats <= 0 ? '可預約' :
                  (isFull ? '客滿' :
                  ('剩 ' + Math.max(0, available) + ' 位')));
      html.push(
        '<button type="button" class="resv-slot-btn ' + cls + '" data-time="' + hhmm + '" data-disabled="' + (isFull ? '1' : '0') + '"' + (isFull ? ' aria-disabled="true"' : '') + '>' +
          '<span class="resv-slot-time">' + hhmm + '</span>' +
          '<span class="resv-slot-tag">' + label + '</span>' +
        '</button>'
      );
    }
    if (!anyAvail) html.push('<div style="grid-column:1/-1;text-align:center;color:#b91c1c;font-weight:800;padding:14px;font-size: 0.82288rem;">目前該日期所有時段都客滿</div>');
    grid.innerHTML = html.join('');
    grid.querySelectorAll('button.resv-slot-btn').forEach(function (b) {
      b.addEventListener('click', function () {
        if (this.getAttribute('data-disabled') === '1') return;
        window.__resvDrawerSelectedTime = this.getAttribute('data-time');
        grid.querySelectorAll('button.resv-slot-btn').forEach(function (x) { x.classList.remove('resv-slot-selected'); });
        this.classList.add('resv-slot-selected');
      });
    });
    var pInp = document.getElementById('resv-drawer-people');
    if (pInp) pInp.oninput = refreshDrawerTimeGrid_;
  }
  async function refreshDrawerTimeGrid_() {
    var grid = document.getElementById('resv-drawer-time-grid');
    if (!grid) return;
    var date = (document.getElementById('resv-drawer-date') || {}).value || _resvDrawerTomorrow_();
    var settings = window.__resvDrawerSettings;
    var capCache = window.__resvDrawerCapByDate || {};
    /* 1) cache 已有資料：先立刻 render（使用體感 0 延遲） */
    if (settings && capCache[date]) {
      _resvDrawerRenderGridImpl_(settings, capCache[date]);
    } else {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:24px;font-size: 0.82288rem;font-weight:800;">載入時段中...</div>';
    }
    /* 2) 背景刷新最新設定（POS／GitHub 改完設定後消費者端會跟到） */
    if (!settings) {
      var s = await _resvDrawerFetch_('getReservationSettings');
      if (s && s.result === 'success') settings = window.__resvDrawerSettings = s;
    } else {
      _resvDrawerFetch_('getReservationSettings').then(function (sLatest) {
        if (sLatest && sLatest.result === 'success') {
          window.__resvDrawerSettings = sLatest;
          if (window.__resvDrawerCapByDate && window.__resvDrawerCapByDate[date]) {
            _resvDrawerRenderGridImpl_(sLatest, window.__resvDrawerCapByDate[date]);
          }
        }
      });
    }
    /* 3) 抓最新容量並覆蓋 cache、重新 render（避免 cache 過期） */
    var capRet = await _resvDrawerFetch_('getReservationCapacity', { date: date });
    var cap = (capRet && capRet.result === 'success') ? capRet : (capCache[date] || null);
    if (capRet && capRet.result === 'success') {
      window.__resvDrawerCapByDate = window.__resvDrawerCapByDate || {};
      window.__resvDrawerCapByDate[date] = capRet;
    }
    if (cap) _resvDrawerRenderGridImpl_(window.__resvDrawerSettings || settings, cap);
  }
  document.getElementById('resv-drawer-submit')?.addEventListener('click', function () {
    var submitBt = this;
    var date = (document.getElementById('resv-drawer-date') || {}).value || '';
    var time = window.__resvDrawerSelectedTime || '';
    var people = parseInt((document.getElementById('resv-drawer-people') || {}).value, 10) || 0;
    var phone = String((document.getElementById('resv-drawer-phone') || {}).value || '').trim();
    var note = (document.getElementById('resv-drawer-note') || {}).value || '';
    if (!date || !time || !people) {
      alert('請完整填寫日期、時段與人數'); return;
    }
    if (!phone) {
      alert('請填寫聯絡電話');
      return;
    }
    /* 前端先做容量檢查，把超量的單擋下，避免送到後端再被拒絕 */
    var settings = window.__resvDrawerSettings;
    if (settings && parseInt(settings.totalSeats, 10) > 0 && people > parseInt(settings.totalSeats, 10)) {
      alert('人數過多，超過餐廳總座位數（最多 ' + settings.totalSeats + ' 位）');
      return;
    }
    if (!currentWebAppUrl) { alert('系統未連線後端，請稍後再試'); return; }
    if (window.__resvOnlineSubmitInFlight) { showToast('⏳ 預約送出中，請勿重複點擊'); return; }
    window.__resvOnlineSubmitInFlight = true;
    var origLabel = submitBt.textContent || '送出預約';
    var clientKey = (typeof orderGetClientKey_ === 'function') ? orderGetClientKey_() : '';
    var body = {
      action: 'submitOnlineReservation',
      source: 'order',
      key: clientKey,
      reservation: { date: date, time: time, people: String(people), phone: phone, note: String(note || '') }
    };

    submitBt.classList.remove('success');
    submitBt.classList.add('loading');
    submitBt.disabled = true;
    /* 立即顯示成功；GAS 在背景紀錄（與線上送單相同體驗） */
    submitBt.classList.add('success');
    submitBt.textContent = '✓ 預約已送出！';
    if (typeof orderSwalToastSuccess === 'function') {
      orderSwalToastSuccess('預約送出成功，謝謝！', 2500);
    }

    fetch(currentWebAppUrl, {
      method: 'POST',
      mode: 'cors',
      credentials: 'omit',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    })
      .then(function (r) { return r.text(); })
      .then(function (t) {
        var ret = null;
        try { ret = t ? JSON.parse(t) : null; } catch (eJ) { ret = null; }
        if (!ret || ret.result !== 'success') {
          console.error('[order] 線上預約回應異常', t);
          var msg = (ret && ret.message) ? String(ret.message) : '未知錯誤';
          alert('預約可能未存入系統（' + msg + '）。請稍後再試或來電確認。');
        }
      })
      .catch(function (err) {
        console.error('[order] 線上預約 GAS 失敗:', err);
        alert('網路異常，預約可能尚未存檔。請稍後再試或來電確認。');
      });

    setTimeout(function () {
      window.__resvDrawerSelectedTime = '';
      try { refreshDrawerTimeGrid_(); } catch (eRg) {}
      closeReservationDrawer();
      submitBt.classList.remove('loading', 'success');
      submitBt.disabled = false;
      submitBt.textContent = origLabel;
      window.__resvOnlineSubmitInFlight = false;
    }, 1800);
  });
  /* 啟動後刷新預約圖示顯示；同時把預約設定 / 明天容量背景預抓好（按下預約圖示立刻可開窗、不轉圈） */
  document.addEventListener('DOMContentLoaded', function () {
    setTimeout(function () {
      refreshReservationCornerVisibility_();
      _resvDrawerBgPrefetch_();
    }, 1500);
    /* 每 30 秒輪詢設定（同步老闆端的開關／座位／用餐時間變動） */
    setInterval(function () {
      try {
        if (document.hidden) return;
        refreshReservationCornerVisibility_();
        _resvDrawerBgPrefetch_();
      } catch (eP) { /* 略 */ }
    }, 30000);
  });
</script>
