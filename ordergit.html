<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>
(function () {
  try {
    var ua = navigator.userAgent || '';
    if (/Line/i.test(ua)) document.documentElement.classList.add('ordergit-line-inapp');
  } catch (e) {}
})();
</script>
<!-- GitHub／LINE：請用 ?id= 或 ?mid= GAS 部署 ID -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>線上點餐</title>
<!--
  ordergit.html（GitHub Pages 單檔版）— 與 GAS 版 order.html 同源流程，差異在部署與部分樣式變數。
  LIFF：LIFF ID 由後端讀取試算表「認證碼」I2（勿寫死）；空白則不啟用 LIFF。
  為 LINE WebView 效能：不使用 Tailwind CDN（整頁 JIT 極慢）；樣式以本檔 <style> 為主。
  主程式：DOMContentLoaded → bootstrapOrder → init → renderMenu。
-->
<link rel="dns-prefetch" href="https://script.google.com">
<link rel="preconnect" href="https://script.google.com" crossorigin>
<script>
(function () {
  if (document.documentElement.classList.contains('ordergit-line-inapp')) return;
  var l = document.createElement('link');
  l.rel = 'stylesheet';
  l.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap';
  document.head.appendChild(l);
})();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script defer src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root {
    /* LIFF／系統 WebView 易覆寫 CSS 變數，!important 固定品牌色備援；後台 menuColors 會再以 inline !important 更新 */
    --panda: #D70464 !important;
    --panda-dark: #b50353 !important;
    --panda-light: rgba(215, 4, 100, 0.1) !important;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  * { box-sizing: border-box; }

  /* GitHub 流動式：base rem 加大（原 14px）+ 全頁字重加粗；勿對 body 設 overflow-x:hidden，以免 sticky 失效 */
  html, body {
    font-size: 18px;
    margin: 0;
    padding: 0;
    width: 100%;
    max-width: 100%;
    overflow-x: visible;
  }
  html {
    scroll-behavior: smooth;
    overscroll-behavior-y: none;
  }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #f7f7f7;
    overscroll-behavior-y: none;
    font-weight: 700;
  }
  html.ordergit-line-inapp body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
  }
  body button, body input, body textarea, body select {
    font-weight: 700;
  }
  /* SweetAlert／表單插件常帶預設字重，一併加粗以符合全頁粗體 */
  .swal2-popup, .swal2-title, .swal2-html-container, .swal2-input, .swal2-textarea {
    font-weight: 700 !important;
  }

  /* 通用容器：寬 90%、上限 360px（內文區置中；全螢幕底層抽屜另於內層約束） */
  .ordergit-ui-panel-inner {
    width: 90%;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
    box-sizing: border-box;
  }

  .swal2-container {
    z-index: 12000 !important;
  }

  /* 所有標示為 .modal-content 的 SweetAlert：與手機彈窗同寬、左右留白 */
  .swal2-popup.modal-content {
    width: 90% !important;
    max-width: 360px !important;
    min-width: unset !important;
    margin: 20px auto !important;
    box-sizing: border-box !important;
  }

  /* 會員彈窗：SweetAlert 用 .order-member-swal-popup + .modal-content */
  .order-member-swal-popup.modal-content,
  .modal-content.order-member-swal-popup,
  .order-member-swal-popup {
    width: 90% !important;
    max-width: 360px !important;
    min-width: unset !important;
    margin: 20px auto !important;
    padding: 1.25rem 1rem 1.5rem !important;
    box-sizing: border-box !important;
  }
  .order-member-swal-popup .swal2-title,
  .modal-content .swal2-title {
    font-size: clamp(0.88rem, 4vw, 1.08rem) !important;
    line-height: 1.35 !important;
  }
  .order-member-swal-popup .swal2-html-container,
  .modal-content .swal2-html-container {
    font-size: 0.8rem !important;
    line-height: 1.45 !important;
  }
  .order-member-swal-popup .swal2-input,
  .modal-content .swal2-input {
    font-size: 0.8rem !important;
    line-height: 1.35 !important;
    padding: 0.65rem 0.75rem !important;
    min-height: 2.75rem !important;
    box-sizing: border-box !important;
    width: 100% !important;
    margin: 0.65rem auto 0 !important;
  }
  .order-member-swal-popup .swal2-actions,
  .modal-content .swal2-actions {
    margin-top: 1rem !important;
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 10px !important;
    justify-content: center !important;
  }
  .order-member-swal-popup .swal2-styled,
  .modal-content .swal2-styled {
    font-size: 0.76rem !important;
    padding: 0.55rem 0.85rem !important;
    min-height: 2.4rem !important;
    margin: 0 !important;
    flex: 1 1 auto !important;
  }

  /* 預約抽屜內容區置中並不超過 360px */
  #resv-drawer .resv-d-header,
  #resv-drawer .resv-d-body {
    width: 90%;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
    box-sizing: border-box;
  }
  /* 購物車抽屜：滿寬（僅依區塊自身 padding 留白，避免過窄） */
  #cart-drawer .cart-header,
  #cart-drawer .cart-content-pad,
  #cart-drawer .sheet-footer {
    width: 100%;
    max-width: none;
    margin-left: 0;
    margin-right: 0;
    box-sizing: border-box;
  }

  /* ═══════════════════════════════════════════════════════════
     GitHub：進場動畫結束後的首頁骨架（Hero → 分類 Tab → 商品網格）
     全寬、overflow-x 由 body 控制；與 #menu-loading 分層
     ═══════════════════════════════════════════════════════════ */
  /* ════ Hero Banner（高度再縮約 1/5；logo／店名／營業狀態放大 1.5×）════ */
  #hero-banner {
    height: clamp(8.8rem, 28vh, 22.5rem);
    background: linear-gradient(135deg, #1a0a10 0%, #3d0622 40%, #D70464 100%);
    position: relative; overflow: hidden;
    transition: height 0.35s cubic-bezier(.4,0,.2,1);
    /* 右上角圖示：與 GAS 同級小圓鈕，供 calc(right) 共用 */
    --hero-icon-size: 3rem;
    --hero-icon-gap-x: 0.5rem;
    --hero-icon-top: 0.5714rem;
    --hero-icon-edge: 0.5714rem;
  }
  #hero-banner.collapsed { height: 0; }
  .hero-img { width:100%; height:100%; object-fit:cover; opacity:.55; position:absolute; inset:0; z-index:1; }
  /* 無封面圖、僅試算表底色：全幅漸層（與 POS 選色一致） */
  .hero-color-layer {
    position:absolute; inset:0; z-index:0; pointer-events:none; display:none;
  }
  #hero-banner.hero-has-color {
    background:transparent !important;
  }
  #hero-banner.hero-has-color .hero-color-layer { display:block; }
  #hero-banner.hero-has-color .hero-overlay {
    background: linear-gradient(to top, rgba(0,0,0,.4) 0%, rgba(0,0,0,.1) 55%, transparent 78%);
  }
  /* 有上傳封面時：圖片清楚、遮罩僅底部微暗以利文字閱讀 */
  #hero-banner.hero-has-cover .hero-img { opacity:1; }
  #hero-banner.hero-has-cover .hero-overlay {
    background: linear-gradient(to top, rgba(0,0,0,.45) 0%, rgba(0,0,0,.12) 45%, transparent 75%);
  }
  .hero-overlay { position:absolute; inset:0; z-index:2; background:linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.1) 60%); }
  .hero-info { position:absolute; bottom:0; left:0; right:0; z-index:3; padding:0.7143rem 0.7857rem 0.5714rem; transition:opacity .3s; }
  #hero-banner.collapsed .hero-info { opacity:0; pointer-events:none; }

  .hero-content-wrapper {
    display:flex;
    align-items:center;
    gap:0.5714rem;
  }
  .shop-logo-container {
    width: 5.1rem;
    height: 5.1rem;
    border-radius:0.5714rem;
    overflow:hidden;
    border:2px solid rgba(255,255,255,.3);
    flex-shrink:0;
    background:rgba(0,0,0,.2);
  }
  .shop-logo-container img {
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  /*營業中 */
  .open-badge { display:inline-flex; align-items:center; gap:0.18rem; background:rgba(255,255,255,.15); color:white; font-size:0.88rem; padding:0.18rem 0.42rem; border-radius:666px; }
  .dot { width:0.5rem; height:0.5rem; border-radius:50%; background:#4ade80; display:inline-block; flex-shrink:0; }
  /* 封面字級／logo／營業標：依 14px-root 視覺等比例縮放（抵消 html 18px） */
  #hero-shop-name {
    font-size: clamp(1.38rem, 4.6vw, 1.92rem);
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    margin: 0;
    flex: 1;
    min-width: 0;
  }
  .dot.closed { background:#ef4444; }

  /* ════ Sticky Nav（與 GAS order.html 同款：sticky top:0）════ */
  #sticky-nav {
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    z-index: 50;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  /* 只用 max-height 做滑出動畫，不用 opacity，避免半透明鬼影 */
  /* ════ Cat Tabs ════ */
  #cat-tabs {
    display:flex; gap:0;
    overflow-x:auto; overflow-y:hidden;
    scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    border-bottom:2px solid #f0f0f0;
    /* 防止任何子元素溢出造成上下晃動 */
    align-items:flex-end;
  }
  #cat-tabs::-webkit-scrollbar { display:none; }
  .cat-tab {
    flex-shrink:0;
    padding:0.75rem 1rem;
    font-size:1.1429rem;
    font-weight:700;
    color:#666;
    white-space:nowrap;
    cursor:pointer;
    transition:color .2s, box-shadow .2s;
    box-shadow: inset 0 0 0 0 transparent;
  }
  .cat-tab.active,
  .category-item.active {
    color: var(--panda) !important;
    font-weight: 700;
    box-shadow: inset 0 -0.2143rem 0 0 var(--panda) !important;
  }
  .cat-tab:active { transform:scale(.95); }

  /* ════ Menu Section（首頁商品卡：流動寬度、無 px、圖片比例穩定）════ */
  .menu-section {
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    padding: 0 0.7143rem;
    box-sizing: border-box;
  }
  .section-title {
    font-size: 1.2857rem;
    font-weight: 900;
    color: #1a1a1a;
    padding: 1rem 0 0.5rem;
    margin: 0 0 0.7143rem;
    border-bottom: 0.0714rem solid #f0f0f0;
    box-sizing: border-box;
  }
  /* 與 GAS 一致：手機即雙欄網格 */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.5em;
    padding-bottom: 1rem;
    width: 100%;
    box-sizing: border-box;
  }
  @media (min-width: 54.8571rem) {
    .menu-grid {
      gap: 0.5rem;
    }
    .menu-section {
      padding: 0 1rem;
    }
  }
  .menu-card {
    background: #fff;
    border-radius: 1.1429rem;
    overflow: hidden;
    box-shadow: 0 0.1429rem 0.5714rem rgba(0, 0, 0, 0.07);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
  }
  .menu-card:active {
    transform: scale(0.97);
    box-shadow: 0 0.0714rem 0.2857rem rgba(0, 0, 0, 0.1);
  }
  .menu-card.sold-out {
    opacity: 0.55;
    pointer-events: none;
  }
  .menu-card-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    height: auto;
    max-height: min(28vh, 12rem);
    object-fit: cover;
    object-position: center;
    background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
    display: block;
  }
  @supports not (aspect-ratio: 4 / 3) {
    .menu-card-img {
      height: min(28vh, 12rem);
    }
  }
  .menu-card-no-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    min-height: 5rem;
    max-height: min(28vh, 12rem);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #fff;
    font-size: 1rem;
    text-align: center;
    padding: 0.4286rem 0.5rem;
    word-break: break-word;
    box-sizing: border-box;
  }
  @supports not (aspect-ratio: 4 / 3) {
    .menu-card-no-img {
      height: min(28vh, 12rem);
    }
  }
  .menu-card-body {
    padding: 0.5714rem 0.5rem 0.6429rem;
    box-sizing: border-box;
  }
  .menu-card-name {
    font-size: 1.0714rem;
    font-weight: bold;
    color: #1a1a1a;
    line-height: 1.3;
    word-break: break-word;
  }
  .menu-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.3571rem;
    margin-top: 0.4286rem;
    flex-wrap: nowrap;
  }
  .menu-card-price {
    font-size: 1.0714rem;
    font-weight: bold;
    color: var(--panda);
    display: flex;
    align-items: baseline;
    flex-wrap: nowrap;
    gap: 0.2857rem 0.5rem;
    min-width: 0;
    flex: 1 1 0;
  }
  .menu-card-price .mc-price-orig {
    font-size: 0.9286rem;
    font-weight: 700;
    color: #9ca3af;
    text-decoration: line-through;
    text-decoration-color: #dc2626;
    white-space: nowrap;
    flex-shrink: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .menu-card-price .mc-price-sale {
    font-size: 1.0714rem;
    font-weight: 800;
    color: #7c3aed;
    white-space: nowrap;
    flex-shrink: 0;
  }
  /* 特價雙價格列較寬時略縮字級，讓 + 與價格維持同一行（對齊一般單價卡） */
  .menu-card-price:has(.mc-price-sale) {
    font-size: 0.95rem;
    gap: 0.2rem 0.4rem;
  }
  .menu-card-price:has(.mc-price-sale) .mc-price-orig {
    font-size: 0.8rem;
  }
  .menu-card-price:has(.mc-price-sale) .mc-price-sale {
    font-size: 0.95rem;
  }
  .sold-out-badge {
    font-size: 0.8571rem;
    font-weight: 700;
    color: #fff;
    background: #aaa;
    border-radius: 0.5714rem;
    padding: 0.4286rem 1rem;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .menu-card .add-btn {
    width: 1.8rem;
    height: 1.8rem;
    min-width: 1.8rem;
    min-height: 1.8rem;
    border-radius: 50%;
    border: none !important;
    -webkit-appearance: none !important;
    appearance: none !important;
    background: var(--panda) !important;
    color: #fff !important;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 300;
    line-height: 1;
    box-shadow: 0 0.2143rem 0.7143rem rgba(215, 4, 100, 0.4) !important;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
    box-sizing: border-box;
  }
  .menu-card .add-btn:active {
    transform: scale(0.88);
    box-shadow: 0 0.0714rem 0.2857rem rgba(215, 4, 100, 0.3) !important;
  }
  .menu-section--redeem {
    padding-bottom: 3.4286rem;
  }

  /* GitHub：載入結束後才顯示的主內容層（與 #menu-loading 分離，避免倍率問題） */
  #menu-content {
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    box-sizing: border-box;
    opacity: 0;
    transform: translateY(0.6rem);
    transition: opacity 0.45s ease, transform 0.45s ease;
    will-change: opacity, transform;
  }
  #menu-content.menu-content--visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ════ Bottom Sheet（商品抽屜）════ */
  #sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; opacity:0; pointer-events:none; transition:opacity .3s; }
  #sheet-overlay.show { opacity:1; pointer-events:all; }

  /* 抽屜本體：幾乎滿版（foodpanda 風格），下滑可關閉 */
  #bottom-sheet {
    position:fixed; top:3.1429rem; bottom:0; left:0; right:0; background:#fff;
    border-radius:1.7143rem 1.7143rem 0 0; z-index:101;
    transform:translateY(100%);
    transition:transform .38s cubic-bezier(.4,0,.2,1);
    display:flex; flex-direction:column;
    box-shadow:0 -8px 40px rgba(0,0,0,.18);
    overflow:hidden;
    will-change:transform;
  }
  #bottom-sheet.show { transform:translateY(0); }

  .sheet-handle { width:40px; height:4px; background:#e0e0e0; border-radius:2px; margin:12px auto 0; flex-shrink:0; }

  /* 全寬圖片（滿版 cover，允許裁切） */
  /* 商品介紹頂圖：order.html 為 33vh；再高 1/3 → 約 44vh，並設上限避免超高 */
  #sheet-img-area {
    width:100%; height:min(44vh, 17rem);
    flex-shrink:0; position:relative; overflow:hidden;
    background:linear-gradient(135deg,#f0f0f0,#e0e0e0);
  }
  #sheet-img-area img { width:100%; height:100%; object-fit:cover; display:block; }
  #sheet-img-area .sheet-no-img {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    color:white; font-weight:700; font-size: 1.15rem; text-align:center; padding:0.65rem;
    word-break:break-word;
  }

  /* 叉叉固定在 #bottom-sheet 左上角（不隨捲動消失） */
  .sheet-img-close {
    position:absolute; top:0.65rem; left:0.65rem; z-index:300;
    width:2.5rem; height:2.5rem; border-radius:50%;
    background:rgba(255,255,255,.88);
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size: 1.15rem; color:#333; font-weight:700;
    box-shadow:0 2px 8px rgba(0,0,0,.18);
    transition:background .15s; user-select:none; pointer-events:auto;
  }
  .sheet-img-close:active { background:rgba(255,255,255,1); }

  /* 可捲動內容區（整頁單一捲動，無側邊 padding） */
  .sheet-scroll { overflow-y:auto; flex:1; padding:0; -webkit-overflow-scrolling:touch; }
  .sheet-scroll::-webkit-scrollbar { display:none; }

  /* 圖片以下內容的 padding 包裝 */
  .sheet-content-pad {
    width: 90%;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
    padding: 0 0 1rem;
    box-sizing: border-box;
  }

  /* 商品資訊區（名稱 / 描述 / 價格） */
  .sheet-info-block { padding:0.85rem 0 0.65rem; border-bottom:1px solid #f0f0f0; }

  /* 購物車品項提示橫條 */
  .sheet-cart-hint {
    display:flex; align-items:center; justify-content:space-between;
    background:#fce4ef; border-radius:0.65rem;
    padding:0.65rem 0.75rem; margin:0.65rem 0 0.25rem;
    cursor:pointer; transition:opacity .15s;
  }
  .sheet-cart-hint:active { opacity:.75; }
  .sheet-cart-hint-left  { font-size: 0.92rem; font-weight:700; color:var(--panda); }
  .sheet-cart-hint-right { font-size: 0.85rem; font-weight:700; color:var(--panda); display:flex; align-items:center; gap:0.25rem; white-space:nowrap; }
  .sheet-item-name  { font-size: 1.15rem; font-weight:900; color:#1a1a1a; line-height:1.35; }
  .sheet-item-desc  { font-size: 0.88rem; color:#888; margin-top:0.45rem; line-height:1.45; }
  .sheet-item-price { font-size: 1.1rem; font-weight:900; color:var(--panda); margin-top:0.5rem; display:flex; flex-wrap:wrap; align-items:baseline; gap:0.25rem 0.65rem; }
  .sheet-item-price .sh-price-orig { font-size: 0.95rem; color:#9ca3af; text-decoration:line-through; text-decoration-color:#dc2626; font-weight:800; }

// ═══════════════════════════════════════════════════════════════════════════
// ordergit.html — GitHub Pages 獨立消費者點餐頁（單一 HTML）
//
// 啟動：DOMContentLoaded → bootstrapOrder()；網址須帶 ?id= 或 ?mid=（GAS 部署 ID）
//
// 模組速查（搜尋函名即可跳到實作）：
//   · WebApp / 金鑰：orderWebAppGetActionUrl_、orderFetchJsonFromAction_、bootstrapOrder
//   · 菜單：loadMenuData_、renderMenu、scrollToSection、allProducts
//   · 商品抽屜：openSheet、closeSheet、addToCart、bottom-sheet
//   · 購物車：cartItems、openCartDrawer、submit_order、#cart-drawer
//   · 會員闸道：orderRunMemberGate_（首屏後背景）、orderKickMemberGateBackgroundOnce_
//   · 促銷／廣告：orderGetStorePromotionsFetchOnce_、orderFillAndShowMerchantPromoAdDrawer_
//   · 預約：openReservationDrawer、refreshReservationCornerVisibility_（檔末第二段 script）
//   · 載入 UI：orderWaitShowTruck_、#menu-loading、#order-wait-panel-truck
// ═══════════════════════════════════════════════════════════════════════════
var __ORDERGIT_STANDALONE__ = true;
let currentWebAppUrl = '';
/** 本頁為消費者線上點餐：內建金鑰取得失敗、或後端金鑰比對（checkClientKey）未通過時，畫面僅顯示此句（細節只打 console） */
var ORDER_PUBLIC_MAINTENANCE_MESSAGE_ = '系統維修中';
var orderBuiltInClientKeyCache_ = '';
function orderGetClientKey_() {
  return String(orderBuiltInClientKeyCache_ || '').trim();
}
/** 消費者端：GET action 網址（Web App 網址若已含 query 則用 & 接續 action） */
function orderWebAppGetActionUrl_(action, extraQuery) {
  var u = (typeof currentWebAppUrl === 'string') ? currentWebAppUrl.trim().replace(/\?+$/, '') : '';
  if (!u || !action) return '';
  var sep = u.indexOf('?') >= 0 ? '&' : '?';
  var q = 'action=' + encodeURIComponent(String(action));
  if (extraQuery && String(extraQuery).trim()) {
    q += '&' + String(extraQuery).replace(/^&+/, '');
  }
  return u + sep + q;
}
/** GitHub：GET 後強制 text→JSON，避免非 JSON 時 .json() 拋錯 */
function orderFetchJsonFromAction_(action, extraQuery) {
  var u = orderWebAppGetActionUrl_(action, (extraQuery ? String(extraQuery).replace(/^&+/, '') + '&' : '') + '_=' + Date.now());
  if (!u) return Promise.resolve(null);
  return fetch(u, { cache: 'no-store', credentials: 'omit' })
    .then(function (r) { return r.text(); })
    .then(function (t) {
      try {
        return t ? JSON.parse(t) : null;
      } catch (eJ) {
        return null;
      }
    });
}
/** @returns {Promise<{ok:boolean, reason?: string}>} */
async function orderFetchBuiltInClientKey_(opts) {
  opts = opts || {};
  if (!opts.force && orderGetClientKey_()) return { ok: true };
  if (!currentWebAppUrl) return { ok: false, reason: 'no_url' };
  try {
    var url = orderWebAppGetActionUrl_('getBuiltInClientKey', '_=' + Date.now());
    if (!url) return { ok: false, reason: 'no_url' };
    var res = await fetch(url, { method: 'GET', cache: 'no-store', credentials: 'omit' });
    var text = await res.text();
    var data = text ? JSON.parse(text) : null;
    if (data && data.result === 'success' && data.clientKey) {
      orderBuiltInClientKeyCache_ = String(data.clientKey).trim();
      return orderGetClientKey_() ? { ok: true } : { ok: false, reason: 'bad_key' };
    }
    if (data && data.result === 'forbidden' && (data.reason === 'no_client_key' || data.sheetKeyConfigured === false)) {
      return { ok: false, reason: 'sheet_key_empty' };
    }

    console.error('[order] getBuiltInClientKey 失敗', e);
  }
  return { ok: false, reason: 'fetch_fail' };
}

/** GAS HtmlService：getBuiltInKey + getKeyData，確保 A2 未填時仍可阻擋消費者頁 */
function orderHydrateBuiltInKeyFromGas_() {
  return new Promise(function (resolve) {
    try {
      if (typeof google === 'undefined' || !google.script || typeof google.script.run === 'undefined') {
        resolve({ ok: false, reason: 'gas_unavailable' });
        return;
      }
      google.script.run
        .withSuccessHandler(function (k) {
          if (k == null || String(k).trim() === '') {
            orderBuiltInClientKeyCache_ = '';
            resolve({ ok: false, reason: 'sheet_key_empty' });
            return;
          }
          orderBuiltInClientKeyCache_ = String(k).trim();
          google.script.run
            .withSuccessHandler(function (kd) {
              if (!kd) {
                resolve({ ok: false, reason: 'key_read_fail' });
                return;
              }
              if (kd.result === 'url_mismatch') {

                  else resolve({ ok: false, reason: 'url_mismatch' });
                });
                return;
              }
              if (kd.result !== 'success') {
                resolve({ ok: false, reason: 'key_read_fail' });
                return;
              }
              if (!String(kd.key || '').trim()) {
                resolve({ ok: false, reason: 'sheet_key_empty' });
                return;
              }
              resolve({ ok: true });
            })
            .withFailureHandler(function () {
              resolve({ ok: false, reason: 'key_read_fail' });
            })
            .getKeyData();
        })
        .withFailureHandler(function (err) {

/** @returns {Promise<{ok:boolean, reason?: string, raw?: *}>} */

  var ck = orderGetClientKey_();

      console.error('[order] checkClientKey POST 非 JSON', { status: res.status, bodyPreview: (text || '').slice(0, 600), pe: pe });

    console.error('[order] checkClientKey POST 失敗', err);
    return { ok: false, reason: 'network', raw: null };
  }
}

function orderRetryDomApply(label, isReady, apply, maxTries) {
  maxTries = maxTries || 15;

    if (isReady()) {
      apply();
      return;

    n += 1;
    if (n < maxTries) {
      console.warn('[order] ' + label + '：目標 DOM 未就緒，200ms 後重試 (' + n + '/' + maxTries + ')');

  tick();

function orderPromoHumanPercentForCopy_(v) {
  var x = parseFloat(v);
  if (!isFinite(x) || x <= 0) return '';
  if (x <= 10) {
    var z = Math.round(x * 10) / 10;
    return (Math.abs(z - Math.round(z)) < 1e-9) ? String(Math.round(z)) : String(z);
  }
  if (x <= 100) {
    var pay = x / 10;
    var z2 = Math.round(pay * 10) / 10;
    return (Math.abs(z2 - Math.round(z2)) < 1e-9) ? String(Math.round(z2)) : String(z2);
  }
  return '';
}

function orderBuildMerchantPromoAdBulletLines_(cfg) {
  var lines = [];
  if (!cfg || !cfg.enabled || !orderMerchantPromoIsActiveNow_(cfg)) return lines;
  if (cfg.activityStartDate || cfg.activityEndDate) {
    lines.push('活動期間：' + (cfg.activityStartDate || '—') + ' ～ ' + (cfg.activityEndDate || '—'));
  }
  (cfg.buyAgetB || []).forEach(function (r) {
    if (!r || r.enabled === false) return;
    var bq = parseInt(r.buyQty, 10) || 1;
    var gq = parseInt(r.giftQty, 10) || 1;
    var buyN = orderMerchantPromoProductName_(r.buyProductId);
    var gN = orderMerchantPromoProductName_(r.giftProductId);
    lines.push('買「' + buyN + '」滿 ' + bq + ' 份，贈「' + gN + '」× ' + gq);
  });
  (cfg.itemDiscounts || []).forEach(function (r) {
    if (!r || r.enabled === false) return;
    var mode = String(r.mode || 'percent').trim().toLowerCase() === 'amount' ? 'amount' : 'percent';
    var pn = orderMerchantPromoProductName_(r.productId);
    if (mode === 'amount') {
      lines.push('「' + pn + '」每份減價 ' + (parseFloat(r.value) || 0) + ' 元');
    } else {
      var zh = orderPromoHumanPercentForCopy_(r.value);
      lines.push('「' + pn + '」' + (zh ? '打' + zh + '折' : '優惠折扣'));
    }
  });
  (cfg.thresholdGifts || []).forEach(function (r) {
    if (!r || r.enabled === false) return;
    var th = parseInt(r.threshold, 10) || 0;
    var gq = parseInt(r.giftQty, 10) || 1;
    var basis = orderMerchantPromoRuleUsesPostItemBasis_(r) ? '（折後滿額）' : '（折前滿額）';
    var gN = orderMerchantPromoProductName_(r.giftProductId);
    lines.push('消費滿 ' + th + ' 元' + basis + '贈「' + gN + '」× ' + gq);
  });
  (cfg.thresholdOrder || []).forEach(function (r) {
    if (!r || r.enabled === false) return;
    var th = parseInt(r.threshold, 10) || 0;
    var mode = String(r.mode || 'percent').trim().toLowerCase() === 'amount' ? 'amount' : 'percent';
    var basis = orderMerchantPromoRuleUsesPostItemBasis_(r) ? '（折後滿額）' : '（折前滿額）';
    if (mode === 'amount') {
      lines.push('滿 ' + th + ' 元' + basis + '整單折讓 ' + (parseFloat(r.value) || 0) + ' 元');
    } else {
      var zh2 = orderPromoHumanPercentForCopy_(r.value);
      lines.push('滿 ' + th + ' 元' + basis + '整單' + (zh2 ? '打' + zh2 + '折' : '優惠'));
    }
  });
  if (!lines.length) lines.push('目前僅設定活動檔期，詳細以店內公告為準。');
  return lines;
}

  var su = parseInt(m.spend_unit, 10) || 100;
  var pp = parseInt(m.points_per_unit != null ? m.points_per_unit : m.pointsPer100, 10);
  if (isNaN(pp)) pp = 1;
  if (m.rule_base !== false) {
    parts.push('消費每滿 ' + su + ' 元可累積 ' + pp + ' 點（實際以結帳金額與店家規則為準）。');

  if (m.rule_first !== false) {

    if (isNaN(fb)) fb = 20;
    parts.push('會員首購禮：符合資格之首筆訂單贈 ' + fb + ' 點。');
  }
  if (m.rule_accumulate && m.accumulate_threshold != null && m.accumulate_bonus != null) {
    var ath = parseInt(m.accumulate_threshold, 10);
    var abn = parseInt(m.accumulate_bonus, 10);
    if (!isNaN(ath) && !isNaN(abn) && ath > 0 && abn > 0) {
      parts.push('累積消費：累積滿 ' + ath + ' 元再加贈 ' + abn + ' 點。');
    }

  if (m.rule_offset && m.offset_points && m.offset_yuan) {
    var op = parseInt(m.offset_points, 10);
    var oy = parseInt(m.offset_yuan, 10);
    if (!isNaN(op) && !isNaN(oy) && op > 0 && oy > 0) {
      parts.push('點數折抵：' + op + ' 點可折抵消費 ' + oy + ' 元（單筆上限依店家設定）。');

/** POS 儲存之封面底色 → 線上 Hero 漸層（與試算表單色一致） */
function coverGradientFromHex(hex) {
  if (!hex || typeof hex !== 'string') return '';
  var h = hex.replace('#', '').trim();
  if (h.length === 3) {
    h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
  }
  if (h.length !== 6) return '';
  var r = parseInt(h.substr(0, 2), 16);
  var g = parseInt(h.substr(2, 2), 16);
  var b = parseInt(h.substr(4, 2), 16);
  if (isNaN(r) || isNaN(g) || isNaN(b)) return '';
  var t = 0.45;
  var r2 = Math.round(r + (255 - r) * t);
  var g2 = Math.round(g + (255 - g) * t);
  var b2 = Math.round(b + (255 - b) * t);
  function toHex(n) {
    n = Math.min(255, Math.max(0, n));
    return ('0' + n.toString(16)).slice(-2);
  }
  var light = '#' + toHex(r2) + toHex(g2) + toHex(b2);
  return 'linear-gradient(135deg, ' + hex + ' 0%, ' + light + ' 100%)';
}

function getTodayWeekLabel(d) {
  return ['週日','週一','週二','週三','週四','週五','週六'][d.getDay()];
}

function normalizeFixedClosedDays(src) {
  if (Array.isArray(src)) return src.map(s => (s || '').toString().trim()).filter(Boolean);
  if (typeof src === 'string') return src.split(',').map(s => s.trim()).filter(Boolean);
  return [];
}

// ════════════════════════════════════════════════════
// Hero scroll behaviour
// ════════════════════════════════════════════════════

// 頁面捲動中旗標（防止 cart-bar 被滑動誤觸）
let _pageScrolling = false;
let _pageScrollTimer = null;
// 程式主動捲動旗標（scrollToSection 專用，不受 scroll 事件覆蓋）
let _programScroll = false;
let _programScrollTimer = null;

// ── 捲動相關 DOM 緩存（renderMenu 後呼叫 _cacheScrollRefs 更新）──
let _scrollHeroBanner = null;
let _scrollCatTabsEl  = null;
let _scrollSections   = []; // section 元素陣列
let _scrollCatTabs    = []; // cat-tab 元素陣列
let _lastActiveCat    = 0;
let _scrollRafPending = false;

function _cacheScrollRefs() {
  _scrollHeroBanner = document.getElementById('hero-banner');
  _scrollCatTabsEl  = document.getElementById('cat-tabs');
  _scrollSections   = Array.from(document.querySelectorAll('[data-section]'));
  _scrollCatTabs    = Array.from(document.querySelectorAll('.cat-tab'));
  _lastActiveCat    = 0;
}

window.addEventListener('scroll', () => {
  // 標記「捲動中」，捲動停止 400ms 後解除（時間加長避免 smooth scroll 尾端誤觸）
  _pageScrolling = true;
  clearTimeout(_pageScrollTimer);
  _pageScrollTimer = setTimeout(() => { _pageScrolling = false; }, 400);

  // requestAnimationFrame 節流：每一幀最多執行一次，避免高頻 scroll 事件造成卡頓
  if (_scrollRafPending) return;
  _scrollRafPending = true;
  requestAnimationFrame(() => {
    _scrollRafPending = false;
    const scrollY = window.scrollY;

    // Hero banner 折疊 / 展開
    if (_scrollHeroBanner) {
      if (scrollY > 60) {
        _scrollHeroBanner.classList.add('collapsed');
      } else {
        _scrollHeroBanner.classList.remove('collapsed');
      }
    }

    // ScrollSpy：用 offsetTop（不觸發 reflow）比對捲動位置
    if (_scrollSections.length > 0 && _scrollCatTabsEl) {
      const catH = _scrollCatTabsEl.offsetHeight;
      const threshold = scrollY + catH + 16;
      let current = 0;
      _scrollSections.forEach((sec, i) => { if (sec.offsetTop < threshold) current = i; });
      if (current !== _lastActiveCat) {
        _lastActiveCat = current;
        _scrollCatTabs.forEach((t, i) => t.classList.toggle('active', i === current));
      }
    }
  });
}, { passive: true });

async function loadMerchantInfo() {
  try {
    if (!currentWebAppUrl) {
      console.error('[order] loadMerchantInfo：currentWebAppUrl 未設定');
      return;
    }
    const u = orderWebAppGetActionUrl_('getMerchantInfo', '_=' + Date.now());
    if (!u) return;
    const res = await fetch(u, { cache: 'no-store', credentials: 'omit' });
    const text = await res.text();
    var data = null;
    try {
      data = text ? JSON.parse(text) : null;
    } catch (eJ) {
      console.error('[ordergit] getMerchantInfo 非 JSON', (text || '').slice(0, 400));
      return;
    }
    if (data.result !== 'success') return;
    try {
      window.__ORDER_SHOP_NAME_CACHE__ = String((data.merchant && data.merchant.name) || '線上點餐').trim();
    } catch (eCache) {}

    orderRetryDomApply('loadMerchantInfo', function () {
      return !!(document.getElementById('hero-shop-name') && document.getElementById('hero-banner'));
    }, function () {
    merchantInfo = data.merchant || {};
    try {
      orderApplyWaitGameFromMerchant_(merchantInfo.waitGame);
    } catch (eWG) {}

    if (merchantInfo.holidays) {
      holidayList = Array.isArray(merchantInfo.holidays)
        ? merchantInfo.holidays.filter(Boolean)
        : merchantInfo.holidays.split(',').map(s => s.trim()).filter(Boolean);
    }
    fixedClosedDays = normalizeFixedClosedDays(merchantInfo.fixedClosedDays);

    const shopName = merchantInfo.name || '線上點餐';
    document.getElementById('hero-shop-name').textContent = shopName;
    document.title = shopName;

    const logoWrap = document.getElementById('hero-logo-wrap');
    const logoImg  = document.getElementById('hero-shop-logo');
    const heroImgEl = document.getElementById('hero-img');
    const logoSrc = (merchantInfo.logoImage || '').toString().trim();
    if (logoSrc) {
      logoImg.src = logoSrc;
      logoImg.alt = shopName;
      logoWrap.style.display = '';
      logoWrap.setAttribute('aria-hidden', 'false');
    } else {
      logoImg.removeAttribute('src');
      logoWrap.style.display = 'none';
      logoWrap.setAttribute('aria-hidden', 'true');
    }
    const coverSrc = (merchantInfo.coverImage || '').toString().trim();
    const coverColorRaw = (merchantInfo.coverColor || '').toString().trim();
    const heroBanner = document.getElementById('hero-banner');
    const heroColorLayer = document.getElementById('hero-color-layer');
    const validCoverColor = /^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(coverColorRaw);
    if (coverSrc) {
      heroBanner.classList.add('hero-has-cover');
      heroBanner.classList.remove('hero-has-color');
      if (heroColorLayer) {
        heroColorLayer.style.background = '';
      }
      heroImgEl.src = coverSrc;
      heroImgEl.alt = shopName;
      heroImgEl.style.display = '';
    } else if (validCoverColor) {
      heroBanner.classList.remove('hero-has-cover');
      heroBanner.classList.add('hero-has-color');
      heroImgEl.removeAttribute('src');
      heroImgEl.style.display = 'none';
      if (heroColorLayer) {
        var g = coverGradientFromHex(coverColorRaw);
        heroColorLayer.style.background = g || coverColorRaw;
      }
    } else {
      heroBanner.classList.remove('hero-has-cover', 'hero-has-color');
      heroImgEl.removeAttribute('src');
      heroImgEl.style.display = 'none';
      if (heroColorLayer) {
        heroColorLayer.style.background = '';
      }
    }
    orderMarkMerchantVisualReady_(coverSrc);

    isBusinessClosed = checkBusinessStatus();
    updateStatusDisplay();
    if (isBusinessClosed) showClosedOverlay();

    // 商家資訊預載入：存入 storeData 供彈窗秒開使用
    storeData = merchantInfo;
    try { void orderEnsureStorePromotionsFetchedAtLeastOnce_(); } catch (eSp) { /* 略 */ }
    });
  } catch (err) {
    console.error('❌ loadMerchantInfo 失敗:', err);
  }
}

function checkBusinessStatus() {
  const today    = new Date();
  const todayStr = today.toISOString().split('T')[0];
  const localStr = new Date(today.getTime() - today.getTimezoneOffset() * 60000).toISOString().split('T')[0];
  const todayWeekLabel = getTodayWeekLabel(today);

  const isHolidayClosed = holidayList.includes(todayStr) || holidayList.includes(localStr);
  const isFixedClosed   = fixedClosedDays.includes(todayWeekLabel);
  if (isHolidayClosed || isFixedClosed) return true;

  const rawHours = (merchantInfo.businessHours || '')
    .replace(/[０-９]/g, d => String.fromCharCode(d.charCodeAt(0) - 0xFF10 + 0x30))
    .replace(/[：﹕]/g, ':')
    .replace(/[～~－–—‒−﹣]/g, '-');

  if (rawHours && rawHours.includes('-')) {
    const [openStr, closeStr] = rawHours.split('-').map(t => t.trim());
    if (openStr && closeStr) {
      const [oH, oM = 0] = openStr.split(':').map(Number);
      const [cH, cM = 0] = closeStr.split(':').map(Number);
      const now   = today.getHours() * 60 + today.getMinutes();
      const open  = oH * 60 + oM;
      const close = cH * 60 + cM;
      if (now < open || now >= close) return true;
    }
  }

  if (merchantInfo.status === '休息中') return true;
  return false;
}

function updateStatusDisplay() {
  const dot = document.getElementById('hero-dot');
  const txt = document.getElementById('hero-status');
  if (isBusinessClosed) {
    dot.classList.add('closed');
    txt.textContent = '休息中';
  } else {
    txt.textContent = '營業中';
  }

let _menuCategoryOrder = []; // 從後端取得的菜單名稱排序

var ORDER_CACHED_MENU_KEY = 'cachedMenu';
var ORDER_CACHED_MENU_VERSION = 1;

function orderGetCachedMenuRoot_() {
  try {
    var raw = localStorage.getItem(ORDER_CACHED_MENU_KEY);
    if (!raw) return { v: ORDER_CACHED_MENU_VERSION, pos: null, order: null };
    var o = JSON.parse(raw);
    if (!o) return { v: ORDER_CACHED_MENU_VERSION, pos: null, order: null };
    if (o.v === ORDER_CACHED_MENU_VERSION && (o.pos != null || o.order != null)) return o;
    if (o.menuTabs && o.menuNames) {
      return {
        v: ORDER_CACHED_MENU_VERSION,
        pos: {
          savedAt: o.savedAt || Date.now(),
          menuNames: o.menuNames,
          menuColors: o.menuColors || {},
          menuOrder: Array.isArray(o.menuOrder) ? o.menuOrder : [],
          menuTabs: o.menuTabs
        },
        order: null
      };
    }
    return { v: ORDER_CACHED_MENU_VERSION, pos: null, order: null };
  } catch (e) {
    return { v: ORDER_CACHED_MENU_VERSION, pos: null, order: null };
  }
}

function orderPersistMenuPayload_(payload) {
  try {
    var root = orderGetCachedMenuRoot_();
    root.v = ORDER_CACHED_MENU_VERSION;
    root.order = Object.assign({ savedAt: Date.now() }, payload);
    localStorage.setItem(ORDER_CACHED_MENU_KEY, JSON.stringify(root));
  } catch (e) {
    console.warn('[order] cachedMenu 寫入失敗', e);
  }
}

/** getMenuNamesData 回傳 menuOrder 為 ID；HTTP getMenuNames 回傳為分類名稱 */
function orderApplyCategoryOrderFromNamesData_(namesData) {
  if (!namesData || namesData.result !== 'success') return;
  var mo = namesData.menuOrder;
  if (!mo || !mo.length) return;
  var mn = namesData.menuNames || {};
  var first = mo[0];
  if (mn && /^menu-\d+$/.test(String(first)) && mn[first] !== undefined) {
    _menuCategoryOrder = mo.map(function (id) { return mn[id]; }).filter(Boolean);
  } else {
    _menuCategoryOrder = mo.map(function (x) { return String(x || '').trim(); }).filter(Boolean);
  }
  orderApplyBrandCssVarsFromNamesData_(namesData);
}

/** 依 getMenuNamesData.menuColors 更新全站 --panda / --panda-dark / --panda-light */
function orderApplyBrandCssVarsFromNamesData_(namesData) {
  if (!namesData || namesData.result !== 'success') return;
  var mc = namesData.menuColors;
  if (!mc || typeof mc !== 'object') return;
  var hex = String(mc['menu-1'] || '').trim();
  if (!/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(hex)) {
    var k;
    for (k in mc) {
      if (!Object.prototype.hasOwnProperty.call(mc, k)) continue;
      var v = String(mc[k] || '').trim();
      if (/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(v)) {
        hex = v;
        break;
      }
    }
  }
  if (!/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(hex)) return;
  if (hex.length === 4) {
    hex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
  }
  function hexToRgb(h) {
    var n = parseInt(h.slice(1), 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }
  function rgbToHex(r, g, b) {
    function c(x) {
      var t = Math.max(0, Math.min(255, Math.round(x)));
      return ('0' + t.toString(16)).slice(-2);
    }
    return '#' + c(r) + c(g) + c(b);
  }
  var rgb = hexToRgb(hex);
  var dark = rgbToHex(rgb.r * 0.72, rgb.g * 0.72, rgb.b * 0.72);
  var light = rgbToHex(rgb.r + (255 - rgb.r) * 0.88, rgb.g + (255 - rgb.g) * 0.88, rgb.b + (255 - rgb.b) * 0.88);
  try {
    var root = document.documentElement;
    root.style.setProperty('--panda', hex, 'important');
    root.style.setProperty('--panda-dark', dark, 'important');
    root.style.setProperty('--panda-light', light, 'important');
  } catch (e) { /* 略 */ }
}

function orderBuildStorableMenuPayload_(namesData, prodData) {
  var catOrder = [];
  if (namesData && namesData.result === 'success' && namesData.menuOrder && namesData.menuOrder.length) {
    var mn = namesData.menuNames || {};
    var mo = namesData.menuOrder;
    var first = mo[0];
    if (mn && /^menu-\d+$/.test(String(first)) && mn[first] !== undefined) {
      catOrder = mo.map(function (id) { return mn[id]; }).filter(Boolean);
    } else {
      catOrder = mo.map(function (x) { return String(x || '').trim(); }).filter(Boolean);
    }
  }
  return {
    menuCategoryOrder: catOrder,
    products: prodData && prodData.result === 'success' ? (prodData.products || []) : []
  };
}

function orderMapProductsFromPayload_(prodData) {
  if (!prodData || prodData.result !== 'success') return;
  allProducts = (prodData.products || []).map(function (p) {
    var hidden = (p && (p.hideStatus === '是' || p.hidden === true));
    return {
      id: p.id.toString(),
      name: p.name,
      price: parseInt(p.price, 10) || 0,
      color: p.color || '#cccccc',
      image: p.image || null,
      description: p.description || '',
      options: buildProductOptions(p),
      category: p.menuCategory || '菜單',
      isSoldOut: p.saleStatus === '否',
      isHidden: hidden
    };
  }).filter(function (p) { return !p.isHidden; });
}

function orderMenuPayloadSnapshot_(payload) {
  return JSON.stringify(payload);
}

function tryRestoreOrderMenuFromCache_() {
  try {
    var root = orderGetCachedMenuRoot_();
    var ord = root.order;
    if (!ord || !Array.isArray(ord.products)) return false;
    _menuCategoryOrder = ord.menuCategoryOrder || [];
    allProducts = (ord.products || []).map(function (p) {
      var hidden = (p && (p.hideStatus === '是' || p.hidden === true));
      return {
        id: p.id.toString(),
        name: p.name,
        price: parseInt(p.price, 10) || 0,
        color: p.color || '#cccccc',
        image: p.image || null,
        description: p.description || '',
        options: buildProductOptions(p),
        category: p.menuCategory || '菜單',
        isSoldOut: p.saleStatus === '否',
        isHidden: hidden
      };
    }).filter(function (p) { return !p.isHidden; });
    renderMenu();
    return true;
  } catch (e) {

  }
}

function orderCanUseScriptRun_() {
  if (typeof __ORDERGIT_STANDALONE__ !== 'undefined' && __ORDERGIT_STANDALONE__) return false;
  return typeof google !== 'undefined' && google.script && typeof google.script.run !== 'undefined';
}

async function fetchMenuFromServer_Order_() {
  if (orderCanUseScriptRun_()) {
    var menuNamesReq = new Promise(function (resolve, reject) {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getMenuNamesData();
    });
    var productsReq = new Promise(function (resolve, reject) {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getProductsData();
    });
    var both = await Promise.all([menuNamesReq, productsReq]);
    var namesData = both[0];
    var prodData = both[1];
    return { namesData: namesData, prodData: prodData };
  }
  if (!currentWebAppUrl) {
    return { namesData: { result: 'error' }, prodData: { result: 'error' } };
  }
  var uMenu = orderWebAppGetActionUrl_('getMenuNamesData', '_=' + Date.now());
  var uProd = orderWebAppGetActionUrl_('getProductsData', '_=' + Date.now());
  if (!uMenu || !uProd) {
    return { namesData: { result: 'error' }, prodData: { result: 'error' } };
  }
  var fetched = await Promise.all([
    fetch(uMenu, { cache: 'no-store', credentials: 'omit' }),
    fetch(uProd, { cache: 'no-store', credentials: 'omit' })
  ]);
  function parseJsonRes(r, tag) {
    return r.text().then(function (text) {
      try {
        return text ? JSON.parse(text) : null;
      } catch (e) {
        console.error('[ordergit] ' + tag + ' JSON 解析失敗', (text || '').slice(0, 400));
        return { result: 'error' };
      }
    });
  }
  var parsed = await Promise.all([
    parseJsonRes(fetched[0], 'getMenuNamesData'),
    parseJsonRes(fetched[1], 'getProductsData')
  ]);
  return { namesData: parsed[0] || { result: 'error' }, prodData: parsed[1] || { result: 'error' } };
}

/** 僅抓取／套用菜單資料（不關閉全螢幕等待層；供進頁與會員門檻並行預載） */
async function loadMenuData_() {
  if (window.__orderLoadMenuPromise__) return window.__orderLoadMenuPromise__;
  var p = (async function () {
    var restoredFromCache = false;
    try {
      restoredFromCache = tryRestoreOrderMenuFromCache_();
      if (restoredFromCache && allProducts && allProducts.length > 0) {
        orderMarkMenuReady_();
      }

      if (!orderCanUseScriptRun_() && !currentWebAppUrl) {
        console.error('[order] loadMenu：無部署網址且非 GAS 嵌入，無法載入菜單');
        return;
      }

      var fetched = await fetchMenuFromServer_Order_();
      var namesData = fetched.namesData;
      var prodData = fetched.prodData;

      if (namesData.result !== 'success' || prodData.result !== 'success') {
        if (!restoredFromCache) {
          console.error('[order] loadMenu：後端回傳失敗', namesData, prodData);
        }
        return;
      }

      var nextPayload = orderBuildStorableMenuPayload_(namesData, prodData);
      var prev = orderGetCachedMenuRoot_().order;
      var prevSnap = '';
      if (prev && prev.products) {
        prevSnap = orderMenuPayloadSnapshot_({
          menuCategoryOrder: prev.menuCategoryOrder || [],
          products: prev.products || []
        });
      }
      var nextSnap = orderMenuPayloadSnapshot_(nextPayload);

      if (prevSnap !== nextSnap) {
        orderApplyCategoryOrderFromNamesData_(namesData);
        orderMapProductsFromPayload_(prodData);
        renderMenu();
      }
      orderPersistMenuPayload_(nextPayload);
      orderMarkMenuReady_();
    } catch (err) {
      console.error('❌ loadMenu 失敗:', err);
    }
  })();
  window.__orderLoadMenuPromise__ = p.finally(function () {
    window.__orderLoadMenuPromise__ = null;
  });
  return window.__orderLoadMenuPromise__;
}

function buildProductOptions(p) {
  const opts = [];
  for (let i = 1; i <= 8; i++) {
    const name  = (p[`option${i}`] || '').toString().trim();
    const price = parseInt(p[`option${i}Price`]) || 0;
    if (name) opts.push({ l: name, p: price });
  }
  return opts;
}

// ════════════════════════════════════════════════════
// 渲染菜單
// ════════════════════════════════════════════════════
function renderMenu() {
  var catTabsEl = document.getElementById('cat-tabs');
  var menuContentEl = document.getElementById('menu-content');
  if (!catTabsEl || !menuContentEl) {
    orderRetryDomApply('renderMenu', function () {
      return !!(document.getElementById('cat-tabs') && document.getElementById('menu-content'));
    }, function () { renderMenu(); });
    return;
  }
  const catMap = {};
  allProducts.forEach(p => {
    if (!catMap[p.category]) catMap[p.category] = [];
    catMap[p.category].push(p);
  });

  // 依後端菜單順序排列分類，未在順序清單的分類補到最後
  const allCatNames = Object.keys(catMap).filter(function (n) { return n !== ORDER_REDEEM_TAB_NAME; });
  let sortedNames;
  if (_menuCategoryOrder.length > 0) {
    const ordered   = _menuCategoryOrder.filter(n => allCatNames.includes(n));
    const remaining = allCatNames.filter(n => !ordered.includes(n));
    sortedNames = [...ordered, ...remaining];
  } else {
    sortedNames = allCatNames;
  }
  var redeemList = (window.__memberCornerRedeemCache || []).filter(function (pr) {
    return pr && String(pr.id || '').trim();
  });
  menuCategories = sortedNames.map(function (name, i) {
    return { id: i, name: name, kind: 'normal', items: catMap[name] || [] };
  });
  if (redeemList.length > 0) {
    menuCategories.push({
      id: menuCategories.length,
      name: ORDER_REDEEM_TAB_NAME,
      kind: 'redeem',
      items: redeemList
    });
  }

  catTabsEl.innerHTML = menuCategories
    .map((cat, i) => `<div class="cat-tab${i === 0 ? ' active' : ''}" data-cat="${i}" onclick="scrollToSection(${i})">${cat.name}</div>`)
    .join('');

  menuContentEl.innerHTML = menuCategories.map((cat, i) => {
    var sectionBody = '';
    if (cat.kind === 'redeem') {
      sectionBody = (cat.items || []).map(function (pr) { return renderRedeemMenuCardHtml_(pr); }).join('');
      return `<div class="menu-section" data-section="${i}" onclick="memberRedeemCardClick_(event)">
      <div class="section-title">${cat.name}</div>
      <div class="menu-grid">${sectionBody}</div>
    </div>`;
    }
    const items = cat.items || [];
    return `<div class="menu-section" data-section="${i}">
      <div class="section-title">${cat.name}</div>
      <div class="menu-grid">${items.map(item => renderMenuCard(item)).join('')}</div>
    </div>`;
  }).join('');

  // 菜單渲染完畢後更新捲動緩存
  _cacheScrollRefs();
}

function renderMenuCard(item) {
  const cfg = orderGetMerchantPromoCfg_();
  const pp = orderMerchantPromoUnitPriceForMenuCard_(item.id, item.price, cfg);
  const imgHTML = item.image
    ? `<img class="menu-card-img" src="${item.image}" alt="${item.name}" loading="eager">`
    : `<div class="menu-card-no-img" style="background-color:${item.color};">${item.name}</div>`;

  let footerHTML;
  if (item.isSoldOut) {
    footerHTML = pp.hasDiscount
      ? `<div class="menu-card-price"><span class="mc-price-orig">${formatPrice(pp.orig)}</span><span class="mc-price-sale">${formatPrice(pp.sale)}</span></div><div class="sold-out-badge">售完</div>`
      : `<div class="menu-card-price">${formatPrice(item.price)}</div><div class="sold-out-badge">售完</div>`;
  } else {
    footerHTML = pp.hasDiscount
      ? `<div class="menu-card-price"><span class="mc-price-orig">${formatPrice(pp.orig)}</span><span class="mc-price-sale">${formatPrice(pp.sale)}</span></div>
       <div class="add-btn" onclick="event.stopPropagation();quickAdd('${item.id}')">+</div>`
      : `<div class="menu-card-price">${formatPrice(item.price)}</div>
       <div class="add-btn" onclick="event.stopPropagation();quickAdd('${item.id}')">+</div>`;
  }

  return `<div class="menu-card${item.isSoldOut ? ' sold-out' : ''}" onclick="openSheet('${item.id}')">
    ${imgHTML}
    <div class="menu-card-body">
      <div class="menu-card-name">${item.name}</div>
      <div class="menu-card-footer">${footerHTML}</div>
    </div>

}

function scrollToSection(idx) {
  // 程式主動捲動鎖：1600ms，不受 scroll 事件覆蓋，確保 smooth scroll 結束前 cart-bar 不誤開
  _programScroll = true;
  clearTimeout(_programScrollTimer);
  _programScrollTimer = setTimeout(() => { _programScroll = false; }, 1600);

    const sec = document.querySelector(`[data-section="${idx}"]`);
  if (sec) {
    const stickyNav = document.getElementById('sticky-nav');
    const stickyH = stickyNav ? stickyNav.offsetHeight : 48;
    const rawOffset = sec.getBoundingClientRect().top + window.scrollY - stickyH - 6;
    // 不捲到頁面絕對底部（留 100px 緩衝，避免 iOS 彈性捲動讓底部元素彈出）
    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    const safeOffset = Math.min(Math.max(0, rawOffset), maxScroll - 100);
    window.scrollTo({ top: safeOffset, behavior: 'smooth' });
  }
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.cat-tab[data-cat="${idx}"]`)?.classList.add('active');
  document.querySelector(`.cat-tab[data-cat="${idx}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function openSheet(productId) {
  const item = allProducts.find(p => p.id === productId);
  if (!item || item.isSoldOut) return;

  currentProduct = item;
  currentQty     = 1;
  selectedExtras = {};

  // ── 全寬圖片區 ──
  const imgArea = document.getElementById('sheet-img-area');
  if (item.image) {
    imgArea.innerHTML = `<img src="${item.image}" alt="${item.name}">`;
  } else {
    imgArea.innerHTML = `<div class="sheet-no-img" style="background-color:${item.color};">${item.name}</div>`;
  }

  const cfg = orderGetMerchantPromoCfg_();
  const pp = orderMerchantPromoUnitPriceForMenuCard_(item.id, item.price, cfg);
  const sheetPriceHtml = pp.hasDiscount
    ? '<div class="sheet-item-price"><span class="sh-price-orig">' + formatPrice(pp.orig) + '</span><span class="sh-price-sale">' + formatPrice(pp.sale) + '</span><span class="sheet-price-note">（單價，不含加購）</span></div>'
    : `<div class="sheet-item-price">${formatPrice(item.price)}</div>`;

  // ── 商品資訊：名稱 / 描述 / 費用 ──
  document.getElementById('sheet-info-area').innerHTML = `
    <div class="sheet-item-name">${item.name}</div>
    ${item.description ? `<div class="sheet-item-desc">${item.description}</div>` : ''}
    ${sheetPriceHtml}`;

  // ── 購物車提示：若此商品已在購物車則顯示 ──
  const hintEl   = document.getElementById('sheet-cart-hint');
  const inCartQty = cartItems.filter(ci => ci.id === item.id).reduce((s, ci) => s + ci.qty, 0);
  if (inCartQty > 0) {
    hintEl.style.display = '';
    hintEl.innerHTML = `
      <div class="sheet-cart-hint" onclick="closeSheet();openCartDrawer();">
        <span class="sheet-cart-hint-left">✓ ${inCartQty} × ${item.name}</span>
        <span class="sheet-cart-hint-right">在購物車編輯 →</span>
      </div>`;
  } else {
    hintEl.style.display = 'none';
    hintEl.innerHTML = '';
  }

  // ── 附加選項 ──
  let html = '';
  if (item.options.length > 0) {
    html = `<div class="option-group">
      <div class="option-group-title">加購選項
        <span class="option-group-note">（可多選）</span>
      </div>`;
    item.options.forEach((opt, ei) => {
      html += `<div class="option-item" onclick="toggleExtra(${ei})">
        <span class="option-label">${opt.l}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          ${opt.p > 0 ? `<span class="option-price-tag">+NT$${opt.p}</span>` : '<span class="option-price-tag">免費</span>'}
          <div class="option-checkbox" id="ext-${ei}"></div>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('sheet-options').innerHTML = html;

  document.getElementById('sheet-note').value = '';
  document.getElementById('sheet-qty').textContent = 1;
  updateCartBtn();

  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('bottom-sheet').classList.add('show');
  document.getElementById('sheet-scroll-area').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  const sheet = document.getElementById('bottom-sheet');
  // 清除 swipe 拖曳時殘留的 inline transform/transition
  sheet.style.transition = '';
  sheet.style.transform  = '';
  document.getElementById('sheet-overlay').classList.remove('show');
  sheet.classList.remove('show');
  document.body.style.overflow = '';
}

function toggleExtra(ei) {
  selectedExtras[ei] = !selectedExtras[ei];
  const cb = document.getElementById(`ext-${ei}`);
  if (cb) cb.className = 'option-checkbox' + (selectedExtras[ei] ? ' checked' : '');
  updateCartBtn();
}

function changeQty(delta) {
  currentQty = Math.max(1, currentQty + delta);
  document.getElementById('sheet-qty').textContent = currentQty;
  updateCartBtn();
}

function calcSheetPrice() {
  if (!currentProduct) return 0;
  var cfg = orderGetMerchantPromoCfg_();
  var pp = orderMerchantPromoUnitPriceForMenuCard_(currentProduct.id, currentProduct.price, cfg);
  let unit = pp.sale;
  currentProduct.options.forEach((opt, i) => { if (selectedExtras[i]) unit += opt.p; });
  return unit * currentQty;
}

function updateCartBtn() {
  document.getElementById('cart-btn-price').textContent = formatPrice(calcSheetPrice());
}

// ════════════════════════════════════════════════════
// 加入購物車
// ════════════════════════════════════════════════════
function addToCart() {
  if (!currentProduct) return;
  var cfg = orderGetMerchantPromoCfg_();
  var pp = orderMerchantPromoUnitPriceForMenuCard_(currentProduct.id, currentProduct.price, cfg);
  const unitPrice = pp.sale + currentProduct.options.reduce((s, opt, i) => selectedExtras[i] ? s + opt.p : s, 0);
  const selectedOpts   = currentProduct.options.filter((_, i) => selectedExtras[i]);
  const optionsStrings = selectedOpts.map(opt => `${opt.l}${opt.p > 0 ? ' +' + opt.p : ''}`);
  const note           = document.getElementById('sheet-note').value.trim();

  const key      = `${currentProduct.id}|${optionsStrings.join(',')}|${note}`;
  const existing = cartItems.find(ci => ci._key === key);
  if (existing) {
    existing.qty      += currentQty;
    existing.lineTotal = existing.unitPrice * existing.qty;
  } else {
    cartItems.push({
      _key:      key,
      id:        currentProduct.id,
      name:      currentProduct.name,
      unitPrice,
      qty:       currentQty,
      options:   optionsStrings,
      note,
      lineTotal: unitPrice * currentQty,
    });
  }

  closeSheet();
  updateCartBar();
  showToast(`✓ 已加入 ${currentProduct.name}`);
}

// ════════════════════════════════════════════════════
// 快速加入（直接點 + 按鈕）
// ════════════════════════════════════════════════════
function quickAdd(productId) {
  const item = allProducts.find(p => p.id === productId);
  if (!item || item.isSoldOut) return;
  var cfg = orderGetMerchantPromoCfg_();
  var pp = orderMerchantPromoUnitPriceForMenuCard_(item.id, item.price, cfg);

  const key      = `${item.id}||`;
  const existing = cartItems.find(ci => ci._key === key);
  if (existing) {
    existing.qty      += 1;
    existing.lineTotal = existing.unitPrice * existing.qty;
  } else {
    cartItems.push({
      _key:      key,
      id:        item.id,
      name:      item.name,
      unitPrice: pp.sale,
      qty:       1,
      options:   [],
      note:      '',
      lineTotal: pp.sale,
    });
  }
  updateCartBar();
  showToast(`✓ ${item.name} 加入購物車`);
}

function orderGetCashCartSubtotal_() {
  return orderSumSubmitItemsCash_();
}

/** 購物車內兌換商品將消耗的點數（與送單 redeemPoints 一致） */
function orderGetCartReservedRedeemPoints_() {
  var sum = 0;
  (cartItems || []).forEach(function (ci) {
    if (!ci || !ci.isRedeem) return;
    var rp = parseInt(ci.redeemPoints, 10);
    if (!Number.isFinite(rp) || rp < 0) {
      rp = (parseInt(ci.pointsCost, 10) || 0) * Math.max(1, parseInt(ci.qty, 10) || 1);
    }
    sum += Math.max(0, rp);
  });
  return sum;
}

/** 折抵消費計算用的可用點數（總點數扣除購物車兌換預扣）；點數尚未載入時回 null */
function orderGetEffectiveMemberPtsForPointDiscount_() {
  var raw = window.__orderMemberPtsForDiscount;
  if (raw == null || raw === '') return null;
  var total = parseInt(raw, 10) || 0;
  var reserved = orderGetCartReservedRedeemPoints_();
  return Math.max(0, total - reserved);
}

/** 點數兌換：向後端確認會員並同步折抵／會員專區快取 */
async function orderResolveMemberBalanceForRedeem_(phone10) {
  var prof = await orderFetchMemberProfile_(phone10);
  if (!prof || prof.result !== 'success') {
    return { ok: false, toast: '❗ 無法取得會員資料，請稍後再試' };
  }
  if (!prof.exists) {
    return { ok: false, toast: '❗ 無會員紀錄，無法使用點數兌換' };
  }
  var balance = parseInt(prof.points, 10) || 0;
  try {
    window.__orderMemberPtsForDiscount = balance;
    window.__memberCornerProfileCache = prof;
    window.__memberCornerProfileCachePhone = phone10;
  } catch (eSync) {}
  return { ok: true, balance: balance };
}

function orderCartPointOffsetUsable_() {
  if (!window.__ORDER_MEMBER_SYSTEM_ENABLED__) return false;
  var m = window.__ORDER_MEMBER_SETTINGS;
  if (!m || m.result !== 'success' || !m.rule_offset) return false;
  var op = parseInt(m.offset_points, 10);
  var oy = parseInt(m.offset_yuan, 10);
  if (!Number.isFinite(op) || op < 1 || !Number.isFinite(oy) || oy < 1) return false;
  if (!orderGetStoredMemberPhone10_()) return false;
  return true;
}

/** 依 POS「上限」設定算出本筆現金最多可折幾元（無設定則回傳現金小計） */
function orderGetOffsetCapMaxNtdForCash_(cash) {
  var m = window.__ORDER_MEMBER_SETTINGS;
  if (!m || m.result !== 'success') return cash;
  var c = Math.max(0, parseInt(cash, 10) || 0);
  var mode = String(m.offset_cap_mode != null ? m.offset_cap_mode : '').trim();
  if (mode === 'amount') {
    var a = parseInt(m.offset_cap_amount, 10);
    if (!Number.isFinite(a) || a < 1) return c;
    return Math.min(c, a);
  }
  if (mode === 'percent') {
    var p = parseInt(m.offset_cap_percent, 10);
    if (!Number.isFinite(p) || p < 1 || p > 100) return c;
    return Math.min(c, Math.floor(c * p / 100));
  }
  return c;
}

function orderGetMaxPointDiscountNtdForCart_() {
  var cash = orderGetCashCartSubtotal_();
  var m = window.__ORDER_MEMBER_SETTINGS;
  if (!m || m.result !== 'success' || !m.rule_offset) return 0;
  var op = parseInt(m.offset_points, 10);
  var oy = parseInt(m.offset_yuan, 10);
  if (!Number.isFinite(op) || op < 1 || !Number.isFinite(oy) || oy < 1) return 0;
  var maxByCap = orderGetOffsetCapMaxNtdForCash_(cash);
  var eff = orderGetEffectiveMemberPtsForPointDiscount_();
  if (eff === null) return Math.min(cash, maxByCap);
  var maxByPts = Math.floor(eff * oy / op);
  return Math.min(cash, maxByCap, Math.max(0, maxByPts));
}

function orderClampPointDiscountNtd_() {
  if (!orderCartPointOffsetUsable_()) {
    orderCartPointDiscountNtd = 0;
    return;
  }
  var cash = orderGetCashCartSubtotal_();
  var maxD = orderGetMaxPointDiscountNtdForCart_();
  var v = parseInt(orderCartPointDiscountNtd, 10) || 0;
  if (v < 0) v = 0;
  orderCartPointDiscountNtd = Math.min(v, cash, maxD);
}

function orderSyncCartPointDiscountBlock_() {
  var block = document.getElementById('cart-point-discount-block');
  var inp = document.getElementById('cart-point-discount-input');
  var hint = document.getElementById('cart-point-discount-hint');
  if (!block || !inp || !hint) return;
  if (!orderCartPointOffsetUsable_() || cartItems.length === 0) {
    block.style.display = 'none';
    return;
  }
  block.style.display = '';
  var m = window.__ORDER_MEMBER_SETTINGS;
  var op = parseInt(m.offset_points, 10);
  var oy = parseInt(m.offset_yuan, 10);
  orderClampPointDiscountNtd_();
  inp.value = orderCartPointDiscountNtd > 0 ? String(orderCartPointDiscountNtd) : '';
  inp.max = String(Math.max(0, orderGetCashCartSubtotal_()));
  var maxD = orderGetMaxPointDiscountNtdForCart_();
  var ptsRaw = window.__orderMemberPtsForDiscount;
  var redeemRes = orderGetCartReservedRedeemPoints_();
  var ptsStr;
  if (ptsRaw == null || ptsRaw === '') {
    ptsStr = '載入中…';
  } else {
    var tp = parseInt(ptsRaw, 10) || 0;
    var effPts = orderGetEffectiveMemberPtsForPointDiscount_();
    ptsStr = (redeemRes > 0 && effPts !== null)
      ? (tp + ' 點（購物車兌換將用 ' + redeemRes + '，折抵消費可用 ' + effPts + '）')
      : (tp + ' 點');
  }
  hint.textContent = '每 ' + op + ' 點可折 ' + oy + ' 元。目前會員點數：' + ptsStr + '。本單現金最高可折抵 NT$ ' + maxD + '。';
}

function orderOnCartPointDiscountInput_(el) {
  if (!el) return;
  var raw = parseInt(String(el.value).replace(/[^\d]/g, ''), 10);
  if (isNaN(raw)) raw = 0;
  orderCartPointDiscountNtd = raw;
  orderClampPointDiscountNtd_();
  el.value = orderCartPointDiscountNtd > 0 ? String(orderCartPointDiscountNtd) : '';
  updateCartBar();
}

function orderRefreshMemberPointsForDiscountCart_() {
  if (!orderCartPointOffsetUsable_() || !currentWebAppUrl) {
    window.__orderMemberPtsForDiscount = null;
    orderSyncCartPointDiscountBlock_();
    return;
  }
  var phoneEl = document.getElementById('order-phone');
  var raw = phoneEl ? String(phoneEl.value || '').trim() : '';
  var phone = orderNormalizePhone10_(raw) || orderGetStoredMemberPhone10_();
  if (!phone || !/^\d{10}$/.test(phone)) {
    window.__orderMemberPtsForDiscount = null;
    orderSyncCartPointDiscountBlock_();
    return;
  }
  fetch(orderWebAppGetActionUrl_('getMemberProfile', 'phone=' + encodeURIComponent(phone) + '&_=' + Date.now()))
    .then(function (r) { return r.text(); })
    .then(function (txt) {
      var d = null;
      try { d = txt ? JSON.parse(txt) : null; } catch (eJ) { d = null; }

      } else {

    })
    .catch(function () {
      window.__orderMemberPtsForDiscount = null;

}

function orderPrefetchMemberPointsForDiscount_() {
  if (!orderCartPointOffsetUsable_() || !currentWebAppUrl) return Promise.resolve();
  var phone = orderGetStoredMemberPhone10_();
  if (!phone || !/^\d{10}$/.test(phone)) return Promise.resolve();
  return fetch(orderWebAppGetActionUrl_('getMemberProfile', 'phone=' + encodeURIComponent(phone) + '&_=' + Date.now()))
    .then(function (r) { return r.text(); })
    .then(function (txt) {
      var d = null;
      try { d = txt ? JSON.parse(txt) : null; } catch (eJ) { d = null; }
      if (d && d.result === 'success' && d.exists) {
        window.__orderMemberPtsForDiscount = parseInt(d.points, 10) || 0;
      } else {
        window.__orderMemberPtsForDiscount = 0;
      }
      orderClampPointDiscountNtd_();
    })
    .catch(function () {
      window.__orderMemberPtsForDiscount = null;
    });
}

async function orderFetchMemberSettings_() {
  try { window.__ORDER_MEMBER_SETTINGS = null; } catch (e) {}
  if (!currentWebAppUrl) return;
  try {
    var uS = orderWebAppGetActionUrl_('getMemberSettings', '_=' + Date.now());

  } catch (err) {

  }
}

function updateCartBar() {
  orderClampPointDiscountNtd_();
  var cfg = orderGetMerchantPromoCfg_();
  var pvBar = null;
  try { pvBar = orderGetCartPromoPreview_(); } catch (eB) { pvBar = null; }
  var baseQty = (cartItems || []).reduce(function (s, i) { return s + (parseInt(i.qty, 10) || 0); }, 0);
  var giftExtra = (orderMerchantPromoIsActiveNow_(cfg) && pvBar && Array.isArray(pvBar.giftRows))
    ? pvBar.giftRows.reduce(function (s, g) { return s + (parseInt(g && g.qty, 10) || 0); }, 0)
    : 0;
  const totalQty = baseQty + giftExtra;
  const cashSub    = orderGetCashCartSubtotal_();
  const totalPrice = Math.max(0, cashSub - orderCartPointDiscountNtd);

  document.getElementById('cart-count').textContent    = totalQty;
  document.getElementById('cart-total').textContent    = formatPrice(totalPrice);
  document.getElementById('submit-qty-display').textContent   = `共 ${totalQty} 項`;
  document.getElementById('submit-total-display').textContent = formatPrice(totalPrice);

  const bar = document.getElementById('cart-bar');
  if (totalQty > 0) {
    bar.classList.add('show');
    bar.classList.remove('bounce');
    void bar.offsetWidth;
    bar.classList.add('bounce');
  } else {
    bar.classList.remove('show');
  }
  orderRefreshDineInCartChrome_();
}

// 購物車內 +/- 調整數量
function adjustCartItemQty(idx, delta) {
  const ci = cartItems[idx];
  if (!ci) return;
  if (ci.isRedeem && delta > 0) {
    void orderAdjustRedeemCartQtyMaybe_(idx, delta);
    return;
  }
  ci.qty += delta;
  if (ci.qty <= 0) {
    cartItems.splice(idx, 1);
    updateCartBar();
    renderCartItems();
    if (cartItems.length === 0) closeCartDrawer();
  } else {
    if (ci.isRedeem) {
      ci.lineTotal = 0;
      ci.redeemPoints = (ci.pointsCost || 0) * ci.qty;
    } else {
      ci.lineTotal = ci.unitPrice * ci.qty;
    }
    updateCartBar();
    renderCartItems();
  }
}

async function orderAdjustRedeemCartQtyMaybe_(idx, delta) {
  var ci = cartItems[idx];
  if (!ci || !ci.isRedeem || delta <= 0) return;
  if (!window.__ORDER_MEMBER_SYSTEM_ENABLED__) {
    showToast('❗ 會員功能未開啟');
    return;
  }
  var phone = orderGetStoredMemberPhone10_();
  if (!phone || !/^\d{10}$/.test(phone)) {
    showToast('❗ 請先登入會員');
    return;
  }
  var pc = parseInt(ci.pointsCost, 10) || 0;
  var curRp = parseInt(ci.redeemPoints, 10);
  if (!Number.isFinite(curRp) || curRp < 0) curRp = pc * Math.max(1, parseInt(ci.qty, 10) || 1);
  var futureTotal = orderGetCartReservedRedeemPoints_() - curRp + pc * (Math.max(1, parseInt(ci.qty, 10) || 1) + delta);
  var resolved = await orderResolveMemberBalanceForRedeem_(phone);
  if (!resolved.ok) {
    showToast(resolved.toast || '❗ 無法驗證點數');
    return;
  }
  if (resolved.balance < futureTotal) {
    showToast('❗ 會員點數不足（購物車兌換需 ' + futureTotal + ' 點，目前 ' + resolved.balance + ' 點）');
    return;
  }
  ci.qty += delta;
  ci.lineTotal = 0;
  ci.redeemPoints = pc * ci.qty;
  updateCartBar();
  renderCartItems();
}

</svg>`;

function renderCartItems() {
  const container = document.getElementById('cart-items-list');
  if (cartItems.length === 0) {
    orderCartPointDiscountNtd = 0;
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;font-size: 2.01144rem;">購物車是空的</div>';
    orderSyncCartPointDiscountBlock_();
    return;
  }
  orderSyncCartPromoLineIds_();
  var pv = null;
  try { pv = orderGetCartPromoPreview_(); } catch (ePv) { pv = null; }
  var cfg = orderGetMerchantPromoCfg_();
  var perMap = (pv && pv.perItemByLineId) ? pv.perItemByLineId : {};

  const cartDisplay = cartItems.map((ci, idx) => ({ ci, idx })).sort((a, b) => {
    const c = String(orderItemMainNameForSort_({ name: a.ci.name }))
      .localeCompare(String(orderItemMainNameForSort_({ name: b.ci.name })), 'zh-Hant');
    if (c !== 0) return c;
    return a.idx - b.idx;
  });
  function orderCartItemPromoTag_(ci, row) {
    if (!ci || !row || !row.hasDiscount) return '';
    var txt = orderItemDiscountTextFromRules_(ci.id, cfg);
    return txt ? ('(' + txt + ')') : '';
  }
  const paidRows = cartDisplay.map(({ ci, idx }) => {
    var priceInner;
    var nameHtml;
    if (ci.isRedeem) {
      priceInner = ((ci.pointsCost || 0) * ci.qty) + ' 點';
      nameHtml = orderEscHtml_(ci.name);
    } else {
      var row = perMap[String(ci._promoLineId)];
      if (row && row.hasDiscount) {
        priceInner = '<span class="cart-price-orig">' + formatPrice(row.origLine) + '</span><span class="cart-price-sale">' + formatPrice(row.saleLine) + '</span>';
      } else {
        priceInner = formatPrice(ci.lineTotal);
      }
      nameHtml = orderEscHtml_(ci.name) + orderEscHtml_(orderCartItemPromoTag_(ci, row));
    }
    return `
    <div class="cart-item-row">
      <div class="cart-item-top">
        <span class="cart-item-name">${nameHtml}</span>
        <div class="cart-item-trash" onclick="removeFromCart(${idx})">${trashSVG}</div>
      </div>
      ${ci.options.length ? `<div class="cart-item-opts">${ci.options.join('、')}</div>` : ''}
      ${ci.note ? `<div class="cart-item-opts">備註：${ci.note}</div>` : ''}
      <div class="cart-item-bottom">
        <div class="cart-qty-ctrl">
          <div class="cart-qty-btn" onclick="adjustCartItemQty(${idx}, -1)">−</div>
          <span class="cart-qty-num">${ci.qty}</span>
          <div class="cart-qty-btn" onclick="adjustCartItemQty(${idx}, 1)">+</div>
        </div>
        <span class="cart-item-price">${priceInner}</span>
      </div>
    </div>`;
  }).join('');

  var giftHtml = '';
  if (orderMerchantPromoIsActiveNow_(cfg) && pv && Array.isArray(pv.giftRows) && pv.giftRows.length) {
    pv.giftRows.forEach(function (gr) {
      if (!gr) return;
      giftHtml += (
        '<div class="cart-promo-gift-row"><div class="cart-promo-gift-inner">' +
        '<div class="cart-promo-gift-icon">🎁</div>' +
        '<div style="flex:1;min-width:0;">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">' +

function initTimePicker() {
  const now = new Date();
  now.setMinutes(now.getMinutes() + 15);

  // 向上取整到 5 分鐘
  const rawMin  = now.getMinutes();
  const roundM  = Math.ceil(rawMin / 5) * 5;
  let   pickH   = now.getHours();
  let   pickM   = roundM;
  if (pickM >= 60) { pickH = (pickH + 1) % 24; pickM = pickM - 60; }

  const hourSel = document.getElementById('pickup-hour');
  const minSel  = document.getElementById('pickup-min');
  if (!hourSel || !minSel) return;

  hourSel.innerHTML = '';
  for (let h = 0; h < 24; h++) {
    const o = document.createElement('option');
    o.value = h;
    o.textContent = String(h).padStart(2, '0');
    if (h === pickH) o.selected = true;
    hourSel.appendChild(o);
  }

  minSel.innerHTML = '';
  for (let m = 0; m < 60; m += 5) {
    const o = document.createElement('option');
    o.value = m;
    o.textContent = String(m).padStart(2, '0');
    if (m === pickM) o.selected = true;
    minSel.appendChild(o);
  }
}

function getPickupTime() {
  if (window.__ORDER_DINEIN_CTX__) return '店內';
  const h = document.getElementById('pickup-hour')?.value ?? '00';
  const m = document.getElementById('pickup-min')?.value  ?? '00';
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/** KDS 用：線上訂單短編號（如 A-01） */
function generateKdsShortId() {
  const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const c = letters.charAt(Math.floor(Math.random() * letters.length));
  const n = String(Math.floor(Math.random() * 99) + 1).padStart(2, '0');
  return c + '-' + n;
}

function buildOrderSubmitSig_(orderData) {
  try {
    const itemSig = (orderData.items || []).map(function (it) {
      return [
        String(it.id || ''),
        String(it.name || ''),
        Number(it.price) || 0,
        Number(it.quantity) || 0,
        Array.isArray(it.options) ? it.options.join('|') : '',
        String(it.note || '')
      ].join('^');
    }).join('||');
    return [
      String(orderData.phone || ''),
      String(orderData.pickupTime || ''),
      String(orderData.notes || ''),
      Number(orderData.total) || 0,
      itemSig
    ].join('@@');
  } catch (e) {
    return '';
  }
}

  orderSyncCartPromoLineIds_();

  const cashSubT = orderSumSubmitItemsCash_();

// ════════════════════════════════════════════════════
// 下滑關閉商品抽屜（swipe-down-to-dismiss）
// 邏輯：在 scrollTop === 0 且手指向下滑 → 拖移抽屜 → 超過 120px 即關閉
// ════════════════════════════════════════════════════
function initSheetSwipe() {
  const sheet      = document.getElementById('bottom-sheet');
  const scrollArea = document.getElementById('sheet-scroll-area');
  let startY = 0, startScrollTop = 0, dragging = false;

  sheet.addEventListener('touchstart', e => {
    startY         = e.touches[0].clientY;
    startScrollTop = scrollArea.scrollTop;
    dragging       = false;
  }, { passive: true });

  sheet.addEventListener('touchmove', e => {
    const dy = e.touches[0].clientY - startY;
    // 只在 scroll 頂端且手指向下才攔截
    if (startScrollTop <= 0 && dy > 8) {
      dragging = true;
      sheet.style.transition = 'none';
      // 限制最大拖曳距離避免過度拉扯
      sheet.style.transform  = `translateY(${Math.min(dy * 0.85, 380)}px)`;
      e.preventDefault();
    }
  }, { passive: false });

  sheet.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    sheet.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';

    if (dy > 120) {
      // 滑動超過閾值 → 動畫到底部後關閉
      sheet.style.transform = 'translateY(100%)';
      setTimeout(() => {
        sheet.style.transform  = '';
        sheet.style.transition = '';
        document.getElementById('sheet-overlay').classList.remove('show');
        sheet.classList.remove('show');
        document.body.style.overflow = '';
      }, 350);
    } else {
      // 未超過 → 彈回原位
      sheet.style.transform = 'translateY(0)';
      setTimeout(() => {
        sheet.style.transform  = '';
        sheet.style.transition = '';
      }, 350);
    }
  });
}

function orderHistLocalYmd_(d) {
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
}

function orderHistShiftDays_(ymdStr, deltaDays) {
  var p = (ymdStr || '').split('-');
  if (p.length !== 3) return orderHistLocalYmd_(new Date());
  var t = new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
  t.setDate(t.getDate() + deltaDays);
  return orderHistLocalYmd_(t);
}

async function addRedeemProductToCart_(productId) {
  var list = window.__memberCornerRedeemCache || [];
  var pr = null;
  var i;
  for (i = 0; i < list.length; i++) {
    if (String(list[i].id || '') === String(productId || '')) {
      pr = list[i];
      break;
    }
  }
  if (!pr || (pr.saleStatus || '是') === '否') return;
  if (!window.__ORDER_MEMBER_SYSTEM_ENABLED__) {
    showToast('❗ 會員功能未開啟');
    return;
  }
  var phone = orderGetStoredMemberPhone10_();
  if (!phone || !/^\d{10}$/.test(phone)) {
    showToast('❗ 請先登入會員');
    return;
  }
  if (!currentWebAppUrl) {
    showToast('❗ 無法連線後端');
    return;
  }
  var pts = parseInt(pr.price, 10) || 0;
  var rid = String(pr.id || '').trim();
  var key = 'redeem|' + rid;
  var existing = cartItems.find(function (ci) { return ci._key === key; });
  var futureTotal;
  if (existing) {
    var curRp = parseInt(existing.redeemPoints, 10);
    if (!Number.isFinite(curRp) || curRp < 0) {
      curRp = (parseInt(existing.pointsCost, 10) || 0) * Math.max(1, parseInt(existing.qty, 10) || 1);
    }
    futureTotal = orderGetCartReservedRedeemPoints_() - curRp
      + (parseInt(existing.pointsCost, 10) || 0) * (Math.max(1, parseInt(existing.qty, 10) || 1) + 1);
  } else {
    futureTotal = orderGetCartReservedRedeemPoints_() + pts;
  }
  var resolved = await orderResolveMemberBalanceForRedeem_(phone);
  if (!resolved.ok) {
    showToast(resolved.toast || '❗ 無法驗證點數');
    return;
  }
  if (resolved.balance < futureTotal) {
    showToast('❗ 會員點數不足（購物車兌換需 ' + futureTotal + ' 點，目前 ' + resolved.balance + ' 點）');
    return;
  }
  if (existing) {
    existing.qty += 1;
    existing.redeemPoints = (existing.pointsCost || 0) * existing.qty;
  } else {
    cartItems.push({
      _key: key,
      id: rid,
      name: String(pr.name || '兌換品'),
      unitPrice: 0,
      qty: 1,
      options: [],
      note: '點數兌換',
      lineTotal: 0,
      isRedeem: true,
      pointsCost: pts,
      redeemPoints: pts
    });
  }
  updateCartBar();
  renderCartItems();
  showToast('✓ 已加入購物車');
  closeMemberRedeemDrawer_();
}

    if (body) body.innerHTML = '<div class="member-meta" style="padding:24px;color:#b91c1c;">載入失敗</div>';

function initMemberCornerSwipe() {
  var sheet = document.getElementById('member-corner-sheet');
  var scrollEl = document.getElementById('member-corner-scroll');
  if (!sheet || !scrollEl) return;
  var startY = 0, startScrollTop = 0, dragging = false;

  sheet.addEventListener('touchstart', function (e) {
    startY = e.touches[0].clientY;
    startScrollTop = scrollEl.scrollTop;
    dragging = false;
  }, { passive: true });

  sheet.addEventListener('touchmove', function (e) {
    var dy = e.touches[0].clientY - startY;
    if (startScrollTop <= 0 && dy > 8) {
      dragging = true;
      sheet.style.transition = 'none';
      sheet.style.transform = 'translateY(' + Math.min(dy * 0.85, 400) + 'px)';
      e.preventDefault();
    }
  }, { passive: false });

  sheet.addEventListener('touchend', function (e) {
    if (!dragging) return;
    dragging = false;
    var dy = e.changedTouches[0].clientY - startY;
    sheet.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';
    if (dy > 120) {
      sheet.style.transform = 'translateY(100%)';
      setTimeout(function () {
        closeMemberRedeemDrawer_();
        closeMemberHistDrawer_();
        sheet.style.transform = '';
        sheet.style.transition = '';
        document.getElementById('member-corner-overlay').classList.remove('show');
        sheet.classList.remove('show');
        document.body.style.overflow = '';
      }, 350);
    } else {
      sheet.style.transform = 'translateY(0)';
      setTimeout(function () { sheet.style.transform = ''; sheet.style.transition = ''; }, 350);
    }
  });
}
